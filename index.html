<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid var(--gold); background: #000; text-align: center; font-size: 24px; font-weight: bold; color: var(--gold); }
        .section { display: none; height: 80vh; padding: 20px; box-sizing: border-box; text-align: center; }
        .active { display: block; }

        /* Рулетка */
        .roulette { position: relative; width: 100%; height: 160px; background: #0a0a0a; border: 1px solid #333; margin: 20px 0; overflow: hidden; border-radius: 15px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--gold); }
        .tape { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); align-items: center; }
        .slot { min-width: 120px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .slot img { width: 80px; height: 80px; object-fit: contain; }
        .slot span { font-size: 11px; color: #aaa; margin-top: 5px; font-weight: bold; }

        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; }
        .btn:disabled { background: #222; color: #444; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0c0c0c; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 12px; font-weight: bold; cursor: pointer; }
        .nav-item.active-nav { color: var(--gold); }

        .inv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-bottom: 100px; }
        .inv-card { background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid #222; font-size: 10px; }
        .inv-card img { width: 100%; height: 60px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="header">⭐ <span id="balance-val">0</span></div>

    <div id="tab-cases" class="section active">
        <div class="roulette">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">КРУТИТЬ (500 ⭐)</button>
    </div>

    <div id="tab-profile" class="section">
        <h3 style="color: var(--gold);">ИНВЕНТАРЬ</h3>
        <div id="inv-list" class="inv-grid"></div>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="switchTab('cases')">КЕЙСЫ</div>
        <div class="nav-item" onclick="switchTab('profile')">ПРОФИЛЬ</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        const params = new URLSearchParams(window.location.search);
        let balance = parseInt(params.get('balance')) || 0;
        let isSpinning = false;
        let inventory = [];

        const items = [
            {id: 'chill', name: 'Chill', img: 'Chill.png'},
            {id: 'mood', name: 'Mood', img: 'Mood.png'},
            {id: 'snoop', name: 'Snoop', img: 'Snoop.png'},
            {id: 'ufc', name: 'UFC', img: 'UFC.png'},
            {id: 'low', name: 'Low', img: 'Low.png'},
            {id: 'voodoo', name: 'Voodoo', img: 'Voodoo.png'},
            {id: 'stars', name: 'Stars', img: 'Stars.png'}
        ];

        function updateUI() {
            document.getElementById('balance-val').innerText = balance;
            document.getElementById('spin-btn').disabled = (balance < 500 || isSpinning);
        }

        function switchTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'profile') renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('inv-list');
            list.innerHTML = inventory.length ? '' : '<p>Пусто</p>';
            inventory.forEach(item => {
                list.innerHTML += `<div class="inv-card"><img src="img/${item.img}"><br>${item.name}</div>`;
            });
        }

        function startSpin() {
            if (balance < 500 || isSpinning) return;

            isSpinning = true;
            balance -= 500;
            updateUI();

            const tape = document.getElementById('tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            tape.innerHTML = '';

            for (let i = 0; i < 60; i++) {
                const it = items[Math.floor(Math.random() * items.length)];
                tape.innerHTML += `<div class="slot"><img src="img/${it.img}"><span>${it.name}</span></div>`;
            }

            const winIdx = 55;
            const winner = items[Math.floor(Math.random() * items.length)];
            const slots = tape.querySelectorAll('.slot');
            slots[winIdx].innerHTML = `<img src="img/${winner.img}"><span>${winner.name}</span>`;

            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
                const shift = (winIdx * 120) - (window.innerWidth / 2) + 60;
                tape.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                if (winner.id === 'stars') balance += 1000;
                else inventory.push(winner);
                
                updateUI();

                // ВАЖНО: Мы НЕ используем tg.sendData(), чтобы приложение НЕ закрывалось.
                // Вместо этого можно использовать метод CloudStorage или просто уведомление.
                tg.HapticFeedback.notificationOccurred('success');
                alert("Вы выиграли: " + winner.name);
                
            }, 5500);
        }

        updateUI();
    </script>
</body>
</html>
