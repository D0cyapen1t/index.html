<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #1c212a; --accent: #248bf2; --gold: #f5a623; --gray: #8e959b; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Верхняя панель */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(28, 33, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #2d343f; }
        .balance-box { background: #242a35; padding: 5px 12px; border-radius: 12px; border: 1px solid #3d4450; display: flex; align-items: center; gap: 8px; }
        .balance-box span { color: var(--gold); font-weight: 800; }

        /* Контент */
        .page { display: none; height: calc(100vh - 140px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Рулетка */
        .case-area { margin-top: 40px; text-align: center; }
        .roulette { position: relative; width: 100%; height: 130px; background: #05070a; margin: 25px 0; overflow: hidden; border-radius: 15px; border: 2px solid #252c38; }
        .pointer { position: absolute; left: 50%; width: 3px; height: 100%; background: var(--accent); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent); }
        .tape { display: flex; position: absolute; transition: 6s cubic-bezier(0.1, 0, 0.05, 1); top: 15px; }
        .slot { min-width: 100px; height: 100px; margin: 0 5px; background: var(--card); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 70px; height: 70px; object-fit: contain; }

        /* Нижнее меню */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; border-top: 1px solid #2d343f; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: var(--gray); transition: 0.2s; }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

        /* Кнопки */
        .btn-spin { width: 100%; padding: 18px; background: var(--accent); border: none; color: white; border-radius: 15px; font-weight: 900; font-size: 16px; box-shadow: 0 5px 15px rgba(36, 139, 242, 0.4); }
        .btn-spin:disabled { background: #2d343f; box-shadow: none; opacity: 0.5; }
        
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #2d343f; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; letter-spacing: 1px;">FRAGMENT</div>
        <div class="balance-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#f5a623"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
            <span id="bal-val">ЗАГРУЗКА</span>
        </div>
    </div>

    <div id="h" class="page active">
        <h1 style="margin: 0 0 10px 0;">Marketplace</h1>
        <div class="card">
            <div style="color: var(--gray); font-size: 12px;">АКТИВНЫЕ КЕЙСЫ</div>
            <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">Premium Fragment Box v2</div>
        </div>
        <img src="https://nft.fragment.com/gift/CookieHeart.webp" style="width: 100%; border-radius: 20px; margin-top: 10px;">
    </div>

    <div id="b" class="page">
        <div class="case-area">
            <h2 style="margin: 0;">ELITE CASE</h2>
            <p style="color: var(--gray); font-size: 13px;">Шанс выбить +888 или редкий Username</p>
            <div class="roulette">
                <div class="pointer"></div>
                <div id="tape" class="tape"></div>
            </div>
            <button class="btn-spin" id="spin-btn" onclick="run()">ОТКРЫТЬ (500 ⭐)</button>
        </div>
    </div>

    <div id="w" class="page">
        <h2>ИНВЕНТАРЬ</h2>
        <div id="inv" style="text-align: center; color: var(--gray); margin-top: 40px;">
            <p>У вас пока нет выигранных NFT.</p>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="n-h" onclick="nav('h')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            ГЛАВНАЯ
        </div>
        <div class="nav-item" id="n-b" onclick="nav('b')">
            <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-8-2h4v2h-4V4z"/></svg>
            КЕЙСЫ
        </div>
        <div class="nav-item" id="n-w" onclick="nav('w')">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            КОШЕЛЕК
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Ссылки для рулетки
        const lootIcons = [
            "https://nft.fragment.com/number/88808888888.webp",
            "https://nft.fragment.com/gift/CookieHeart.webp",
            "https://nft.fragment.com/username/news.webp",
            "https://nft.fragment.com/gift/Doge.webp",
            "https://nft.fragment.com/number/88801234567.webp",
            "https://nft.fragment.com/username/magic.webp"
        ];

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id).classList.add('active');
            if(id === 'b') initRoulette();
        }

        function initRoulette() {
            const t = document.getElementById('tape');
            t.innerHTML = '';
            for(let i=0; i<80; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                s.innerHTML = `<img src="${lootIcons[Math.floor(Math.random()*lootIcons.length)]}">`;
                t.appendChild(s);
            }
        }

        function run() {
            const b = document.getElementById('spin-btn');
            const t = document.getElementById('tape');
            b.disabled = true;
            t.style.transition = 'none';
            t.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                t.style.transition = '6s cubic-bezier(0.1, 0, 0.05, 1)';
                const stop = 4200 + Math.random()*300;
                t.style.transform = `translateX(-${stop}px)`;
            }, 50);

            setTimeout(() => {
                tg.sendData(JSON.stringify({action: "open_case"}));
                // Окно WebApp можно закрыть через пару сек или оставить
                setTimeout(() => { tg.close(); }, 1500);
            }, 6500);
        }

        // Эмуляция баланса (для красоты в UI)
        document.getElementById('bal-val').innerText = "FETCHING...";
        setTimeout(() => { document.getElementById('bal-val').innerText = "500+ ⭐"; }, 1000);
    </script>
</body>
</html>
