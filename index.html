<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { padding: 15px; border-bottom: 2px solid var(--gold); background: #000; text-align: center; font-size: 24px; font-weight: bold; color: var(--gold); }
        .section { display: none; height: 80vh; padding: 20px; box-sizing: border-box; text-align: center; }
        .active { display: block; }

        /* Рулетка */
        .roulette { position: relative; width: 100%; height: 180px; background: #0a0a0a; border: 1px solid #333; margin: 20px 0; overflow: hidden; border-radius: 15px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--gold); }
        .tape { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); align-items: center; height: 100%; }
        
        /* Слот с названием */
        .slot { min-width: 120px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        .slot img { width: 70px; height: 70px; object-fit: contain; }
        .slot b { display: block; font-size: 12px; color: #fff; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .slot span { font-size: 9px; color: var(--gold); }

        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; }
        .btn:disabled { background: #222; color: #444; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0c0c0c; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 12px; font-weight: bold; cursor: pointer; }
        .nav-item.active-nav { color: var(--gold); }

        .inv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-bottom: 100px; overflow-y: auto; height: 100%; }
        .inv-card { background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        .inv-card img { width: 100%; height: 50px; object-fit: contain; }
        .inv-card p { font-size: 10px; margin: 5px 0 0 0; color: #ccc; }
    </style>
</head>
<body>

    <div class="header">⭐ <span id="balance-val">0</span></div>

    <div id="tab-cases" class="section active">
        <div class="roulette">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">КРУТИТЬ (500 ⭐)</button>
    </div>

    <div id="tab-profile" class="section">
        <h3 style="color: var(--gold);">ИНВЕНТАРЬ</h3>
        <div id="inv-list" class="inv-grid"></div>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="switchTab('cases')">КЕЙСЫ</div>
        <div class="nav-item" onclick="switchTab('profile')">ПРОФИЛЬ</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ЗАГРУЗКА ДАННЫХ
        const params = new URLSearchParams(window.location.search);
        let urlBalance = parseInt(params.get('balance'));
        
        // Берем баланс из URL, если его нет — из памяти, если и там нет — 0
        let balance = !isNaN(urlBalance) ? urlBalance : (parseInt(localStorage.getItem('lydka_bal')) || 0);
        
        // Загружаем инвентарь из памяти
        let inventory = JSON.parse(localStorage.getItem('lydka_inv')) || [];

        const items = [
            {id: 'chill', name: 'Chill', img: 'Chill.png'},
            {id: 'mood', name: 'Mood', img: 'Mood.png'},
            {id: 'snoop', name: 'Snoop', img: 'Snoop.png'},
            {id: 'ufc', name: 'UFC', img: 'UFC.png'},
            {id: 'low', name: 'Low', img: 'Low.png'},
            {id: 'voodoo', name: 'Voodoo', img: 'Voodoo.png'},
            {id: 'stars', name: 'Stars', img: 'Stars.png'}
        ];

        function updateUI() {
            document.getElementById('balance-val').innerText = balance;
            document.getElementById('spin-btn').disabled = (balance < 500 || isSpinning);
            // Сохраняем состояние в память телефона
            localStorage.setItem('lydka_bal', balance);
            localStorage.setItem('lydka_inv', JSON.stringify(inventory));
        }

        function switchTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'profile') renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('inv-list');
            list.innerHTML = inventory.length ? '' : '<p style="color: #444;">Тут пока пусто...</p>';
            inventory.forEach(item => {
                list.innerHTML += `<div class="inv-card"><img src="img/${item.img}"><p>${item.name}</p></div>`;
            });
        }

        let isSpinning = false;

        function startSpin() {
            if (balance < 500 || isSpinning) return;

            isSpinning = true;
            balance -= 500; // Сразу визуально списываем
            updateUI();

            const tape = document.getElementById('tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            tape.innerHTML = '';

            // Генерируем 70 слотов для длинного прокрута
            for (let i = 0; i < 70; i++) {
                const it = items[Math.floor(Math.random() * items.length)];
                tape.innerHTML += `<div class="slot"><img src="img/${it.img}"><b>${it.name}</b><span>NFT GIFT</span></div>`;
            }

            const winIdx = 65; // Победный слот ближе к концу
            const winner = items[Math.floor(Math.random() * items.length)];
            const slots = tape.querySelectorAll('.slot');
            slots[winIdx].innerHTML = `<img src="img/${winner.img}"><b>${winner.name}</b><span>WINNER</span>`;

            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
                const shift = (winIdx * 120) - (window.innerWidth / 2) + 60;
                tape.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                
                if (winner.id === 'stars') {
                    balance += 1000;
                } else {
                    inventory.push(winner);
                }
                
                updateUI();
                
                // ТАКТИЛЬНАЯ ОТДАЧА
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                // ПОСЛЕДНИЙ ШАГ: отправка данных боту. 
                // Если бот настроен на автоматическое закрытие при получении данных - он закроет.
                // Но баланс уже сохранен в localStorage телефона!
                setTimeout(() => {
                    tg.sendData(JSON.stringify({action: "spin_done", win_id: winner.id}));
                }, 500);
                
            }, 5500);
        }

        updateUI();
        renderInventory();
    </script>
</body>
</html>
