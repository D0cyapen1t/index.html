<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #010101; --card-bg: #1c1c1e; --accent: #ffca28;
            --grad-blue: linear-gradient(135deg, #3a1cbb 0%, #5611d6 100%);
            --grad-red: linear-gradient(135deg, #b01a1a 0%, #e32c2c 100%);
            --text-main: #ffffff; --text-sub: #8e8e93;
        }
        body { 
            background: var(--bg); color: var(--text-main); font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; user-select: none;
        }

        /* Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: #000; position: sticky; top: 0; z-index: 100;
        }
        .balance-box {
            background: var(--card-bg); padding: 8px 16px; border-radius: 12px;
            display: flex; align-items: center; gap: 8px; font-weight: 800; border: 1px solid #2c2c2e;
        }
        .balance-box span { color: var(--accent); }

        /* Sections */
        .section { display: none; height: calc(100vh - 150px); padding: 15px; overflow-y: auto; box-sizing: border-box; }
        .active { display: block; }

        /* Menu Cards */
        .menu-container { display: flex; flex-direction: column; gap: 15px; }
        .mode-card {
            border-radius: 24px; padding: 25px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; min-height: 120px; justify-content: center;
            cursor: pointer;
        }
        .mode-card.crash { background: var(--grad-blue); }
        .mode-card.roulette { background: var(--grad-red); }
        .mode-card h2 { margin: 0; font-size: 24px; font-weight: 800; }
        .mode-card p { margin: 5px 0 0; font-size: 13px; opacity: 0.8; max-width: 60%; }
        .mode-card .icon { position: absolute; right: 15px; bottom: 10px; font-size: 60px; opacity: 0.9; }

        /* Roulette Core */
        .roulette-wrapper {
            position: relative; width: 100%; height: 180px; background: #000; 
            border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #2c2c2e;
        }
        .pointer { 
            position: absolute; left: 50%; top: 0; width: 4px; height: 100%; 
            background: var(--accent); z-index: 50; transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(255, 202, 40, 0.4);
        }
        .tape { display: flex; align-items: center; height: 100%; will-change: transform; transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1); }
        
        /* Universal Slot Style */
        .slot { 
            min-width: 140px; width: 140px; height: 150px; margin: 0 5px; 
            border-radius: 18px; background: var(--card-bg); overflow: hidden; 
            position: relative; display: flex; align-items: center; justify-content: center;
            border: 1px solid #2c2c2e; flex-shrink: 0;
        }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .slot-emoji { font-size: 50px; position: relative; z-index: 2; }
        .slot span { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.75); 
            font-size: 10px; padding: 8px 0; text-align: center; font-weight: 700; z-index: 3;
        }

        /* Profile Grid */
        .inv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-bottom: 20px; }

        /* UI Elements */
        .btn-action { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; text-transform: uppercase; margin-bottom: 10px; cursor: pointer; }
        .navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #121212; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2c2c2e; padding-bottom: 10px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); gap: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #fff; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); width: 80%; padding: 30px; border-radius: 24px; text-align: center; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 800; font-size: 20px;">LIVE</div>
    <div class="balance-box">⭐ <span id="bal-display">0</span></div>
</div>

<div id="tab-home" class="section active">
    <div class="menu-container">
        <div class="mode-card crash" onclick="nav('crash')">
            <h2>Краш</h2>
            <p>Успейте забрать выигрыш до взрыва</p>
            <div class="icon">🚀</div>
        </div>
        <div class="mode-card roulette" onclick="nav('roulette')">
            <h2>Рулетка</h2>
            <p>Крутите и получайте призы</p>
            <div class="icon">👜</div>
        </div>
    </div>
</div>

<div id="tab-roulette" class="section">
    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>
    <button class="btn-action" id="spin-btn" onclick="startSpin()">ОТКРЫТЬ (500 ⭐)</button>
    <button class="btn-action" style="background:#333; color:#fff;" onclick="nav('home')">НАЗАД</button>
</div>

<div id="tab-profile" class="section">
    <h2 style="margin: 0 0 20px 0;">Инвентарь</h2>
    <div id="inv-list" class="inv-grid"></div>
</div>

<nav class="navbar">
    <div id="nav-home" class="nav-item active" onclick="nav('home')">🎮 Игры</div>
    <div id="nav-profile" class="nav-item" onclick="nav('profile')">👤 Профиль</div>
</nav>

<div id="win-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color:var(--accent);">ВЫИГРЫШ!</h2>
        <div id="win-item-box" style="margin: 20px 0; display:flex; justify-content:center;"></div>
        <button class="btn-action" onclick="closeModal()">ЗАБРАТЬ</button>
    </div>
</div>

<script>
    const items = [
        {name: 'UFC STRICE', img: 'UFC.png', price: 1450},
        {name: 'Chill Flame', img: 'Chill.png', price: 450},
        {name: 'Low Rider', img: 'Low.png', price: 4000},
        {name: 'Lunar Snake', img: 'Snake.png', price: 300},
        {name: 'Eternal Rose', img: 'Rose.png', price: 2300},
        {name: 'Diamond Ring', img: 'Ring.png', price: 2500},
        {name: 'Toy Bear', img: 'Bear.png', price: 3100},
        {name: 'Westside Sign', img: 'Sign.png', price: 8000},
        {name: '150 Stars', img: '⭐', val: 150}
    ];

    let bal = parseInt(localStorage.getItem('bal')) || 0; 
    let inv = JSON.parse(localStorage.getItem('inv')) || [];
    let isBusy = false;

    function sync() {
        document.getElementById('bal-display').innerText = bal.toLocaleString();
        localStorage.setItem('bal', bal);
        localStorage.setItem('inv', JSON.stringify(inv));
    }

    function nav(id) {
        if(isBusy) return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + (id === 'profile' ? 'profile' : 'home')).classList.add('active');
        if(id === 'profile') renderInv();
    }

    function startSpin() {
        if(bal < 500 || isBusy) return;
        bal -= 500; isBusy = true; sync();

        const tape = document.getElementById('tape');
        const slotWidth = 150; 
        const winIdx = 40;
        const prize = items[Math.floor(Math.random() * items.length)];
        
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';

        // Генерируем ленту
        for(let i = 0; i < 55; i++) {
            let it = (i === winIdx) ? prize : items[Math.floor(Math.random() * items.length)];
            const content = it.img === '⭐' ? `<div class="slot-emoji">⭐</div>` : `<img src="img/${it.img}">`;
            tape.innerHTML += `<div class="slot">${content}<span>${it.name}</span></div>`;
        }

        setTimeout(() => {
            tape.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.05, 1)';
            const center = window.innerWidth / 2;
            const finalPos = (winIdx * slotWidth) + (slotWidth / 2) - center;
            tape.style.transform = `translateX(-${finalPos}px)`;
        }, 50);

        setTimeout(() => {
            if(prize.val) bal += prize.val; else inv.push(prize);
            showWin(prize);
            isBusy = false; sync();
        }, 7200);
    }

    function showWin(it) {
        document.getElementById('win-modal').style.display = 'flex';
        const content = it.img === '⭐' ? `<div class="slot-emoji">⭐</div>` : `<img src="img/${it.img}">`;
        document.getElementById('win-item-box').innerHTML = `<div class="slot" style="margin:0;">${content}<span>${it.name}</span></div>`;
    }

    function closeModal() { document.getElementById('win-modal').style.display = 'none'; }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inv.length ? '' : '<p style="grid-column: 1/3; opacity: 0.4; text-align:center; padding: 40px 0;">Инвентарь пуст</p>';
        inv.forEach((it, idx) => {
            const content = it.img === '⭐' ? `<div class="slot-emoji">⭐</div>` : `<img src="img/${it.img}">`;
            list.innerHTML += `
                <div class="slot" style="width: 100%; margin: 0;" onclick="sellItem(${idx})">
                    ${content}
                    <span>${it.name}</span>
                </div>`;
        });
    }

    function sellItem(idx) {
        const item = inv[idx];
        if(confirm(`Продать ${item.name} за ${item.price} ⭐?`)) {
            bal += item.price;
            inv.splice(idx, 1);
            sync(); renderInv();
        }
    }

    sync();
</script>
</body>
</html>
