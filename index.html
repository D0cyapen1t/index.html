<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffca28; --bg: #0b0d10; --card: #161920; --accent: #232731; 
            --red: #ff4757; --green: #2ed573;
        }
        body { 
            background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; user-select: none;
        }
        .header { 
            padding: 20px 15px; background: linear-gradient(to bottom, #161920, transparent);
            display: flex; justify-content: center; position: relative; z-index: 10;
        }
        .balance-pill { 
            background: rgba(0,0,0,0.6); border: 2px solid var(--gold); 
            padding: 10px 30px; border-radius: 100px; font-size: 22px; font-weight: 900; 
            color: var(--gold); box-shadow: 0 0 15px rgba(255, 202, 40, 0.3);
        }
        .section { display: none; height: calc(100vh - 160px); padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Обновленный дизайн слотов под скриншот */
        .roulette-container { 
            position: relative; width: 100%; height: 220px; background: #050608; 
            border-radius: 28px; overflow: hidden; border: 2px solid var(--accent); margin-top: 10px;
        }
        .pointer { 
            position: absolute; left: 50%; top: 0; width: 4px; height: 100%; 
            background: var(--gold); z-index: 20; transform: translateX(-50%);
            box-shadow: 0 0 25px var(--gold);
        }
        .tape { display: flex; align-items: center; height: 100%; }
        
        .slot { 
            min-width: 140px; width: 140px; height: 180px; 
            display: flex; flex-direction: column; 
            background: #2d4a3e; /* Фон как на скрине UFC */
            margin: 0 6px; border-radius: 24px; flex-shrink: 0; 
            overflow: hidden; position: relative;
        }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-emoji { font-size: 60px; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        /* Черная плашка с названием внизу */
        .slot-label {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8);
            padding: 8px 0; text-align: center; color: #fff;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
        }

        .crash-area { 
            background: #090a0d; border-radius: 30px; height: 240px; display: flex; 
            align-items: center; justify-content: center; border: 2px solid var(--accent); margin-bottom: 20px;
        }
        #mult { font-size: 70px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(255, 202, 40, 0.5); }
        
        .btn-main { 
            background: linear-gradient(135deg, #ffca28, #ff8f00); color: #000; border: none; 
            width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; font-size: 18px; 
            text-transform: uppercase; cursor: pointer;
        }
        .btn-stop { background: linear-gradient(135deg, #ff4757, #ff6b81); color: #fff; }

        .navbar { 
            position: fixed; bottom: 0; width: 100%; height: 80px; background: #161920; 
            display: flex; border-top: 1px solid var(--accent); padding-bottom: 15px;
        }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #5b626e; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }

        .modal-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-win { background: var(--card); padding: 40px 20px; border-radius: 35px; border: 2px solid var(--gold); text-align: center; width: 85%; }
    </style>
</head>
<body>

<div class="header"><div class="balance-pill">⭐ <span id="balance-val">0</span></div></div>

<div id="win-modal" class="modal-overlay">
    <div class="modal-win">
        <h2 id="win-title" style="color:var(--gold); margin:0;">ВЫПАЛО!</h2>
        <div id="win-content" style="padding: 20px 0; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="btn-main" onclick="claimReward()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="tab-roulette" class="section active">
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>
    <div style="text-align:center; margin: 15px 0;">
        <label style="font-size:14px; font-weight:700; cursor:pointer;"><input type="checkbox" id="demo-mode"> ДЕМО-РЕЖИМ</label>
    </div>
    <button class="btn-main" id="spin-btn" onclick="startRoulette()">ОТКРЫТЬ (500 ⭐)</button>
</div>

<div id="tab-crash" class="section">
    <div class="crash-area"><div id="mult">1.00x</div></div>
    <input type="number" id="bet-input" value="25" style="width:100%; padding:20px; background:#1c212a; border:2px solid var(--accent); color:#fff; border-radius:18px; margin-bottom:15px; text-align:center; font-size:18px; font-weight:900;">
    <button class="btn-main" id="crash-btn" onclick="handleCrash()">ПОЕХАЛИ!</button>
</div>

<div id="tab-inv" class="section">
    <h3 style="color:var(--gold); margin-bottom:20px;">ИНВЕНТАРЬ</h3>
    <div id="inv-list" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="nav('roulette')">📦<b>КЕЙСЫ</b></div>
    <div class="nav-btn" onclick="nav('crash')">🚀<b>КРАШ</b></div>
    <div class="nav-btn" onclick="nav('inv')">👤<b>ПРОФИЛЬ</b></div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const gifts = [
        {name: 'UFC STRICE', img: 'UFC.png', price: 1450, color: '#2d4a3e'},
        {name: 'Chill Flame', img: 'Chill.png', price: 450, color: '#2d334a'},
        {name: 'Low Rider', img: 'Low.png', price: 4000, color: '#4a2d3a'},
        {name: 'Lunar Snake', img: 'Snake.png', price: 300, color: '#2d4a3e'},
        {name: 'Eternal Rose', img: 'Rose.png', price: 2300, color: '#4a2d3a'},
        {name: 'Diamond Ring', img: 'Ring.png', price: 2500, color: '#3a2d4a'},
        {name: 'Toy Bear', img: 'Bear.png', price: 3100, color: '#4a442d'},
        {name: 'Westside Sign', img: 'Sign.png', price: 8000, color: '#2d2d2d'},
        {name: '150 Stars', img: '⭐', val: 150, color: '#161920'}
    ];

    let balance = parseInt(new URLSearchParams(window.location.search).get('balance')) || parseInt(localStorage.getItem('user_bal')) || 0;
    let inventory = JSON.parse(localStorage.getItem('user_inv')) || [];
    let isBusy = false;
    let currentPrize = null;

    function sync() {
        localStorage.setItem('user_bal', balance);
        localStorage.setItem('user_inv', JSON.stringify(inventory));
        document.getElementById('balance-val').innerText = balance.toLocaleString();
    }

    function nav(id) {
        if(isBusy && id !== 'crash') return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(id === 'inv') renderInv();
    }

    function createSlotHTML(item) {
        const icon = item.img === '⭐' ? `<div class="slot-emoji">⭐</div>` : `<img src="img/${item.img}">`;
        return `
            <div class="slot" style="background: ${item.color || '#161920'}">
                ${icon}
                <div class="slot-label">${item.name}</div>
            </div>
        `;
    }

    function startRoulette() {
        const isDemo = document.getElementById('demo-mode').checked;
        if(!isDemo && (balance < 500 || isBusy)) return;
        if(!isDemo) balance -= 500;
        isBusy = true; sync();

        const tape = document.getElementById('tape'), winIdx = 40;
        currentPrize = gifts[Math.floor(Math.random() * gifts.length)];
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)'; tape.innerHTML = '';

        for(let i=0; i<55; i++) {
            let it = (i === winIdx) ? currentPrize : gifts[Math.floor(Math.random() * gifts.length)];
            tape.innerHTML += createSlotHTML(it);
        }
        setTimeout(() => {
            tape.style.transition = 'transform 7s cubic-bezier(0.15, 0, 0.05, 1)';
            tape.style.transform = `translateX(-${(winIdx * 152) - (window.innerWidth / 2) + 76}px)`;
        }, 50);
        setTimeout(() => {
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-title').innerText = isDemo ? "ДЕМО-ВЫИГРЫШ" : "ВЫПАЛО!";
            
            const winContent = document.getElementById('win-content');
            winContent.innerHTML = `
                <div class="slot" style="width: 160px; height: 200px; background: ${currentPrize.color}">
                    ${currentPrize.img === '⭐' ? '<div class="slot-emoji">⭐</div>' : `<img src="img/${currentPrize.img}">`}
                    <div class="slot-label" style="font-size: 14px; padding: 12px 0;">${currentPrize.name}</div>
                </div>
            `;
        }, 7500);
    }

    function claimReward() {
        const isDemo = document.getElementById('demo-mode').checked;
        if(!isDemo) {
            if(currentPrize.val) balance += currentPrize.val; 
            else inventory.push(currentPrize);
        }
        document.getElementById('win-modal').style.display = 'none';
        isBusy = false; sync();
    }

    let crashActive = false, crashVal = 1.0, crashTimer, currentBet = 0;
    
    function handleCrash() {
        const btn = document.getElementById('crash-btn');
        if (crashActive) {
            balance += Math.floor(currentBet * crashVal);
            stopCrash(true); return;
        }
        const bet = parseInt(document.getElementById('bet-input').value);
        if(!bet || bet < 25 || bet > balance) return;
        
        currentBet = bet; balance -= bet; isBusy = true; crashActive = true; sync();
        btn.classList.add('btn-stop');
        
        let isInstantLoss = Math.random() < 0.32;
        let boom = isInstantLoss ? 1.00 : (1.05 + Math.random() * 5).toFixed(2);
        
        if(isInstantLoss) { setTimeout(() => stopCrash(false), 400); return; }

        crashTimer = setInterval(() => {
            crashVal += 0.01;
            const currentWin = Math.floor(currentBet * crashVal);
            document.getElementById('mult').innerText = crashVal.toFixed(2) + "x";
            btn.innerText = `ЗАБРАТЬ ${currentWin} ⭐`; // Динамическая сумма на кнопке
            
            if(crashVal >= boom) stopCrash(false);
        }, 80);
    }

    function stopCrash(win) {
        clearInterval(crashTimer); crashActive = false; isBusy = false;
        const m = document.getElementById('mult');
        m.innerText = win ? crashVal.toFixed(2) + "x" : "BOOM!";
        m.style.color = win ? "var(--green)" : "var(--red)";
        const btn = document.getElementById('crash-btn');
        btn.innerText = "ПОЕХАЛИ!"; btn.classList.remove('btn-stop');
        setTimeout(() => {
            m.innerText = "1.00x"; m.style.color = "var(--gold)";
            crashVal = 1.0; sync();
        }, 2000);
    }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inventory.length ? '' : '<p style="grid-column:1/3; opacity:0.5; text-align:center;">ПУСТО</p>';
        inventory.forEach((it, i) => {
            list.innerHTML += `
                <div onclick="sell(${i})" style="cursor:pointer">
                    ${createSlotHTML(it).replace('slot-label', 'slot-label" style="background: rgba(255,0,0,0.6);')} 
                </div>`;
        });
    }

    function sell(i) {
        const item = inventory[i];
        const sellPrice = item.price ? Math.floor(item.price * 0.8) : 0;
        if(confirm(`Продать ${item.name} за ${sellPrice} ⭐?`)) {
            balance += sellPrice; inventory.splice(i, 1); sync(); renderInv();
        }
    }

    sync();
</script>
</body>
</html>
