<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #1c212a; --accent: #31d158; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        .header { padding: 20px; background: #161b22; border-bottom: 1px solid #2d343f; font-weight: bold; }
        
        .roulette { position: relative; width: 100%; height: 160px; background: #05070a; margin: 20px 0; overflow: hidden; }
        .marker { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--accent); z-index: 10; }
        .tape { display: flex; position: absolute; top: 30px; transition: 6s cubic-bezier(0.1, 0, 0, 1); }
        
        .slot { min-width: 120px; height: 100px; margin: 0 10px; background: var(--card); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; }
        .slot img { width: 70px; height: 70px; margin-bottom: 5px; }

        .btn { width: 90%; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-spin { background: var(--accent); color: #000; }
        .btn-claim { background: #f5a623; color: #000; display: none; }
        
        #win-display { display: none; margin-top: 20px; padding: 20px; background: var(--card); border-radius: 20px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div class="header">SWILL HUB</div>

    <div id="main-ui">
        <div class="roulette">
            <div class="marker"></div>
            <div id="tape" class="tape"></div>
        </div>

        <button class="btn btn-spin" id="spin-btn" onclick="spin()">ОТКРЫТЬ КЕЙС (1000 ⭐)</button>
        
        <div id="win-display">
            <h3 id="win-name">Предмет</h3>
            <button class="btn" style="background:#f5a623" onclick="claim()">ЗАБРАТЬ В КОШЕЛЕК</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Пул предметов с твоими ID
        const items = [
            {id: "CookieHeart-111857", name: "Cookie Heart #111857", type: "gift"},
            {id: "KissFrog-54211", name: "Kiss Frog #54211", type: "gift"},
            {id: "news", name: "@news", type: "username"},
            {id: "88808888888", name: "+888 0888", type: "number"}
        ];

        function getImg(item) {
            // Генерируем прямую ссылку на превью через сервер Fragment
            const t = item.type === 'gift' ? 'gift' : (item.type === 'username' ? 'username' : 'number');
            return `https://nft.fragment.com/${t}/${item.id.split('-')[0]}.webp`;
        }

        function init() {
            const t = document.getElementById('tape');
            t.innerHTML = '';
            for(let i=0; i<80; i++) {
                const it = items[Math.floor(Math.random()*items.length)];
                t.innerHTML += `<div class="slot"><img src="${getImg(it)}"><span>${it.name}</span></div>`;
            }
        }

        let won = null;

        function spin() {
            const btn = document.getElementById('spin-btn');
            const tape = document.getElementById('tape');
            btn.disabled = true;
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = '6s cubic-bezier(0.1, 0, 0, 1)';
                tape.style.transform = `translateX(-${4000 + Math.random()*400}px)`;
            }, 50);

            setTimeout(() => {
                won = items[Math.floor(Math.random()*items.length)];
                document.getElementById('win-name').innerText = won.name;
                document.getElementById('spin-btn').style.display = 'none';
                document.getElementById('win-display').style.display = 'block';
            }, 6500);
        }

        function claim() {
            // Отправляем ID конкретного NFT боту
            tg.sendData(JSON.stringify(won));
            tg.close();
        }

        init();
    </script>
</body>
</html>
