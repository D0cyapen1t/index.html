<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #0d0d0d; --card: #1a1a1a; --accent: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Хедер */
        .header { padding: 20px; background: linear-gradient(180deg, #000, var(--bg)); border-bottom: 1px solid #333; text-align: center; }
        .bal-box { font-size: 28px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); }

        .section { display: none; height: 85vh; padding: 20px; box-sizing: border-box; text-align: center; }
        .active { display: block; }

        /* Красивая рулетка */
        .roulette-wrapper { position: relative; width: 100%; height: 200px; background: #050505; border: 2px solid #222; margin: 25px 0; overflow: hidden; border-radius: 20px; box-shadow: inset 0 0 30px #000; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 20px var(--gold); border-radius: 2px; }
        .tape { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0.05, 1); align-items: center; height: 100%; }
        
        .slot { min-width: 140px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; margin: 0 5px; background: rgba(255,255,255,0.03); border-radius: 15px; border: 1px solid #222; }
        .slot img, .slot .stars-fallback { width: 85px; height: 85px; object-fit: contain; margin-bottom: 10px; }
        .slot .stars-fallback { font-size: 60px; display: flex; align-items: center; justify-content: center; }
        .slot b { font-size: 13px; color: #eee; text-transform: uppercase; letter-spacing: 1px; }

        /* Кнопки */
        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: 0.3s; }
        .btn:disabled { background: #222; color: #444; box-shadow: none; }
        
        /* Модалка выигрыша */
        #win-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        #win-item-img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 20px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; font-weight: bold; }
        .nav-item.active-nav { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header"><div class="bal-box">⭐ <span id="balance">0</span></div></div>

    <div id="win-modal">
        <h2 style="color: var(--gold);">ВЫ ВЫИГРАЛИ!</h2>
        <div id="win-info"></div>
        <button class="btn" style="width: 200px; margin-top: 20px;" onclick="claimReward()">ЗАБРАТЬ</button>
    </div>

    <div id="tab-cases" class="section active">
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button class="btn" id="spin-btn" onclick="startSpin()">ОТКРЫТЬ КЕЙС (500 ⭐)</button>
    </div>

    <div id="tab-profile" class="section">
        <h3 style="color: var(--gold);">ИНВЕНТАРЬ</h3>
        <div id="inventory-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;"></div>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="showTab('cases')">📦 КЕЙСЫ</div>
        <div class="nav-item" onclick="showTab('profile')">👤 ПРОФИЛЬ</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const items = [
            {id: 'chill', name: 'Chill Flame', img: 'Chill.png'},
            {id: 'mood', name: 'Mood Pack', img: 'Mood.png'},
            {id: 'snoop', name: 'Snoop Dogs', img: 'Snoop.png'},
            {id: 'ufc', name: 'UFC Strike', img: 'UFC.png'},
            {id: 'low', name: 'Low Rider', img: 'Low.png'},
            {id: 'voodoo', name: 'Voodoo Doll', img: 'Voodoo.png'},
            {id: 'stars', name: '1000 Stars', img: '⭐'} // Замена картинки на эмодзи
        ];

        let balance = parseInt(new URLSearchParams(window.location.search).get('balance')) || parseInt(localStorage.getItem('bal')) || 0;
        let inventory = JSON.parse(localStorage.getItem('inv')) || [];
        let lastWinner = null;

        function sync() {
            localStorage.setItem('bal', balance);
            localStorage.setItem('inv', JSON.stringify(inventory));
            document.getElementById('balance').innerText = balance;
            document.getElementById('spin-btn').disabled = balance < 500;
        }

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'profile') renderInv();
        }

        function renderInv() {
            const container = document.getElementById('inventory-grid');
            container.innerHTML = inventory.length ? '' : 'Пусто';
            inventory.forEach(i => {
                const icon = i.img === '⭐' ? '<div style="font-size:40px">⭐</div>' : `<img src="img/${i.img}" style="width:100%">`;
                container.innerHTML += `<div style="background:#1a1a1a; padding:10px; border-radius:10px;">${icon}<p style="font-size:9px">${i.name}</p></div>`;
            });
        }

        function getItemHTML(item) {
            const content = item.img === '⭐' ? `<div class="stars-fallback">⭐</div>` : `<img src="img/${item.img}">`;
            return `<div class="slot">${content}<b>${item.name}</b></div>`;
        }

        function startSpin() {
            if(balance < 500) return;
            balance -= 500;
            sync();

            const tape = document.getElementById('tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            tape.innerHTML = '';

            for(let i=0; i<70; i++) {
                tape.innerHTML += getItemHTML(items[Math.floor(Math.random()*items.length)]);
            }

            const winIdx = 65;
            lastWinner = items[Math.floor(Math.random()*items.length)];
            const slots = tape.querySelectorAll('.slot');
            slots[winIdx].innerHTML = (lastWinner.img === '⭐' ? `<div class="stars-fallback">⭐</div>` : `<img src="img/${lastWinner.img}">`) + `<b>${lastWinner.name}</b>`;

            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.05, 1)';
                const shift = (winIdx * 150) - (window.innerWidth / 2) + 75;
                tape.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                document.getElementById('win-modal').style.display = 'flex';
                const icon = lastWinner.img === '⭐' ? '<div style="font-size:100px">⭐</div>' : `<img src="img/${lastWinner.img}" id="win-item-img">`;
                document.getElementById('win-info').innerHTML = `${icon}<h3>${lastWinner.name}</h3>`;
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 5500);
        }

        function claimReward() {
            if(lastWinner.id === 'stars') {
                balance += 1000;
            } else {
                inventory.push(lastWinner);
            }
            document.getElementById('win-modal').style.display = 'none';
            lastWinner = null;
            sync();
        }

        sync();
    </script>
</body>
</html>
