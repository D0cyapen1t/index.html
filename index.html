<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #1c212a; --accent: #248bf2; --gold: #f5a623; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Вкладки */
        .tabs { display: flex; background: var(--card); border-bottom: 1px solid #2d343f; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; color: #8e959b; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Рулетка */
        .roulette { position: relative; width: 100%; height: 140px; background: #05070a; margin: 20px 0; overflow: hidden; border-radius: 10px; }
        .line { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--accent); z-index: 10; box-shadow: 0 0 10px var(--accent); }
        .tape { display: flex; position: absolute; transition: 6s cubic-bezier(0.1, 0, 0.05, 1); top: 20px; }
        .slot { min-width: 100px; height: 100px; margin: 0 5px; background: var(--card); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 75px; height: 75px; object-fit: contain; }

        .btn { width: 100%; padding: 18px; background: var(--accent); border: none; color: white; border-radius: 12px; font-weight: bold; font-size: 16px; }
        .btn:disabled { opacity: 0.5; }
        
        .item-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; }
        .item-card img { width: 40px; margin-right: 15px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="t-h" class="tab active" onclick="nav('h')">HUB</div>
        <div id="t-b" class="tab" onclick="nav('b')">CASE</div>
        <div id="t-w" class="tab" onclick="nav('w')">WALLET</div>
    </div>

    <div id="h" class="page active">
        <h2 style="color: var(--gold);">FRAGMENT NUMBERS</h2>
        <p>Испытай удачу и выбей самый дорогой анонимный номер +888.</p>
        <div class="item-card"><img src="https://nft.fragment.com/number/88808888888.webp"> <span>Premium Numbers</span></div>
    </div>

    <div id="b" class="page">
        <div class="roulette">
            <div class="line"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button class="btn" id="go" onclick="spin()">ОТКРЫТЬ (500 ⭐)</button>
    </div>

    <div id="w" class="page">
        <h2>ИНВЕНТАРЬ</h2>
        <div id="inventory-list">
            <p style="color: #8e959b;">Здесь появятся твои выбитые номера.</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('t-' + id).classList.add('active');
            if(id === 'b') fill();
        }

        const numbers = [
            "https://nft.fragment.com/number/88808888888.webp",
            "https://nft.fragment.com/number/88800001111.webp",
            "https://nft.fragment.com/number/88805555555.webp",
            "https://nft.fragment.com/number/88801234567.webp"
        ];

        function fill() {
            const t = document.getElementById('tape');
            t.innerHTML = '';
            for(let i=0; i<80; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                s.innerHTML = `<img src="${numbers[Math.floor(Math.random()*numbers.length)]}">`;
                t.appendChild(s);
            }
        }

        function spin() {
            const b = document.getElementById('go');
            const t = document.getElementById('tape');
            b.disabled = true;
            t.style.transition = 'none';
            t.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                t.style.transition = '6s cubic-bezier(0.1, 0, 0.05, 1)';
                const shift = 4000 + Math.random()*300;
                t.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                // ВАЖНО: отправляем данные боту
                tg.sendData(JSON.stringify({action: "open_case"}));
                b.disabled = false;
            }, 6500);
        }
    </script>
</body>
</html>
