<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #f2c94c; 
            --bg: radial-gradient(circle at top, #1a1c20 0%, #000000 100%); 
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --item-w: 140px; /* Фикс ширина для точности рулетки */
        }

        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh; }

        /* HEADER & LIVE */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; position: relative; z-index: 100;}
        .live-feed { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--glass-border); min-width: 150px; transition: 0.3s; }
        .live-icon { width: 16px; height: 16px; object-fit: contain; }
        .balance-pill { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 12px; font-size: 14px; font-weight: 900; color: var(--gold); }

        .section { display: none; height: calc(100vh - 130px); padding: 15px; box-sizing: border-box; overflow-y: auto; padding-bottom: 80px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS */
        .game-card { border-radius: 24px; padding: 20px; min-height: 100px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .card-crash { background: linear-gradient(135deg, #2f80ed, #56ccf2); }
        .card-roulette { background: linear-gradient(135deg, #eb5757, #f2994a); }
        .card-frogs { background: linear-gradient(135deg, #27ae60, #6fcf97); }

        /* CRASH HISTORY */
        #crash-history-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .hist-x { padding: 4px 10px; border-radius: 8px; background: var(--glass); border: 1px solid var(--glass-border); font-size: 11px; font-weight: 900; }

        /* ROULETTE WINDOW */
        .roulette-container { height: 160px; background: rgba(0,0,0,0.4); border-radius: 24px; overflow: hidden; position: relative; border: 1px solid var(--glass-border); margin: 15px 0; }
        .tape { display: flex; will-change: transform; align-items: center; height: 100%; }
        .tape-item { 
            min-width: var(--item-w); max-width: var(--item-w); height: 140px; margin: 0 5px; 
            border-radius: 18px; position: relative; overflow: hidden; 
            background: #1c1f24; display: flex; align-items: center; justify-content: center;
        }
        .tape-item img { width: 75%; height: 75%; object-fit: contain; }
        .tape-item .label { 
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); 
            padding: 8px 5px; font-size: 10px; font-weight: 800; text-align: center; text-transform: uppercase;
        }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--gold); }

        /* FROGS */
        .frogs-grid { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .frog-box { width: 90px; height: 110px; background: var(--glass); border: 2px dashed var(--glass-border); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; }
        .frog-box.open { background: rgba(255,255,255,0.1); border-style: solid; border-color: var(--gold); }

        /* UI ELEMENTS */
        .btn-main { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: 900; font-size: 16px; cursor: pointer; }
        .btn-stop { background: #ff4757 !important; color: #fff !important; }
        .btn-back { background: none; border: none; color: #555; width: 100%; padding: 15px; font-weight: 700; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--glass-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: #fff; }

        .modal-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-win { background: #16181d; padding: 30px; border-radius: 35px; border: 2px solid var(--gold); text-align: center; width: 75%; }
        
        #inv-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .inv-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="live-feed" id="live-feed">⚡ Загрузка...</div>
    <div class="balance-pill">⭐ <span id="balance-val">0</span></div>
</div>

<div id="win-modal" class="modal-overlay">
    <div class="modal-win">
        <h2 style="color:var(--gold); margin:0;">ВЫПАЛО!</h2>
        <div id="win-content" style="padding: 25px 0; font-weight: 900;"></div>
        <button class="btn-main" onclick="claimReward()">ЗАБРАТЬ</button>
    </div>
</div>

<!-- ИГРЫ -->
<div id="tab-games" class="section active">
    <div class="game-card card-crash" onclick="nav('crash')">
        <div><h2>Краш</h2><p>Умножай звезды</p></div><span style="font-size:40px">🚀</span>
    </div>
    <div class="game-card card-roulette" onclick="nav('roulette')">
        <div><h2>Рулетка</h2><p>Испытай удачу</p></div><span style="font-size:40px">🎡</span>
    </div>
    <div class="game-card card-frogs" onclick="nav('frogs')">
        <div><h2>Лягушки</h2><p>Угадай бокс</p></div><span style="font-size:40px">📦</span>
    </div>
</div>

<!-- КРАШ -->
<div id="game-crash" class="section">
    <div id="crash-history-bar"></div>
    <div style="background:var(--glass); height:180px; border-radius:30px; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
        <div id="mult" style="font-size:60px; font-weight:900; color:var(--gold);">1.00x</div>
    </div>
    <input type="number" id="bet-input" value="100" style="width:100%; padding:15px; background:var(--glass); border:1px solid var(--glass-border); color:#fff; border-radius:15px; margin-bottom:10px; text-align:center; font-weight:900;">
    <button class="btn-main" id="crash-btn" onclick="handleCrash()">ПОСТАВИТЬ</button>
    <button class="btn-back" onclick="nav('games')">НАЗАД</button>
</div>

<!-- ЛЯГУШКИ -->
<div id="game-frogs" class="section">
    <h3 style="text-align:center">ВЫБЕРИ БОКС (300 ⭐)</h3>
    <div class="frogs-grid">
        <div class="frog-box" onclick="playFrogs(0)">📦</div>
        <div class="frog-box" onclick="playFrogs(1)">📦</div>
        <div class="frog-box" onclick="playFrogs(2)">📦</div>
    </div>
    <button class="btn-back" onclick="nav('games')">НАЗАД</button>
</div>

<!-- РУЛЕТКА -->
<div id="game-roulette" class="section">
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape-roulette" class="tape"></div>
    </div>
    <button class="btn-main" onclick="startSpin('tape-roulette', 500)">КРУТИТЬ (500 ⭐)</button>
    <button class="btn-back" onclick="nav('games')">НАЗАД</button>
</div>

<!-- ЕЖЕДНЕВНЫЙ КЕЙС -->
<div id="tab-earn" class="section">
    <h2 style="text-align:center; color:var(--gold)">DAILY CASE</h2>
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape-case" class="tape"></div>
    </div>
    <button class="btn-main" onclick="startSpin('tape-case', 0)">ОТКРЫТЬ БЕСПЛАТНО</button>
</div>

<!-- ИНВЕНТАРЬ -->
<div id="tab-inv" class="section">
    <h2 style="color:var(--gold)">ИНВЕНТАРЬ</h2>
    <div id="inv-list"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="nav('games')">🎮<span>Игры</span></div>
    <div class="nav-btn" onclick="nav('earn')">🎁<span>Бонус</span></div>
    <div class="nav-btn" onclick="nav('inv')">👤<span>Профиль</span></div>
</nav>

<script>
    const gifts = [
        {name: 'UFC STRIKE', img: 'UFC.png', price: 1450},
        {name: 'Chill Flame', img: 'Chill.png', price: 450},
        {name: 'Low Rider', img: 'Low.png', price: 4000},
        {name: 'Lunar Snake', img: 'Snake.png', price: 300},
        {name: 'Eternal Rose', img: 'Rose.png', price: 2300},
        {name: 'Diamond Ring', img: 'Ring.png', price: 2500},
        {name: 'Toy Bear', img: 'Bear.png', price: 3100},
        {name: 'Westside Sign', img: 'Sign.png', price: 8000},
        {name: '150 Stars', img: '⭐', val: 150, price: 150}
    ];

    let balance = parseInt(localStorage.getItem('user_bal')) || 5000;
    let inventory = JSON.parse(localStorage.getItem('user_inv')) || [];
    let hist = [1.05, 2.50, 1.12, 10.40];
    let isBusy = false;
    let currentPrize = null;

    function sync() {
        localStorage.setItem('user_bal', balance);
        localStorage.setItem('user_inv', JSON.stringify(inventory));
        document.getElementById('balance-val').innerText = balance.toLocaleString();
    }

    function nav(id) {
        if(isBusy) return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id.startsWith('game') ? id : 'tab-'+id);
        if(target) target.classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach((b, i) => {
            const keys = ['games', 'earn', 'inv'];
            b.classList.toggle('active', keys[i] === id);
        });
        if(id === 'inv') renderInv();
        if(id === 'crash') renderCrashHist();
    }

    // LIVE FEED
    setInterval(() => {
        const g = gifts[Math.floor(Math.random()*gifts.length)];
        const feed = document.getElementById('live-feed');
        feed.style.opacity = 0;
        setTimeout(() => {
            const icon = g.img === '⭐' ? '⭐' : `<img src="img/${g.img}" class="live-icon">`;
            feed.innerHTML = `${icon} <span>Выбил ${g.name}</span>`;
            feed.style.opacity = 1;
        }, 300);
    }, 4000);

    // SPIN SYSTEM (Fix)
    function startSpin(tapeId, cost) {
        if(isBusy || balance < cost) return;
        isBusy = true; balance -= cost; sync();

        const tape = document.getElementById(tapeId);
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';

        const winIdx = 40; // Индекс выигрышного элемента
        const totalItems = 50;
        const items = [];

        for(let i=0; i<totalItems; i++) {
            const g = i === winIdx ? gifts[Math.floor(Math.random()*gifts.length)] : gifts[Math.floor(Math.random()*gifts.length)];
            if(i === winIdx) currentPrize = g;
            
            const el = document.createElement('div');
            el.className = 'tape-item';
            const icon = g.img === '⭐' ? '<span style="font-size:40px">⭐</span>' : `<img src="img/${g.img}">`;
            el.innerHTML = `${icon}<div class="label">${g.name}</div>`;
            tape.appendChild(el);
        }

        setTimeout(() => {
            const itemFullW = 140 + 10; // ширина + margin
            const centerOffset = document.querySelector('.roulette-container').offsetWidth / 2;
            const finalPos = (winIdx * itemFullW) - centerOffset + (itemFullW / 2);
            
            tape.style.transition = 'transform 6s cubic-bezier(0.15, 0, 0.1, 1)';
            tape.style.transform = `translateX(-${finalPos}px)`;
        }, 50);

        setTimeout(() => {
            showWin(currentPrize);
        }, 6500);
    }

    // CRASH
    let crashActive = false, crashVal = 1.0, crashTimer;
    function handleCrash() {
        if(crashActive || isBusy) return;
        const bet = parseInt(document.getElementById('bet-input').value);
        if(!bet || bet > balance) return;
        
        balance -= bet; sync();
        crashActive = true; crashVal = 1.0;
        const btn = document.getElementById('crash-btn');
        btn.classList.add('btn-stop'); btn.innerText = "ЗАБРАТЬ";

        let limit = Math.random() * 5 + 1;
        if(Math.random() < 0.2) limit = 1.0;

        crashTimer = setInterval(() => {
            crashVal += 0.01;
            document.getElementById('mult').innerText = crashVal.toFixed(2) + "x";
            if(crashVal >= limit) {
                clearInterval(crashTimer);
                document.getElementById('mult').style.color = "#ff4757";
                endCrash(false);
            }
        }, 50);
    }

    function endCrash(win) {
        if(win) balance += Math.floor(parseInt(document.getElementById('bet-input').value) * crashVal);
        crashActive = false;
        const btn = document.getElementById('crash-btn');
        btn.classList.remove('btn-stop'); btn.innerText = "ПОСТАВИТЬ";
        hist.unshift(crashVal); if(hist.length > 8) hist.pop();
        setTimeout(() => {
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('mult').style.color = "var(--gold)";
            sync(); renderCrashHist();
        }, 2000);
    }

    document.getElementById('crash-btn').onclick = () => {
        if(crashActive) { clearInterval(crashTimer); endCrash(true); } else handleCrash();
    };

    function renderCrashHist() {
        document.getElementById('crash-history-bar').innerHTML = hist.map(x => `<div class="hist-x" style="color:${x>2?'var(--gold)':'#888'}">${x.toFixed(2)}x</div>`).join('');
    }

    // FROGS
    function playFrogs(idx) {
        if(isBusy || balance < 300) return;
        isBusy = true; balance -= 300; sync();
        const box = document.querySelectorAll('.frog-box')[idx];
        box.classList.add('open'); box.innerText = "🌀";
        currentPrize = gifts[Math.floor(Math.random()*gifts.length)];
        setTimeout(() => {
            box.innerHTML = currentPrize.img === '⭐' ? '⭐' : `<img src="img/${currentPrize.img}" style="width:60px">`;
            showWin(currentPrize);
        }, 1000);
    }

    function showWin(prize) {
        const icon = prize.img === '⭐' ? '⭐' : `<img src="img/${prize.img}" style="width:80px">`;
        document.getElementById('win-content').innerHTML = `${icon}<br>${prize.name}`;
        document.getElementById('win-modal').style.display = 'flex';
    }

    function claimReward() {
        if(currentPrize.val) balance += currentPrize.val; else inventory.push(currentPrize);
        document.getElementById('win-modal').style.display = 'none';
        document.querySelectorAll('.frog-box').forEach(b => {b.classList.remove('open'); b.innerText="📦"});
        isBusy = false; sync();
    }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inventory.length ? '' : '<p style="grid-column:1/3; opacity:0.3; text-align:center">Пусто</p>';
        inventory.forEach((it, i) => {
            list.innerHTML += `<div class="inv-item">
                <img src="img/${it.img}" style="width:50px"><br>
                <small>${it.name}</small><br>
                <button onclick="sell(${i})" style="background:var(--gold); border:none; border-radius:8px; margin-top:8px; font-weight:900; padding:5px 10px;">ПРОДАТЬ</button>
            </div>`;
        });
    }

    function sell(i) {
        balance += Math.floor(inventory[i].price * 0.8);
        inventory.splice(i, 1); sync(); renderInv();
    }

    sync();
</script>
</body>
</html>
