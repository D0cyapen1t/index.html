<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #161616; --red: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .header { padding: 15px; border-bottom: 2px solid var(--gold); background: #000; text-align: center; font-size: 22px; font-weight: 900; color: var(--gold); }
        
        .section { display: none; height: 82vh; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: center; }
        .active { display: block; }

        /* Рулетка */
        .roulette-box { position: relative; width: 100%; height: 180px; background: #111; border: 2px solid #222; margin: 20px 0; overflow: hidden; border-radius: 12px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 20px var(--gold); }
        .tape { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); align-items: center; height: 100%; }
        
        .slot { min-width: 130px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; border-right: 1px solid #1a1a1a; }
        .slot img { width: 75px; height: 75px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(255,215,0,0.3)); }
        .slot b { display: block; font-size: 13px; color: #fff; margin-top: 10px; text-shadow: 1px 1px 2px #000; }

        /* Краш Режим */
        .crash-area { background: #000; border: 1px solid #333; height: 200px; border-radius: 10px; position: relative; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #multiplier { font-size: 48px; font-weight: 900; color: var(--gold); z-index: 2; }
        .rocket { position: absolute; bottom: 10px; left: 10px; font-size: 30px; transition: all 0.1s linear; }

        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: 900; font-size: 16px; text-transform: uppercase; margin-top: 10px; }
        .btn:disabled { background: #333; color: #555; }
        .btn-red { background: var(--red); color: #fff; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 11px; cursor: pointer; }
        .nav-item.active-nav { color: var(--gold); }

        .inv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-bottom: 30px; }
        .inv-card { background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .inv-card img { width: 100%; height: 50px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="header">⭐ <span id="bal">0</span></div>

    <div id="tab-cases" class="section active">
        <div class="roulette-box">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button class="btn" id="spin-btn" onclick="spin()">ОТКРЫТЬ КЕЙС (500 ⭐)</button>
    </div>

    <div id="tab-crash" class="section">
        <div class="crash-area">
            <div id="multiplier">1.00x</div>
            <div id="rocket" class="rocket">🚀</div>
        </div>
        <input type="number" id="bet-amount" placeholder="Ставка" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; margin-bottom: 10px;">
        <button class="btn" id="crash-btn" onclick="startCrash()">ПОЛЕТЕЛИ</button>
    </div>

    <div id="tab-profile" class="section">
        <h3 style="color: var(--gold);">ВАШ ИНВЕНТАРЬ</h3>
        <div id="inv" class="inv-grid"></div>
        <button class="btn" style="background:#222; color:#fff;" onclick="clearData()">СБРОСИТЬ ПАМЯТЬ</button>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="tab('cases')">📦 КЕЙСЫ</div>
        <div class="nav-item" onclick="tab('crash')">🚀 КРАШ</div>
        <div class="nav-item" onclick="tab('profile')">👤 ИНВЕНТАРЬ</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const items = [
            {id: 'chill', name: 'Chill Flame', img: 'Chill.png'},
            {id: 'mood', name: 'Mood Pack', img: 'Mood.png'},
            {id: 'snoop', name: 'Snoop Dogs', img: 'Snoop.png'},
            {id: 'ufc', name: 'UFC Strike', img: 'UFC.png'},
            {id: 'low', name: 'Low Rider', img: 'Low.png'},
            {id: 'voodoo', name: 'Voodoo Doll', img: 'Voodoo.png'},
            {id: 'stars', name: '1000 Stars', img: 'Stars.png'}
        ];

        // Загрузка данных
        let balance = parseInt(new URLSearchParams(window.location.search).get('balance')) || parseInt(localStorage.getItem('bal')) || 0;
        let inventory = JSON.parse(localStorage.getItem('inv')) || [];

        function save() {
            localStorage.setItem('bal', balance);
            localStorage.setItem('inv', JSON.stringify(inventory));
            document.getElementById('bal').innerText = balance;
        }

        function tab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'profile') renderInv();
        }

        function renderInv() {
            const container = document.getElementById('inv');
            container.innerHTML = inventory.length ? '' : 'Пусто';
            inventory.forEach(i => {
                container.innerHTML += `<div class="inv-card"><img src="img/${i.img}"><p style="font-size:9px">${i.name}</p></div>`;
            });
        }

        // --- ЛОГИКА РУЛЕТКИ ---
        let spinning = false;
        function spin() {
            if(balance < 500 || spinning) return;
            spinning = true;
            balance -= 500;
            save();

            const tape = document.getElementById('tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            tape.innerHTML = '';

            for(let i=0; i<80; i++) {
                const it = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="slot"><img src="img/${it.img}"><b>${it.name}</b></div>`;
            }

            const winIdx = 70;
            const winner = items[Math.floor(Math.random()*items.length)];
            tape.querySelectorAll('.slot')[winIdx].innerHTML = `<img src="img/${winner.img}"><b>${winner.name}</b>`;

            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
                const shift = (winIdx * 130) - (window.innerWidth / 2) + 65;
                tape.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                spinning = false;
                if(winner.id === 'stars') balance += 1000;
                else inventory.push(winner);
                save();
                alert("Выпало: " + winner.name);
            }, 5500);
        }

        // --- ЛОГИКА КРАША ---
        let crashRunning = false;
        let currentMult = 1.0;
        let crashInterval;

        function startCrash() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            if(!bet || bet > balance || bet <= 0 || crashRunning) return;

            if(document.getElementById('crash-btn').innerText === "ЗАБРАТЬ") {
                cashOut(bet);
                return;
            }

            balance -= bet;
            save();
            crashRunning = true;
            currentMult = 1.0;
            const btn = document.getElementById('crash-btn');
            btn.innerText = "ЗАБРАТЬ";
            btn.classList.add('btn-red');

            const crashPoint = (Math.random() * 5 + 1).toFixed(2); // Рандом от 1 до 6

            crashInterval = setInterval(() => {
                currentMult += 0.01;
                document.getElementById('multiplier').innerText = currentMult.toFixed(2) + "x";
                
                // Анимация ракеты
                const r = document.getElementById('rocket');
                r.style.bottom = (currentMult * 20) + "px";
                r.style.left = (currentMult * 15) + "px";

                if(currentMult >= crashPoint) {
                    clearInterval(crashInterval);
                    document.getElementById('multiplier').style.color = "red";
                    document.getElementById('multiplier').innerText = "CRASHED!";
                    endCrash();
                }
            }, 50);
        }

        function cashOut(bet) {
            clearInterval(crashInterval);
            const win = Math.floor(bet * currentMult);
            balance += win;
            save();
            alert("Вы забрали " + win + " ⭐!");
            endCrash();
        }

        function endCrash() {
            crashRunning = false;
            const btn = document.getElementById('crash-btn');
            btn.innerText = "ПОЛЕТЕЛИ";
            btn.classList.remove('btn-red');
            setTimeout(() => {
                document.getElementById('multiplier').style.color = "var(--gold)";
                document.getElementById('multiplier').innerText = "1.00x";
                document.getElementById('rocket').style.bottom = "10px";
                document.getElementById('rocket').style.left = "10px";
            }, 2000);
        }

        function clearData() {
            localStorage.clear();
            location.reload();
        }

        save();
    </script>
</body>
</html>
