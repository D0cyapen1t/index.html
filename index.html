<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #1c212a; --accent: #248bf2; --gold: #f5a623; --text: #ffffff; --gray: #8e959b; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Верхняя панель (Баланс) */
        .header { display: flex; justify-content: flex-end; align-items: center; padding: 15px 20px; background: rgba(28, 33, 42, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2d343f; }
        .balance-box { background: #242a35; padding: 6px 15px; border-radius: 12px; border: 1px solid #3d4450; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .balance-box span { color: var(--gold); }

        /* Контент */
        .content { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; box-sizing: border-box; padding-bottom: 30px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Рулетка */
        .roulette-wrapper { position: relative; width: 100%; height: 150px; background: #05070a; border-radius: 16px; margin: 20px 0; overflow: hidden; border: 2px solid #2d343f; }
        .marker { position: absolute; left: 50%; width: 3px; height: 100%; background: var(--accent); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent); }
        .tape { display: flex; position: absolute; top: 25px; transition: 6s cubic-bezier(0.1, 0, 0.05, 1); }
        .slot { min-width: 100px; height: 100px; margin: 0 8px; background: var(--card); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 75px; height: 75px; object-fit: contain; }

        /* Кнопка */
        .btn-spin { width: 100%; padding: 20px; background: var(--accent); border: none; color: white; border-radius: 15px; font-weight: 800; font-size: 18px; box-shadow: 0 5px 20px rgba(36, 139, 242, 0.4); cursor: pointer; }
        .btn-spin:disabled { background: #2d343f; opacity: 0.6; box-shadow: none; cursor: not-allowed; }

        /* Навигация снизу */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); border-top: 1px solid #2d343f; display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: var(--gray); transition: 0.2s; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

        /* Заглушки для других страниц */
        .hub-banner { width: 100%; background: linear-gradient(135deg, #1e293b, #0b0e14); border-radius: 20px; padding: 30px; box-sizing: border-box; margin-bottom: 20px; border: 1px solid #334155; text-align: center; }
        .hub-banner h1 { margin: 0; font-size: 32px; font-weight: 900; background: linear-gradient(to right, #ffffff, var(--gray)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#f5a623"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
            <span id="bal-val">ЗАГРУЗКА</span> ⭐
        </div>
    </div>

    <div class="content">
        <div id="h" class="page active">
            <div class="hub-banner">
                <h1>SWILL WAY</h1>
                <p style="color:var(--gray);">Premium Gambling Protocol v2.1</p>
            </div>
            <h3>Доступные события:</h3>
            <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid #2d343f;">
                <b style="color:var(--gold);">NEW:</b> Premium Fragment Case
            </div>
        </div>

        <div id="b" class="page">
            <h1 style="margin: 0;">FRAGMENT BOX</h1>
            <p style="color: var(--gray); font-size: 14px; margin-top: 5px;">Шанс на +888, Юзернеймы и Подарки</p>
            <div class="roulette-wrapper">
                <div class="marker"></div>
                <div id="tape" class="tape"></div>
            </div>
            <button class="btn-spin" id="spin-btn" onclick="startSpin()">ОТКРЫТЬ ЗА 500 ⭐</button>
        </div>

        <div id="w" class="page">
            <h2>ИНВЕНТАРЬ</h2>
            <div style="text-align: center; color: var(--gray); margin-top: 50px;">
                У вас пока нет выигранных NFT.<br>Все выигрыши зачисляются в <b style="color:var(--text);">/wallet</b> в Telegram.
            </div>
        </div>
    </div>

    <div class="nav">
        <a href="#" class="nav-item active" id="n-h" onclick="nav('h')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            ГЛАВНАЯ
        </a>
        <a href="#" class="nav-item" id="n-b" onclick="nav('b')">
            <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-8-2h4v2h-4V4z"/></svg>
            КЕЙСЫ
        </a>
        <a href="#" class="nav-item" id="n-w" onclick="nav('w')">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            КОШЕЛЕК
        </a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let userBalance = 0;

        // Запрашиваем реальный баланс при запуске
        function refreshBalance() {
            tg.sendData(JSON.stringify({action: "get_balance"}));
        }

        // Слушаем ответы от бота (реализовано через костыль, но работает для Inline WebApp)
        // В реальном продакшене нужен API эндпоинт. Для MVP сойдет.
        // Чтобы UI обновился, бот пришлет сообщение в чат. WebApp не умеет читать чат.
        // ЗАХАРДКОДИМ ЗАДЕРЖКУ (пока бот обновит БД)
        document.getElementById('bal-val').innerText = "FETCHING...";
        setTimeout(() => {
            // Для MVP: пока захардкодим, что баланс запрашивается.
            // Настоящая синхронизация требует API сервера.
            // Бот жестко проверяет баланс ПЕРЕД списанием, так что взломать нельзя.
            document.getElementById('bal-val').innerText = "500+ ⭐"; 
        }, 1500);


        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id).classList.add('active');
            if(id === 'b') initRoulette();
        }

        const fragIcons = [
            "https://nft.fragment.com/number/88808888888.webp",
            "https://nft.fragment.com/gift/KissFrog.webp",
            "https://nft.fragment.com/username/news.webp",
            "https://nft.fragment.com/gift/Doge.webp",
            "https://nft.fragment.com/gift/CookieHeart.webp",
            "https://nft.fragment.com/username/magic.webp",
            "https://nft.fragment.com/number/88801234567.webp"
        ];

        function initRoulette() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            // Создаем длинную ленту для прокрутки
            for(let i=0; i<90; i++) {
                const div = document.createElement('div');
                div.className = 'slot';
                div.innerHTML = `<img src="${fragIcons[Math.floor(Math.random()*fragIcons.length)]}">`;
                tape.appendChild(div);
            }
        }

        function startSpin() {
            const btn = document.getElementById('spin-btn');
            const tape = document.getElementById('tape');
            btn.disabled = true; // Блокируем кнопку сразу
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = '6s cubic-bezier(0.1, 0, 0.05, 1)';
                const shift = 4300 + Math.random()*200;
                tape.style.transform = `translateX(-${shift}px)`;
            }, 50);

            // Через 6.5 секунд отправляем данные боту и закрываем
            setTimeout(() => {
                tg.sendData(JSON.stringify({action: "open_case"}));
                // Добавим задержку перед закрытием, чтобы бот успел ответить
                setTimeout(() => { tg.close(); }, 1500);
            }, 6500);
        }

        fill();
    </script>
</body>
</html>
