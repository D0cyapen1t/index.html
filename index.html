<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #f2c94c; 
            --bg: radial-gradient(circle at top, #1a1c20 0%, #000000 100%); 
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --item-w: 130px;
            --item-m: 5px;
        }

        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh; }

        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; position: relative; z-index: 100;}
        .live-feed { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--glass-border); min-width: 150px; transition: 0.3s; height: 30px;}
        .live-icon { width: 16px; height: 16px; object-fit: contain; }
        .balance-pill { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 12px; font-size: 14px; font-weight: 900; color: var(--gold); }

        .section { display: none; height: calc(100vh - 130px); padding: 15px; box-sizing: border-box; overflow-y: auto; padding-bottom: 80px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* ИГРОВЫЕ КАРТОЧКИ */
        .game-card { border-radius: 24px; padding: 20px; min-height: 100px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .card-crash { background: linear-gradient(135deg, #2f80ed, #56ccf2); }
        .card-roulette { background: linear-gradient(135deg, #eb5757, #f2994a); }
        .card-frogs { background: linear-gradient(135deg, #27ae60, #6fcf97); }

        /* КРАШ */
        #crash-history-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .hist-x { padding: 4px 10px; border-radius: 8px; background: var(--glass); border: 1px solid var(--glass-border); font-size: 11px; font-weight: 900; }

        /* ОБЩЕЕ */
        .btn-main { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .btn-stop { background: #ff4757 !important; color: #fff !important; }
        .btn-back { background: none; border: none; color: #555; width: 100%; padding: 15px; font-weight: 700; margin-top: 10px; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--glass-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 700; cursor: pointer;}
        .nav-btn.active { color: #fff; }

        .modal-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-win { background: #16181d; padding: 40px 20px; border-radius: 40px; border: 1px solid var(--gold); text-align: center; width: 80%; position: relative; overflow: hidden;}
        
        .roulette-container { height: 160px; background: rgba(0,0,0,0.6); border-radius: 24px; overflow: hidden; position: relative; border: 1px solid var(--glass-border); margin: 15px 0; display: flex; align-items: center;}
        .tape { display: flex; will-change: transform; align-items: center; }
        .tape-item { min-width: var(--item-w); max-width: var(--item-w); height: 140px; margin: 0 var(--item-m); border-radius: 18px; position: relative; overflow: hidden; background-color: #1c1f24; background-size: cover; background-position: center; display: flex; align-items: flex-end; justify-content: center; }
        .tape-item .label { width: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); padding: 10px 5px; font-size: 10px; font-weight: 900; text-align: center; text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.1); }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 20px var(--gold); }

        .frogs-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 30px; }
        .frogs-row { display: flex; gap: 20px; justify-content: center; }
        .frog-box { width: 100px; height: 120px; background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)); border: 1px solid var(--glass-border); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 45px; cursor: pointer; position: relative; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .frog-box.pulse { animation: pulseBox 2s infinite; }
        .frog-box.open { animation: openBox 0.6s forwards; background: #1a1c20; border-color: var(--gold); }
        @keyframes pulseBox { 50% { border-color: rgba(255,255,255,0.3); } }
        @keyframes openBox { 100% { transform: scale(1.1); } }
        #inv-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .inv-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="live-feed" id="live-feed">⚡ Загрузка...</div>
    <div class="balance-pill">⭐ <span id="balance-val">0</span></div>
</div>

<div id="win-modal" class="modal-overlay">
    <div class="modal-win">
        <h3 style="color:var(--gold); margin:0; text-transform: uppercase;">Вы выиграли</h3>
        <div id="win-content" style="padding: 30px 0; font-weight: 900; font-size: 20px;"></div>
        <button class="btn-main" onclick="claimReward()">В ИНВЕНТАРЬ</button>
    </div>
</div>

<div id="tab-games" class="section active">
    <div class="game-card card-crash" onclick="nav('crash')">
        <div><h2>Краш</h2><p>Умножай звезды</p></div><span style="font-size:40px">🚀</span>
    </div>
    <div class="game-card card-roulette" onclick="nav('roulette')">
        <div><h2>Рулетка</h2><p>Испытай удачу</p></div><span style="font-size:40px">🎡</span>
    </div>
    <div class="game-card card-frogs" onclick="nav('frogs')">
        <div><h2>Лягушки</h2><p>Угадай бокс</p></div><span style="font-size:40px">📦</span>
    </div>
</div>

<div id="game-crash" class="section">
    <div id="crash-history-bar"></div>
    <div style="background:var(--glass); height:180px; border-radius:30px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; border: 1px solid var(--glass-border);">
        <div id="mult" style="font-size:60px; font-weight:900; color:var(--gold);">1.00x</div>
    </div>
    <input type="number" id="bet-input" value="100" style="width:100%; padding:18px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:#fff; border-radius:20px; margin-bottom:15px; text-align:center; font-weight:900; outline: none;">
    <button class="btn-main" id="crash-btn" onclick="crashAction()">ПОСТАВИТЬ</button>
    <button class="btn-back" onclick="nav('games')">НАЗАД</button>
</div>

<!-- ОСТАЛЬНЫЕ СЕКЦИИ БЕЗ ИЗМЕНЕНИЙ -->
<div id="game-frogs" class="section">
    <h3 style="text-align:center; font-weight: 900;">ВЫБЕРИ БОКС <span style="color:var(--gold)">300 ⭐</span></h3>
    <div class="frogs-container">
        <div class="frogs-row"><div class="frog-box pulse" onclick="playFrogs(0)">📦</div></div>
        <div class="frogs-row"><div class="frog-box pulse" onclick="playFrogs(1)">📦</div><div class="frog-box pulse" onclick="playFrogs(2)">📦</div></div>
    </div>
    <button class="btn-back" onclick="nav('games')" style="margin-top: 40px;">ВЕРНУТЬСЯ К ИГРАМ</button>
</div>

<div id="game-roulette" class="section">
    <div class="roulette-container" id="cont-roulette"><div class="pointer"></div><div id="tape-roulette" class="tape"></div></div>
    <button class="btn-main" onclick="startSpin('tape-roulette', 'cont-roulette', 500)">КРУТИТЬ (500 ⭐)</button>
    <button class="btn-back" onclick="nav('games')">НАЗАД</button>
</div>

<div id="tab-earn" class="section">
    <h2 style="text-align:center; color:var(--gold)">DAILY CASE</h2>
    <div class="roulette-container" id="cont-case"><div class="pointer"></div><div id="tape-case" class="tape"></div></div>
    <button class="btn-main" onclick="startSpin('tape-case', 'cont-case', 0)">ОТКРЫТЬ БЕСПЛАТНО</button>
</div>

<div id="tab-inv" class="section">
    <h2 style="color:var(--gold)">ИНВЕНТАРЬ</h2>
    <div id="inv-list"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="nav('games')">🎮<span>Игры</span></div>
    <div class="nav-btn" onclick="nav('earn')">🎁<span>Бонус</span></div>
    <div class="nav-btn" onclick="nav('inv')">👤<span>Профиль</span></div>
</nav>

<script>
    const gifts = [
        {name: 'UFC STRIKE', img: 'UFC.png', price: 1450},
        {name: 'Chill Flame', img: 'Chill.png', price: 450},
        {name: 'Low Rider', img: 'Low.png', price: 4000},
        {name: 'Lunar Snake', img: 'Snake.png', price: 300},
        {name: 'Eternal Rose', img: 'Rose.png', price: 2300},
        {name: 'Diamond Ring', img: 'Ring.png', price: 2500},
        {name: 'Toy Bear', img: 'Bear.png', price: 3100},
        {name: 'Westside Sign', img: 'Sign.png', price: 8000},
        {name: '150 Stars', img: '⭐', val: 150, price: 150}
    ];

    let balance = parseInt(localStorage.getItem('user_bal')) || 5000;
    let inventory = JSON.parse(localStorage.getItem('user_inv')) || [];
    let hist = [1.05, 2.50, 1.12, 10.40];
    let isBusy = false;
    let currentPrize = null;

    // КРАШ ЛОГИКА (ОБНОВЛЕНО)
    let crashActive = false; // Летит ли ракета
    let hasBet = false;      // Сделал ли пользователь ставку
    let crashVal = 1.0;
    let crashTimer;
    let crashLimit = 0;
    let currentBet = 0;

    function sync() {
        localStorage.setItem('user_bal', balance);
        localStorage.setItem('user_inv', JSON.stringify(inventory));
        document.getElementById('balance-val').innerText = balance.toLocaleString();
    }

    function nav(id) {
        if(isBusy) return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        let targetId = ['crash', 'roulette', 'frogs'].includes(id) ? 'game-' + id : 'tab-' + id;
        document.getElementById(targetId).classList.add('active');
        if(id === 'inv') renderInv();
        if(id === 'crash') renderCrashHist();
    }

    function crashAction() {
        if (hasBet) {
            cashOut();
        } else if (!crashActive) {
            startCrash();
        }
    }

    function startCrash() {
        const betInput = document.getElementById('bet-input');
        currentBet = parseInt(betInput.value);
        if (!currentBet || currentBet > balance || currentBet <= 0) return;

        balance -= currentBet;
        sync();

        crashActive = true;
        hasBet = true;
        crashVal = 1.0;
        
        // Генерация точки взрыва
        crashLimit = Math.random() < 0.15 ? 1.00 : (Math.random() * 4 + 1.1);
        
        const btn = document.getElementById('crash-btn');
        const multDisplay = document.getElementById('mult');
        
        btn.innerText = "ЗАБРАТЬ";
        btn.classList.add('btn-stop');
        multDisplay.style.color = "var(--gold)";

        crashTimer = setInterval(() => {
            crashVal += 0.01;
            multDisplay.innerText = crashVal.toFixed(2) + "x";

            if (crashVal >= crashLimit) {
                explode();
            }
        }, 50);
    }

    function cashOut() {
        const winAmount = Math.floor(currentBet * crashVal);
        balance += winAmount;
        hasBet = false;
        sync();

        const btn = document.getElementById('crash-btn');
        btn.innerText = "ОЖИДАНИЕ...";
        btn.disabled = true; // Нельзя ставить пока не взорвется
        btn.classList.remove('btn-stop');
    }

    function explode() {
        clearInterval(crashTimer);
        crashActive = false;
        hasBet = false;

        const btn = document.getElementById('crash-btn');
        const multDisplay = document.getElementById('mult');

        multDisplay.innerText = "BOOM! " + crashVal.toFixed(2) + "x";
        multDisplay.style.color = "#ff4757";

        hist.unshift(crashVal);
        if (hist.length > 8) hist.pop();

        setTimeout(() => {
            multDisplay.innerText = "1.00x";
            multDisplay.style.color = "var(--gold)";
            btn.innerText = "ПОСТАВИТЬ";
            btn.disabled = false;
            btn.classList.remove('btn-stop');
            renderCrashHist();
        }, 2500);
    }

    function renderCrashHist() {
        document.getElementById('crash-history-bar').innerHTML = hist.map(x => `<div class="hist-x" style="color:${x>2?'var(--gold)':'#888'}">${x.toFixed(2)}x</div>`).join('');
    }

    // РУЛЕТКА И ЛЯГУШКИ (ОСТАЛИСЬ БЕЗ ИЗМЕНЕНИЙ)
    function startSpin(tapeId, contId, cost) {
        if(isBusy || balance < cost) return;
        isBusy = true; balance -= cost; sync();
        const tape = document.getElementById(tapeId);
        const cont = document.getElementById(contId);
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';
        const winIdx = 40; 
        for(let i=0; i<50; i++) {
            const g = gifts[Math.floor(Math.random()*gifts.length)];
            const el = document.createElement('div'); el.className = 'tape-item';
            if(g.img === '⭐') el.innerHTML = `<div style="font-size:50px; width:100%; text-align:center; margin-bottom:40px;">⭐</div>`;
            else el.style.backgroundImage = `url('img/${g.img}')`;
            el.innerHTML += `<div class="label">${g.name}</div>`;
            tape.appendChild(el);
            if(i === winIdx) currentPrize = g;
        }
        setTimeout(() => {
            const finalPos = (winIdx * 140) + 70 - (cont.offsetWidth / 2);
            tape.style.transition = 'transform 6s cubic-bezier(0.15, 0, 0.1, 1)';
            tape.style.transform = `translateX(-${finalPos}px)`;
        }, 50);
        setTimeout(() => { showWin(currentPrize); }, 6500);
    }

    function playFrogs(idx) {
        if(isBusy || balance < 300) return;
        isBusy = true; balance -= 300; sync();
        const boxes = document.querySelectorAll('.frog-box');
        boxes.forEach(b => b.classList.remove('pulse'));
        const box = boxes[idx]; box.classList.add('open'); box.innerText = "";
        currentPrize = gifts[Math.floor(Math.random()*gifts.length)];
        setTimeout(() => {
            box.innerHTML = currentPrize.img === '⭐' ? '<div style="font-size:50px">⭐</div>' : `<img src="img/${currentPrize.img}" style="width:70px">`;
            setTimeout(() => { showWin(currentPrize); }, 800);
        }, 600);
    }

    function showWin(prize) {
        const icon = prize.img === '⭐' ? '⭐' : `<img src="img/${prize.img}" style="width:100px; margin-bottom:10px;">`;
        document.getElementById('win-content').innerHTML = `${icon}<br>${prize.name}`;
        document.getElementById('win-modal').style.display = 'flex';
    }

    function claimReward() {
        if(currentPrize.val) balance += currentPrize.val; else inventory.push(currentPrize);
        document.getElementById('win-modal').style.display = 'none';
        document.querySelectorAll('.frog-box').forEach(b => { b.classList.remove('open'); b.classList.add('pulse'); b.innerHTML = "📦"; });
        isBusy = false; sync();
    }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inventory.length ? '' : '<p style="grid-column:1/3; opacity:0.3; text-align:center">Инвентарь пуст</p>';
        inventory.forEach((it, i) => {
            list.innerHTML += `<div class="inv-item"><img src="img/${it.img}" style="width:50px"><br><small>${it.name}</small><br><button onclick="sell(${i})" style="background:var(--gold); border:none; border-radius:8px; margin-top:8px; font-weight:900; padding:5px 10px;">ПРОДАТЬ</button></div>`;
        });
    }

    function sell(i) { balance += Math.floor(inventory[i].price * 0.8); inventory.splice(i, 1); sync(); renderInv(); }

    setInterval(() => {
        const g = gifts[Math.floor(Math.random()*gifts.length)];
        const feed = document.getElementById('live-feed');
        feed.style.opacity = 0;
        setTimeout(() => {
            feed.innerHTML = `<span>Выбил ${g.name}</span>`;
            feed.style.opacity = 1;
        }, 300);
    }, 4000);

    sync();
</script>
</body>
</html>
