<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffca28; --bg: #0b0d10; --card: #161920; --accent: #232731; 
            --red: #ff4757; --green: #2ed573; --blue: #3742fa;
        }
        body { 
            background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; user-select: none;
        }
        
        .header { 
            padding: 20px 15px; background: linear-gradient(to bottom, #161920, transparent);
            display: flex; justify-content: center; position: relative; z-index: 10;
        }
        .balance-pill { 
            background: rgba(0,0,0,0.6); border: 2px solid var(--gold); 
            padding: 10px 30px; border-radius: 100px; font-size: 22px; font-weight: 900; 
            color: var(--gold); box-shadow: 0 0 15px rgba(255, 202, 40, 0.3);
        }

        .section { display: none; height: 85vh; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .history-bar {
            display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; height: 30px;
        }
        .hist-item {
            padding: 5px 12px; border-radius: 10px; font-size: 13px; font-weight: 800; background: var(--card); border: 1px solid var(--accent);
        }

        .roulette-container { 
            position: relative; width: 100%; height: 200px; background: #050608; 
            border-radius: 28px; overflow: hidden; border: 2px solid var(--accent); margin-top: 10px;
        }
        .pointer { 
            position: absolute; left: 50%; top: 0; width: 4px; height: 100%; 
            background: var(--gold); z-index: 20; transform: translateX(-50%);
            box-shadow: 0 0 25px var(--gold);
        }
        .tape { display: flex; align-items: center; height: 100%; will-change: transform; transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1); }
        
        .slot { 
            min-width: 130px; width: 130px; height: 160px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: var(--card); 
            margin: 0 5px; border-radius: 22px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden; position: relative;
        }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1; }
        .slot-emoji { font-size: 50px; z-index: 2; position: relative; }
        .slot span { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8);
            font-size: 10px; font-weight: 700; padding: 6px 0; color: #fff; text-align: center; z-index: 3;
        }

        .demo-box {
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; margin: 15px 0; background: var(--card); padding: 12px; border-radius: 18px; border: 1px solid var(--accent);
        }

        .crash-area { 
            background: #090a0d; border-radius: 30px; height: 260px; display: flex; 
            align-items: center; justify-content: center; position: relative; 
            overflow: hidden; border: 2px solid var(--accent); margin-bottom: 20px;
            background-image: radial-gradient(var(--accent) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        #mult { font-size: 70px; font-weight: 900; color: var(--gold); z-index: 10; text-shadow: 0 0 30px rgba(255, 202, 40, 0.5); }
        #rocket { position: absolute; bottom: 30px; left: 30px; font-size: 50px; transition: transform 0.1s; }
        
        .btn-main { 
            background: linear-gradient(135deg, #ffca28, #ff8f00); color: #000; border: none; 
            width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; font-size: 18px; 
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .btn-stop { background: linear-gradient(135deg, #ff4757, #ff6b81); color: #fff; }

        .navbar { 
            position: fixed; bottom: 0; width: 100%; height: 80px; background: #161920; 
            display: flex; border-top: 1px solid var(--accent); padding-bottom: 15px;
        }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #5b626e; text-decoration: none;}
        .nav-btn.active { color: var(--gold); }
        .nav-btn b { font-size: 10px; margin-top: 4px; }

        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-win { background: var(--card); padding: 40px 20px; border-radius: 35px; border: 2px solid var(--gold); text-align: center; width: 85%; }
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>

<div class="header"><div class="balance-pill">⭐ <span id="balance-val">0</span></div></div>

<div id="win-modal" class="modal-overlay">
    <div class="modal-win">
        <h2 id="win-title" style="color:var(--gold); margin:0;">ВЫПАЛО!</h2>
        <div id="win-content" style="padding: 30px 0; display:flex; justify-content:center;"></div>
        <button class="btn-main" onclick="claimReward()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="action-modal" class="modal-overlay">
    <div class="modal-win" id="action-content"></div>
</div>

<div id="tab-roulette" class="section active">
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>
    <div class="demo-box">
        <input type="checkbox" id="demo-mode" onchange="sync()">
        <label for="demo-mode" style="font-weight:700; color:#7f8c8d;">ДЕМО-РЕЖИМ</label>
    </div>
    <button class="btn-main" id="spin-btn" onclick="startRoulette()">ОТКРЫТЬ (500 ⭐)</button>
</div>

<div id="tab-crash" class="section">
    <div id="crash-history" class="history-bar"></div>
    <div class="crash-area">
        <div id="mult">1.00x</div>
        <div id="rocket">🚀</div>
    </div>
    <input type="number" id="bet-input" style="width:100%; padding:20px; box-sizing: border-box; background:#1c212a; border:2px solid var(--accent); color:#fff; border-radius:18px; margin-bottom:15px; text-align:center; font-size: 18px;" placeholder="Ваша ставка...">
    <button class="btn-main" id="crash-btn" onclick="handleCrash()">ПОЕХАЛИ!</button>
</div>

<div id="tab-inv" class="section">
    <h3 style="color:var(--gold); margin-bottom:20px;">ИНВЕНТАРЬ</h3>
    <div id="inv-list" class="inv-grid"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="nav('roulette')">📦<b>КЕЙСЫ</b></div>
    <div class="nav-btn" onclick="nav('crash')">🚀<b>КРАШ</b></div>
    <div class="nav-btn" onclick="nav('inv')">👤<b>ПРОФИЛЬ</b></div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const items = [
        {id: 'chill', name: 'Chill Flame', img: 'Chill.png', sellPrice: 450, rarity: 25},
        {id: 'mood', name: 'Mood Pack', img: 'Mood.png', sellPrice: 650, rarity: 20},
        {id: 'snoop', name: 'Snoop Dogg', img: 'Snoop.png', sellPrice: 750, rarity: 15},
        {id: 'ufc', name: 'UFC STRICE', img: 'UFC.png', sellPrice: 1450, rarity: 12},
        {id: 'low', name: 'Low Rider', img: 'Low.png', sellPrice: 4000, rarity: 8},
        {id: 'voodoo', name: 'Voodoo Doll', img: 'Voodoo.png', sellPrice: 3100, rarity: 10},
        {id: 's50', name: '50 Stars', img: '⭐', val: 50, rarity: 15},
        {id: 's150', name: '150 Stars', img: '⭐', val: 150, rarity: 10},
        {id: 's400', name: '400 Stars', img: '⭐', val: 400, rarity: 5}
    ];

    let balance = parseInt(localStorage.getItem('user_bal')) || 1000;
    let inventory = JSON.parse(localStorage.getItem('user_inv')) || [];
    let crashHistory = JSON.parse(localStorage.getItem('crash_hist')) || [];
    let isBusy = false;
    let currentPrize = null;
    let isDemoActive = false;

    function sync() {
        localStorage.setItem('user_bal', balance);
        localStorage.setItem('user_inv', JSON.stringify(inventory));
        localStorage.setItem('crash_hist', JSON.stringify(crashHistory));
        document.getElementById('balance-val').innerText = balance.toLocaleString();
        const demo = document.getElementById('demo-mode').checked;
        document.getElementById('spin-btn').disabled = (balance < 500 && !demo) || isBusy;
        renderCrashHistory();
    }

    function renderCrashHistory() {
        const h = document.getElementById('crash-history');
        h.innerHTML = '';
        crashHistory.slice(-5).reverse().forEach(v => {
            let color = v >= 2 ? 'var(--green)' : (v <= 1.2 ? 'var(--red)' : 'var(--gold)');
            h.innerHTML += `<div class="hist-item" style="color:${color}">${v.toFixed(2)}x</div>`;
        });
    }

    function nav(id) {
        if(isBusy && id !== 'crash') return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(id === 'inv') renderInv();
    }

    function getRandomItem() {
        const total = items.reduce((acc, it) => acc + it.rarity, 0);
        let rand = Math.random() * total;
        for (const it of items) {
            if (rand < it.rarity) return it;
            rand -= it.rarity;
        }
        return items[0];
    }

    // --- ФИКС ВЫПАДЕНИЯ ПРЕДМЕТА ---
    function startRoulette() {
        const demo = document.getElementById('demo-mode').checked;
        if(!demo && (balance < 500 || isBusy)) return;
        if(!demo) balance -= 500;
        isDemoActive = demo; isBusy = true; sync();

        const tape = document.getElementById('tape');
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)'; tape.innerHTML = '';

        const slotWidth = 140; // 130px ширина + 10px суммарный отступ (5+5)
        const winIdx = 45; // Предмет под стрелкой всегда будет в этой позиции
        currentPrize = getRandomItem();

        for(let i = 0; i < 60; i++) {
            let it = (i === winIdx) ? currentPrize : getRandomItem();
            const content = it.img === '⭐' ? `<div class="slot-emoji">⭐</div>` : `<img src="img/${it.img}">`;
            tape.innerHTML += `<div class="slot">${content}<span>${it.name}</span></div>`;
        }

        setTimeout(() => {
            tape.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0.05, 1)';
            const centerOffset = window.innerWidth / 2;
            // Точный расчет: (ширина всех слотов до нужного) + (половина выигрышного слота) - (центр экрана)
            const stopPos = (winIdx * slotWidth) + (slotWidth / 2) - centerOffset;
            tape.style.transform = `translateX(-${stopPos}px)`;
        }, 50);

        setTimeout(() => {
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-title').innerText = isDemoActive ? "ДЕМО-ОТКРЫТИЕ" : "ВЫ ВЫИГРАЛИ!";
            const content = currentPrize.img === '⭐' ? `<div class="slot-emoji">⭐</div>` : `<div class="slot" style="margin:0;"><img src="img/${currentPrize.img}"><span>${currentPrize.name}</span></div>`;
            document.getElementById('win-content').innerHTML = content;
        }, 8500);
    }

    function claimReward() {
        if(!isDemoActive && currentPrize) {
            if(currentPrize.val) balance += currentPrize.val; else inventory.push(currentPrize);
        }
        document.getElementById('win-modal').style.display = 'none';
        isBusy = false; currentPrize = null; sync();
    }

    // --- КРАШ ---
    let crashActive = false; let crashVal = 1.0; let crashTimer; let currentBet = 0;
    function handleCrash() {
        const btn = document.getElementById('crash-btn');
        if (crashActive) {
            balance += Math.floor(currentBet * crashVal);
            crashHistory.push(parseFloat(crashVal.toFixed(2)));
            clearInterval(crashTimer); resetCrash(); return;
        }
        const bet = parseInt(document.getElementById('bet-input').value);
        if(!bet || bet < 100 || bet > balance) return alert("Недостаточно звезд!");
        
        currentBet = bet; balance -= bet; isBusy = true; crashActive = true; sync();
        const isInstant = Math.random() < 0.45; 
        const boom = isInstant ? 1.00 : (Math.random() * 5 + 1.1).toFixed(2);
        if(isInstant) { finishCrash(1.00); return; }
        
        crashTimer = setInterval(() => {
            crashVal += 0.01;
            document.getElementById('mult').innerText = crashVal.toFixed(2) + "x";
            btn.innerText = `ЗАБРАТЬ (${Math.floor(currentBet * crashVal)})`;
            btn.classList.add('btn-stop');
            document.getElementById('rocket').style.transform = `translate(${crashVal*6}px, -${crashVal*6}px)`;
            if(crashVal >= boom) finishCrash(boom);
        }, 85);
    }

    function finishCrash(v) {
        clearInterval(crashTimer); crashActive = false;
        crashHistory.push(parseFloat(v));
        document.getElementById('mult').innerText = "BOOM!";
        document.getElementById('mult').style.color = "var(--red)";
        setTimeout(() => { resetCrash(); }, 2000);
    }

    function resetCrash() {
        crashActive = false; isBusy = false; clearInterval(crashTimer);
        const btn = document.getElementById('crash-btn');
        btn.innerText = "ПОЕХАЛИ!"; btn.classList.remove('btn-stop');
        document.getElementById('mult').style.color = "var(--gold)";
        document.getElementById('mult').innerText = "1.00x";
        document.getElementById('rocket').style.transform = "translate(0,0)";
        crashVal = 1.0; sync();
    }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inventory.length ? '' : '<p style="grid-column:1/3; text-align:center; opacity:0.5; margin-top:50px;">Пусто</p>';
        inventory.forEach((it, i) => {
            list.innerHTML += `<div class="slot" style="width:100%; height:160px;" onclick="openAction(${i})"><img src="img/${it.img}"><span>${it.name}</span></div>`;
        });
    }

    function openAction(idx) {
        const it = inventory[idx];
        document.getElementById('action-modal').style.display = 'flex';
        document.getElementById('action-content').innerHTML = `
            <h3>${it.name}</h3>
            <p style="color:var(--gold); font-weight:900;">Цена: ${it.sellPrice} ⭐</p>
            <button class="btn-main" onclick="sellItem(${idx}, ${it.sellPrice})">ПРОДАТЬ</button>
            <button class="btn-main" style="background:#333; color:#fff; margin-top:10px;" onclick="document.getElementById('action-modal').style.display='none'">ОТМЕНА</button>`;
    }

    function sellItem(idx, p) {
        inventory.splice(idx, 1); balance += p;
        document.getElementById('action-modal').style.display = 'none';
        sync(); renderInv();
    }

    sync();
</script>
</body>
</html>
