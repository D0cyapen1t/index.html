<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcf4b; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Navbar */
        .nav { position: fixed; bottom: 15px; left: 5%; width: 90%; height: 65px; background: rgba(25,25,25,0.9); backdrop-filter: blur(10px); border-radius: 20px; display: flex; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #666; transition: 0.3s; }
        .nav-item.active { color: var(--gold); transform: translateY(-5px); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Sections */
        .section { display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Case Card */
        .case-card { background: linear-gradient(145deg, #161616, #0f0f0f); border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .case-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
        
        /* Roulette Area */
        .roulette-wrapper { width: 100%; height: 110px; background: #000; border-radius: 15px; margin: 15px 0; overflow: hidden; position: relative; border: 1px solid #333; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--gold); z-index: 10; box-shadow: 0 0 15px var(--gold); }
        .tape { display: flex; transition: transform 4s cubic-bezier(0.1, 0, 0, 1); will-change: transform; }
        .slot { min-width: 90px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #111; }
        .slot img { width: 60px; height: 60px; filter: drop-shadow(0 0 5px rgba(255,207,75,0.2)); }
        .slot span { font-size: 9px; margin-top: 5px; color: #888; }

        /* Stats */
        .balance-badge { background: var(--gray); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; display: inline-block; }
        .btn-main { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .btn-main:disabled { background: #444; color: #888; }

        /* Inventory */
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .inv-item { background: #111; border-radius: 12px; padding: 10px; border: 1px solid #222; }
        .inv-item img { width: 100%; }
    </style>
</head>
<body>

    <div id="ui-menu" class="section active-section">
        <h1 style="color: var(--gold)">LYDKA</h1>
        <p style="color: #666">Premium Gambling Experience</p>
        <div class="balance-badge">⭐ <span id="user-balance">500</span></div>
    </div>

    <div id="ui-cases" class="section">
        <div class="case-card">
            <h3>PREMIUM CASE</h3>
            <div class="roulette-wrapper">
                <div class="pointer"></div>
                <div id="tape" class="tape"></div>
            </div>
            <button class="btn-main" id="spin-btn" onclick="play('roulette')">ОТКРЫТЬ — 500 ⭐</button>
        </div>

        <div class="case-card">
            <h3>DOUBLE OR NOTHING (50/50)</h3>
            <p>Voodoo Doll или Ничего</p>
            <button class="btn-main" onclick="play('5050')">РИСКНУТЬ — 500 ⭐</button>
        </div>
    </div>

    <div id="ui-profile" class="section">
        <h3>МОЙ ПРОФИЛЬ</h3>
        <div class="balance-badge" style="margin-bottom: 20px;">БАЛАНС: <span id="prof-balance">500</span> ⭐</div>
        <div class="inv-grid" id="inventory">
            </div>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="show('menu')"><i>🏠</i>МЕНЮ</div>
        <div class="nav-item" onclick="show('cases')"><i>📦</i>КЕЙСЫ</div>
        <div class="nav-item" onclick="show('profile')"><i>👤</i>ПРОФИЛЬ</div>
    </nav>

    <script>
        let balance = 1500; // Для теста. В реальности берем из БД через API.
        const items = [
            {n: "Chill Flame", img: "https://tgstars.tg/nft/image?name=ChillFlame"},
            {n: "Mood Pack", img: "https://tgstars.tg/nft/image?name=MoodPack"},
            {n: "Snoop Dogs", img: "https://tgstars.tg/nft/image?name=SnoopDogs"},
            {n: "UFC Strike", img: "https://tgstars.tg/nft/image?name=UFCStrike"},
            {n: "Low Rider", img: "https://tgstars.tg/nft/image?name=LowRider"},
            {n: "Voodoo Doll", img: "https://tgstars.tg/nft/image?name=VoodooDoll"},
            {n: "Stars", img: "https://static.tildacdn.com/bolt3233-3134-4061-b430-376535316439/star.png", stars: 750}
        ];

        function updateUI() {
            document.getElementById('user-balance').innerText = balance;
            document.getElementById('prof-balance').innerText = balance;
            document.getElementById('spin-btn').disabled = balance < 500;
        }

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById('ui-'+id).classList.add('active-section');
        }

        function play(type) {
            if(balance < 500) return alert("Недостаточно звезд!");
            
            balance -= 500;
            updateUI();

            const tape = document.getElementById('tape');
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            tape.innerHTML = '';

            // Создаем ленту
            for(let i=0; i<60; i++) {
                const item = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="slot"><img src="${item.img}"><span>${item.n}</span></div>`;
            }

            const winIndex = 55;
            const winItem = items[Math.floor(Math.random()*items.length)];
            const slots = tape.querySelectorAll('.slot');
            slots[winIndex].innerHTML = `<img src="${winItem.img}"><span>${winItem.n}</span>`;

            setTimeout(() => {
                tape.style.transition = "transform 4s cubic-bezier(0.1, 0, 0, 1)";
                const x = (winIndex * 90) - (window.innerWidth / 2) + 45;
                tape.style.transform = `translateX(-${x}px)`;
            }, 50);

            setTimeout(() => {
                handleWin(winItem);
            }, 4500);
        }

        function handleWin(item) {
            if(item.stars) {
                balance += item.stars;
                alert(`Вы выиграли ${item.stars} звезд!`);
            } else {
                const inv = document.getElementById('inventory');
                inv.innerHTML += `<div class="inv-item"><img src="${item.img}"><br><small>${item.n}</small></div>`;
                alert(`Вы выиграли NFT: ${item.n}`);
            }
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
