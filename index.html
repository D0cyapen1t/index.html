<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f1218; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .roulette { position: relative; width: 100%; height: 150px; background: #05070a; margin: 50px 0; overflow: hidden; border-y: 1px solid #2d343f; }
        .line { position: absolute; left: 50%; width: 2px; height: 100%; background: #248bf2; z-index: 10; box-shadow: 0 0 10px #248bf2; }
        .tape { display: flex; position: absolute; transition: 6s cubic-bezier(0.1, 0, 0.05, 1); top: 25px; }
        .slot { min-width: 100px; height: 100px; margin: 0 5px; background: #1c212a; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 80px; height: 80px; object-fit: contain; }
        .btn { width: 90%; padding: 20px; background: #248bf2; border: none; color: white; border-radius: 15px; font-weight: bold; font-size: 18px; margin-top: 20px; }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <h2>FRAGMENT CASE</h2>
    <div class="roulette">
        <div class="line"></div>
        <div id="tape" class="tape"></div>
    </div>
    <button class="btn" id="go" onclick="spin()">ОТКРЫТЬ ЗА 500 ⭐</button>

    <script>
        const tg = window.Telegram.WebApp;
        const images = [
            "https://nft.fragment.com/gift/CookieHeart.webp",
            "https://nft.fragment.com/gift/Doge.webp",
            "https://nft.fragment.com/number/88808888888.webp",
            "https://nft.fragment.com/username/news.webp",
            "https://nft.fragment.com/gift/PartyHorn.webp",
            "https://nft.fragment.com/gift/BittenPear.webp"
        ];

        function fill() {
            const t = document.getElementById('tape');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                s.innerHTML = `<img src="${images[Math.floor(Math.random()*images.length)]}">`;
                t.appendChild(s);
            }
        }

        function spin() {
            const b = document.getElementById('go');
            const t = document.getElementById('tape');
            b.disabled = true;
            t.style.transition = 'none';
            t.style.transform = 'translateX(0)';
            setTimeout(() => {
                t.style.transition = '6s cubic-bezier(0.1, 0, 0.05, 1)';
                t.style.transform = `translateX(-${5000 + Math.random()*500}px)`;
            }, 50);
            setTimeout(() => {
                tg.sendData(JSON.stringify({action: "open_case"}));
                b.disabled = false;
            }, 6500);
        }
        fill();
    </script>
</body>
</html>
