<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffca28; --bg: #0b0d10; --card: #161920; --accent: #232731; --red: #ff4757; --green: #2ed573; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        .header { padding: 20px; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--accent); display: flex; justify-content: center; backdrop-filter: blur(10px); }
        .balance-pill { border: 2px solid var(--gold); padding: 10px 30px; border-radius: 50px; font-size: 22px; font-weight: 900; color: var(--gold); box-shadow: 0 0 15px rgba(255,202,40,0.2); }

        .section { display: none; height: calc(100vh - 160px); padding: 20px; overflow-y: auto; }
        .active { display: block; }

        /* ROULETTE */
        .roulette-wrapper { position: relative; width: 100%; height: 200px; background: #050608; border-radius: 24px; overflow: hidden; border: 2px solid var(--accent); margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 20px var(--gold); }
        .tape { display: flex; align-items: center; height: 100%; will-change: transform; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .slot { width: 140px; min-width: 140px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); margin: 0 5px; border-radius: 20px; border: 1px solid var(--accent); }
        .slot img { width: 80px; height: 80px; object-fit: contain; }
        .slot span { font-size: 12px; font-weight: 800; margin-top: 10px; color: #aaa; text-transform: uppercase; }

        /* CRASH */
        .crash-area { background: radial-gradient(circle, #1c212a 0%, #000 100%); height: 220px; border-radius: 25px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--accent); position: relative; overflow: hidden; }
        #c-mult { font-size: 65px; font-weight: 900; color: var(--gold); z-index: 2; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 40px; transition: 0.1s linear; }

        .btn-main { background: linear-gradient(135deg, #ffca28, #ff8f00); color: #000; border: none; width: 100%; padding: 20px; border-radius: 18px; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 5px 0 #b36b00; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #b36b00; }
        .btn-main:disabled { background: #333; color: #666; box-shadow: none; transform: none; }
        .input-box { width: 100%; padding: 18px; margin: 15px 0; background: var(--card); border: 2px solid var(--accent); color: #fff; border-radius: 15px; font-size: 20px; text-align: center; outline: none; }

        /* INV */
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .inv-card { background: var(--card); border-radius: 15px; padding: 10px; text-align: center; border: 1px solid var(--accent); }
        .inv-card img { width: 50px; height: 50px; }
        .sell-btn { background: var(--green); border: none; width: 100%; padding: 7px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-top: 8px; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 40px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; width: 85%; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: #161920; display: flex; border-top: 1px solid var(--accent); padding-bottom: 15px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #5b626e; font-size: 12px; font-weight: 900; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="header"><div class="balance-pill">⭐ <span id="ubal">0</span></div></div>

<div id="m-win" class="modal">
    <div class="modal-box">
        <h1 style="color:var(--gold)">ВЫИГРЫШ!</h1>
        <div id="w-info" style="margin: 25px 0;"></div>
        <button class="btn-main" onclick="takeReward()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="t-roulette" class="section active">
    <div class="roulette-wrapper"><div class="pointer"></div><div id="tape" class="tape"></div></div>
    <button class="btn-main" id="spin-btn" onclick="runSpin()">ОТКРЫТЬ (500 ⭐)</button>
</div>

<div id="t-crash" class="section">
    <div class="crash-area"><div id="c-mult">1.00x</div><div id="rocket">🚀</div></div>
    <input type="number" id="c-bet" class="input-box" placeholder="Ставка...">
    <button class="btn-main" id="c-btn" onclick="runCrash()">ВЗЛЕТАЕМ</button>
</div>

<div id="t-inv" class="section"><div id="inv-g" class="inv-grid"></div></div>

<nav class="nav">
    <div class="nav-item active" onclick="go('roulette')">КЕЙСЫ</div>
    <div class="nav-item" onclick="go('crash')">КРАШ</div>
    <div class="nav-item" onclick="go('inv')">ИНВЕНТАРЬ</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ITEMS = [
        {id:'chill', name:'Chill', img:'Chill.png', p:300},
        {id:'mood', name:'Mood', img:'Mood.png', p:450},
        {id:'snoop', name:'Snoop', img:'Snoop.png', p:600},
        {id:'ufc', name:'UFC', img:'UFC.png', p:800},
        {id:'low', name:'Low', img:'Low.png', p:1000},
        {id:'voodoo', name:'Voodoo', img:'Voodoo.png', p:1500},
        {id:'stars', name:'Stars', img:'⭐', p:0}
    ];

    let bal = parseInt(new URLSearchParams(window.location.search).get('balance')) || 0;
    let inv = JSON.parse(localStorage.getItem('ld_inv')) || [];
    let busy = false, reward = null;

    function sync() {
        document.getElementById('ubal').innerText = bal;
        localStorage.setItem('ld_inv', JSON.stringify(inv));
        try { tg.sendData(JSON.stringify({new_balance: bal})); } catch(e) {}
    }

    function go(t) {
        if(busy && t !== 'roulette') return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(t === 'inv') drawInv();
    }

    function runSpin() {
        if(bal < 500 || busy) return;
        bal -= 500; busy = true; sync();
        const tape = document.getElementById('tape');
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)'; tape.innerHTML = '';
        const winIdx = 40;
        for(let i=0; i<50; i++) {
            let it = ITEMS[Math.floor(Math.random()*ITEMS.length)];
            if(i === winIdx) {
                reward = Object.assign({}, it);
                if(reward.id==='stars') reward.amt = Math.floor(Math.random()*451)+50;
            }
            tape.innerHTML += `<div class="slot">${it.img==='⭐'?'<div style="font-size:40px">⭐</div>':`<img src="img/${it.img}">`}<span>${it.name}</span></div>`;
        }
        setTimeout(() => {
            tape.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
            tape.style.transform = `translateX(-${(winIdx * 150) - window.innerWidth/2 + 75}px)`;
        }, 50);
        setTimeout(() => {
            document.getElementById('m-win').style.display = 'flex';
            document.getElementById('w-info').innerHTML = `<h2>${reward.id==='stars'?reward.amt+' ⭐':reward.name}</h2>`;
        }, 6500);
    }

    function takeReward() {
        if(reward.id==='stars') bal += reward.amt; else inv.push(reward);
        document.getElementById('m-win').style.display = 'none';
        busy = false; sync();
    }

    let cOn = false, cM = 1.0, cT;
    function runCrash() {
        const bet = parseInt(document.getElementById('c-bet').value);
        if(!bet || bet > bal || busy && !cOn) return;
        if(cOn) { bal += Math.floor(bet * cM); endCrash(); return; }
        bal -= bet; busy = true; cOn = true; cM = 1.0; sync();
        const btn = document.getElementById('c-btn');
        btn.innerText = "ЗАБРАТЬ"; btn.style.background = "var(--red)";
        let l = (Math.random()*3.5 + 1.1).toFixed(2);
        cT = setInterval(() => {
            cM += 0.01; document.getElementById('c-mult').innerText = cM.toFixed(2)+"x";
            const r = document.getElementById('rocket');
            r.style.left = (20 + (cM-1)*40)+"px"; r.style.bottom = (20 + (cM-1)*30)+"px";
            if(cM >= l) { clearInterval(cT); document.getElementById('c-mult').innerText = "BOOM!"; setTimeout(endCrash, 2000); }
        }, 80);
    }

    function endCrash() {
        cOn = false; busy = false; clearInterval(cT);
        const btn = document.getElementById('c-btn');
        btn.innerText = "ВЗЛЕТАЕМ"; btn.style.background = "linear-gradient(135deg, #ffca28, #ff8f00)";
        document.getElementById('c-mult').innerText = "1.00x";
        document.getElementById('rocket').style.left = "20px";
        document.getElementById('rocket').style.bottom = "20px";
        sync();
    }

    function drawInv() {
        const g = document.getElementById('inv-g');
        g.innerHTML = inv.length ? '' : '<p style="grid-column:1/4">Пусто</p>';
        inv.forEach((it, i) => {
            g.innerHTML += `<div class="inv-card"><span>${it.name}</span><button class="sell-btn" onclick="sell(${i})">${Math.floor(it.p*1.5)} ⭐</button></div>`;
        });
    }

    function sell(i) { bal += Math.floor(inv[i].p*1.5); inv.splice(i, 1); drawInv(); sync(); }
    sync();
</script>
</body>
</html>
