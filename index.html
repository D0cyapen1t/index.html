<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffca28; --bg: #0b0d10; --card: #161920; --accent: #232731; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid var(--accent); display: flex; justify-content: center; }
        .balance-pill { border: 1px solid var(--gold); padding: 8px 25px; border-radius: 50px; font-size: 20px; font-weight: 900; color: var(--gold); }
        .section { display: none; height: 82vh; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }
        /* РУЛЕТКА */
        .roulette-container { position: relative; width: 100%; height: 180px; background: #050608; border-radius: 24px; overflow: hidden; border: 2px solid var(--accent); }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--gold); z-index: 20; transform: translateX(-50%); box-shadow: 0 0 20px var(--gold); }
        .tape { display: flex; align-items: center; height: 100%; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .slot { width: 130px; min-width: 130px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1c212a; margin: 0 5px; border-radius: 18px; }
        .slot img { width: 70px; height: 70px; object-fit: contain; }
        .btn-main { background: linear-gradient(135deg, #ffca28, #ff8f00); color: #000; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 15px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-win { background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--gold); text-align: center; width: 80%; }
        .navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #161920; display: flex; border-top: 1px solid var(--accent); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #5b626e; font-size: 11px; }
        .nav-btn.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="header"><div class="balance-pill">⭐ <span id="bal">0</span></div></div>

<div id="win-modal" class="modal">
    <div class="modal-win">
        <h2 style="color:var(--gold)">ВЫПАЛО!</h2>
        <div id="win-res" style="padding: 20px 0;"></div>
        <button class="btn-main" onclick="claim()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="tab-roulette" class="section active">
    <div class="roulette-container"><div class="pointer"></div><div id="tape" class="tape"></div></div>
    <button class="btn-main" id="spin-btn" onclick="spin()">КЕЙС (500 ⭐)</button>
</div>

<div id="tab-crash" class="section">
    <div style="background:#000; height:180px; border-radius:20px; display:flex; align-items:center; justify-content:center; border:2px solid var(--accent);">
        <h1 id="c-mult" style="font-size:50px; color:var(--gold);">1.00x</h1>
    </div>
    <input type="number" id="c-bet" style="width:100%; padding:15px; margin:15px 0; background:#1c212a; color:#fff; border:1px solid #333; border-radius:12px;" placeholder="Ставка...">
    <button class="btn-main" id="c-btn" onclick="crash()">ВЗЛЕТАЕМ</button>
</div>

<div id="tab-inv" class="section">
    <div id="inv-list" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="nav('roulette')">КЕЙСЫ</div>
    <div class="nav-btn" onclick="nav('crash')">КРАШ</div>
    <div class="nav-btn" onclick="nav('inv')">ИНВЕНТАРЬ</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const items = [
        {id:'chill', name:'Chill', img:'Chill.png', p:300},
        {id:'mood', name:'Mood', img:'Mood.png', p:450},
        {id:'snoop', name:'Snoop', img:'Snoop.png', p:600},
        {id:'ufc', name:'UFC', img:'UFC.png', p:800},
        {id:'low', name:'Low', img:'Low.png', p:1000},
        {id:'voodoo', name:'Voodoo', img:'Voodoo.png', p:1500},
        {id:'stars', name:'Stars', img:'⭐', p:0}
    ];

    let balance = parseInt(new URLSearchParams(window.location.search).get('balance')) || 0;
    let inv = JSON.parse(localStorage.getItem('lyd_inv')) || [];
    let isBusy = false, win = null;

    function sync() {
        document.getElementById('bal').innerText = balance;
        localStorage.setItem('lyd_inv', JSON.stringify(inv));
        tg.sendData(JSON.stringify({new_balance: balance}));
    }

    function nav(t) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        if(t==='inv') renderInv();
    }

    function spin() {
        if(balance < 500 || isBusy) return;
        balance -= 500; isBusy = true; sync();
        const tape = document.getElementById('tape');
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)'; tape.innerHTML = '';
        const winIdx = 40;
        for(let i=0; i<50; i++) {
            let it = items[Math.floor(Math.random()*items.length)];
            if(i === winIdx) win = Object.assign({}, it);
            tape.innerHTML += `<div class="slot">${it.img==='⭐'?'<div style="font-size:40px">⭐</div>':`<img src="img/${it.img}">`}<span>${it.name}</span></div>`;
        }
        setTimeout(() => {
            tape.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
            tape.style.transform = `translateX(-${(winIdx * 140) - window.innerWidth/2 + 70}px)`;
        }, 50);
        setTimeout(() => {
            if(win.id === 'stars') win.amount = Math.floor(Math.random()*(500-50+1))+50;
            document.getElementById('win-modal').style.display='flex';
            document.getElementById('win-res').innerHTML = `<h3>${win.id==='stars'?win.amount+' ⭐':win.name}</h3>`;
        }, 6500);
    }

    function claim() {
        if(win.id==='stars') balance += win.amount; else inv.push(win);
        document.getElementById('win-modal').style.display='none';
        isBusy = false; sync();
    }

    let cActive = false, cMult = 1.0, cTimer;
    function crash() {
        const bet = parseInt(document.getElementById('c-bet').value);
        if(!bet || bet > balance || isBusy && !cActive) return;
        if(cActive) { balance += Math.floor(bet*cMult); resetCrash(); return; }
        balance -= bet; cActive = true; isBusy = true; cMult = 1.0; sync();
        document.getElementById('c-btn').innerText = "ЗАБРАТЬ";
        let boom = (Math.random()*3 + 1.1).toFixed(2);
        cTimer = setInterval(() => {
            cMult += 0.01; document.getElementById('c-mult').innerText = cMult.toFixed(2)+"x";
            if(cMult >= boom) { document.getElementById('c-mult').innerText="BOOM!"; clearInterval(cTimer); setTimeout(resetCrash, 2000); }
        }, 80);
    }
    function resetCrash() { cActive=false; isBusy=false; clearInterval(cTimer); document.getElementById('c-btn').innerText="ВЗЛЕТАЕМ"; sync(); }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inv.length ? '' : 'Пусто';
        inv.forEach((it, i) => {
            list.innerHTML += `<div class="slot" style="width:100px; height:100px;"><span>${it.name}</span><button onclick="sell(${i})" style="background:var(--accent); color:#fff; border:none; padding:5px;">${Math.floor(it.p*1.5)} ⭐</button></div>`;
        });
    }
    function sell(i) { balance += Math.floor(inv[i].p*1.5); inv.splice(i, 1); renderInv(); sync(); }

    sync();
</script>
</body>
</html>
