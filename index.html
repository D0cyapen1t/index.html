<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydka TWA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; text-align: center; }
        .section { display: none; padding: 20px; }
        .active { display: block; }
        
        /* Кейсы */
        .case-box { background: #1e1e1e; border: 2px solid #333; border-radius: 15px; margin: 15px; padding: 20px; }
        .case-img { width: 100px; height: 100px; object-fit: contain; }
        .btn-open { background: #0088cc; border: none; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* Рулетка */
        #roulette-container { width: 100%; overflow: hidden; position: relative; height: 120px; background: #000; border: 2px solid gold; margin-top: 10px; }
        #tape { display: flex; transition: transform 4s cubic-bezier(0.1, 0, 0, 1); }
        .slot { min-width: 100px; height: 100px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 80px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #1a1a1a; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; color: #888; }
        .nav-item.active-tab { color: #0088cc; }
    </style>
</head>
<body>

    <div id="menu" class="section active">
        <h1>LYDKA</h1>
        <p>Добро пожаловать в элитный клуб!</p>
    </div>

    <div id="cases" class="section">
        <h2>КЕЙСЫ</h2>
        <div class="case-box">
            <h3>Рулетка (NFT & Stars)</h3>
            <img src="https://t.me/i/userpic/160/fragment.jpg" class="case-img">
            <p>Цена: 500 ⭐</p>
            <div id="roulette-container"><div id="tape"></div></div>
            <button class="btn-open" onclick="startSpin('roulette')">Крутить</button>
        </div>
        <div class="case-box">
            <h3>Кейс 50/50</h3>
            <p>Voodoo Doll или Пусто</p>
            <button class="btn-open" onclick="startSpin('50/50')">Открыть (500 ⭐)</button>
        </div>
    </div>

    <div id="profile" class="section">
        <h2>ПРОФИЛЬ</h2>
        <div class="case-box">
            <p>Баланс: <span id="balance">0</span> ⭐</p>
            <hr>
            <h3>Мои призы:</h3>
            <div id="inventory">Пусто</div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item" onclick="switchTab('menu')">🏠 Меню</div>
        <div class="nav-item" onclick="switchTab('cases')">📦 Кейсы</div>
        <div class="nav-item" onclick="switchTab('profile')">👤 Профиль</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const items = [
            {n: "Chill Flame", i: "https://t.me/nft/ChillFlame-100"},
            {n: "Mood Pack", i: "https://t.me/nft/MoodPack-100"},
            {n: "Snoop Dogs", i: "https://t.me/nft/SnoopDogs-100"},
            {n: "UFC Strike", i: "https://t.me/nft/UFCStrike-100"},
            {n: "Low Rider", i: "https://t.me/nft/LowRider-100"},
            {n: "Voodoo Doll", i: "https://t.me/nft/VoodooDoll-100"},
            {n: "500 Stars", i: "https://telegra.ph/file/stars_icon.png"},
            {n: "Пусто", i: "https://telegra.ph/file/empty_icon.png"}
        ];

        function switchTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startSpin(type) {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            // Генерируем 50 случайных слотов для эффекта
            for(let i=0; i<50; i++) {
                const item = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="slot"><img src="https://tgstars.tg/nft/image?name=${item.n.replace(' ','')}"></div>`;
            }
            const offset = (48 * 100) + Math.floor(Math.random()*80);
            tape.style.transform = `translateX(-${offset}px)`;
            
            setTimeout(() => {
                alert("Вы выиграли: " + items[Math.floor(Math.random()*items.length)].n);
                // Тут должен быть запрос к API бота для обновления баланса
            }, 4100);
        }
    </script>
</body>
</html>
