<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #1c212a; --accent: #31d158; --gold: #f5a623; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; padding: 15px; background: #161b22; border-bottom: 1px solid #2d343f; }
        .bal { color: var(--gold); font-weight: bold; }

        .content { height: 70vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .page { display: none; width: 100%; text-align: center; }
        .page.active { display: block; }

        /* Кейсы */
        .case-select { display: flex; gap: 10px; padding: 20px; justify-content: center; }
        .case-min { width: 80px; padding: 10px; background: var(--card); border-radius: 12px; border: 2px solid transparent; }
        .case-min.active { border-color: var(--accent); }
        .case-min img { width: 100%; }

        /* Рулетка */
        .roulette { position: relative; width: 90%; height: 130px; background: #05070a; margin: 20px auto; overflow: hidden; border-radius: 15px; border: 1px solid #2d343f; }
        .pointer { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--accent); z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; top: 15px; transition: 6s cubic-bezier(0.1, 0, 0.05, 1); }
        .slot { min-width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 80px; height: 80px; object-fit: contain; }

        /* Кнопки */
        .btn { width: 90%; padding: 20px; border-radius: 15px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .btn-spin { background: var(--accent); color: #000; }
        .btn-claim { background: var(--gold); color: #000; display: none; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #161b22; display: flex; border-top: 1px solid #2d343f; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #4b5563; }
        .nav-item.active { color: var(--accent); }
        .nav-item.disabled { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900;">SWILL</div>
        <div class="bal">BALANCE: <span id="balance-ui">0</span> ⭐</div>
    </div>

    <div class="content">
        <div id="p-hub" class="page active">
            <div class="case-select">
                <div class="case-min active" onclick="setCase('gifts', 1000, this)">
                    <img src="https://fragment.com/img/gift/CookieHeart.webp">
                </div>
                <div class="case-min" onclick="setCase('usernames', 1000, this)">
                    <img src="https://fragment.com/img/username/vibe.webp">
                </div>
                <div class="case-min" onclick="setCase('numbers', 10000, this)">
                    <img src="https://fragment.com/img/number/88808888888.webp">
                </div>
            </div>
            <div class="roulette">
                <div class="pointer"></div>
                <div id="tape" class="tape"></div>
            </div>
            <button class="btn btn-spin" id="spin-btn" onclick="run()">ОТКРЫТЬ КЕЙС</button>
            <button class="btn btn-claim" id="claim-btn" onclick="claim()">ЗАБРАТЬ ПОДАРОК</button>
        </div>

        <div id="p-wallet" class="page">
            <h2 id="win-text">ИНВЕНТАРЬ ПУСТ</h2>
            <div id="win-img"></div>
            <p style="color: #4b5563; margin-top: 20px;">Предмет будет зачислен ботом в течение минуты.</p>
        </div>
    </div>

    <div class="nav" id="nav-bar">
        <div class="nav-item active" id="n-hub" onclick="nav('p-hub')">HUB</div>
        <div class="nav-item" id="n-wallet" onclick="nav('p-wallet')">WALLET</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let selectedCase = 'gifts';
        let winningItem = '';
        const items = {
            gifts: ["CookieHeart", "KissFrog", "LootBag", "CandyCane"],
            usernames: ["news", "vibe", "magic", "duck"],
            numbers: ["88808888888", "88805055050", "88801234567"]
        };

        function setCase(type, price, el) {
            selectedCase = type;
            document.querySelectorAll('.case-min').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            fillTape();
        }

        function fillTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            const pool = items[selectedCase];
            for(let i=0; i<60; i++) {
                const name = pool[Math.floor(Math.random()*pool.length)];
                const imgPrefix = selectedCase === 'gifts' ? 'gift/' : (selectedCase === 'usernames' ? 'username/' : 'number/');
                tape.innerHTML += `<div class="slot"><img src="https://fragment.com/img/${imgPrefix}${name}.webp"></div>`;
            }
        }

        function run() {
            const btn = document.getElementById('spin-btn');
            const tape = document.getElementById('tape');
            btn.disabled = true;
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = '6s cubic-bezier(0.1, 0, 0.05, 1)';
                const shift = 3800 + Math.random()*400;
                tape.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                // Определяем "выигрыш" визуально (просто берем рандом из списка)
                winningItem = items[selectedCase][Math.floor(Math.random()*items[selectedCase].length)];
                btn.style.display = 'none';
                document.getElementById('claim-btn').style.display = 'block';
            }, 6500);
        }

        function claim() {
            // Блокируем навигацию
            document.getElementById('nav-bar').querySelectorAll('.nav-item').forEach(i => i.classList.add('disabled'));
            
            // Отправляем данные боту
            tg.sendData(JSON.stringify({
                action: "claim",
                item: winningItem,
                type: selectedCase
            }));

            // Переход в кошелек через 1 сек
            setTimeout(() => {
                nav('p-wallet');
                document.getElementById('win-text').innerText = "ВЫ ВЫИГРАЛИ: " + winningItem;
                const imgPrefix = selectedCase === 'gifts' ? 'gift/' : (selectedCase === 'usernames' ? 'username/' : 'number/');
                document.getElementById('win-img').innerHTML = `<img src="https://fragment.com/img/${imgPrefix}${winningItem}.webp" style="width:150px">`;
            }, 1000);
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'p-hub') document.getElementById('n-hub').classList.add('active');
            if (id === 'p-wallet') document.getElementById('n-wallet').classList.add('active');
        }

        fillTape();
    </script>
</body>
</html>
