<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #010101; --card-bg: #1c1c1e; --accent: #ffca28;
            --grad-blue: linear-gradient(135deg, #3a1cbb 0%, #5611d6 100%);
            --grad-red: linear-gradient(135deg, #b01a1a 0%, #e32c2c 100%);
            --text-main: #ffffff; --text-sub: #8e8e93;
        }
        body { 
            background: var(--bg); color: var(--text-main); font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; user-select: none;
        }

        /* Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: #000; position: sticky; top: 0; z-index: 100;
        }
        .balance-box {
            background: var(--card-bg); padding: 8px 16px; border-radius: 12px;
            display: flex; align-items: center; gap: 8px; font-weight: 800; border: 1px solid #2c2c2e;
        }
        .balance-box span { color: var(--accent); }

        /* Main Menu */
        .menu-container { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .mode-card {
            border-radius: 24px; padding: 25px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; min-height: 120px; justify-content: center;
            text-decoration: none; color: white; transition: transform 0.1s;
        }
        .mode-card:active { transform: scale(0.97); }
        .mode-card.crash { background: var(--grad-blue); }
        .mode-card.roulette { background: var(--grad-red); }
        
        .mode-card h2 { margin: 0; font-size: 24px; font-weight: 800; }
        .mode-card p { margin: 5px 0 0; font-size: 13px; opacity: 0.8; max-width: 60%; }
        .mode-card .icon { position: absolute; right: 15px; bottom: 10px; font-size: 60px; opacity: 0.9; }

        /* Sections */
        .section { display: none; height: calc(100vh - 150px); padding: 15px; overflow-y: auto; }
        .active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Game UI */
        .crash-area { background: #0a0a0a; border-radius: 20px; height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; position: relative; border: 1px solid #1c1c1e; }
        .roulette-container { position: relative; width: 100%; height: 180px; background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #1c1c1e; }
        .tape { display: flex; align-items: center; height: 100%; will-change: transform; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--accent); z-index: 10; transform: translateX(-50%); }

        .slot { min-width: 130px; width: 130px; height: 150px; margin: 0 5px; border-radius: 15px; background: var(--card-bg); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot span { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 10px; padding: 5px 0; text-align: center; }

        /* Buttons */
        .btn-action { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; text-transform: uppercase; margin-top: 10px; }
        .btn-stop { background: #ff3b30; color: #fff; }

        /* Navbar */
        .navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #121212; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2c2c2e; padding-bottom: 10px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); gap: 4px; font-size: 11px; font-weight: 600; }
        .nav-item.active { color: #fff; }
        .nav-item svg { width: 24px; height: 24px; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); width: 85%; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid #333; }
        
        .history-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
        .dot { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 6px; background: #2c2c2e; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 800; font-size: 20px;">LIVE</div>
    <div class="balance-box">⭐ <span id="bal-display">0</span></div>
</div>

<div id="tab-home" class="section active">
    <div class="menu-container">
        <div class="mode-card crash" onclick="openGame('crash')">
            <h2>Краш</h2>
            <p>Успейте забрать выигрыш до взрыва ракеты</p>
            <div class="icon">🚀</div>
        </div>
        <div class="mode-card roulette" onclick="openGame('roulette')">
            <h2>Рулетка</h2>
            <p>Крутите рулетку и получайте призы</p>
            <div class="icon">👜</div>
        </div>
    </div>
</div>

<div id="tab-crash" class="section">
    <div id="crash-hist" class="history-dots"></div>
    <div class="crash-area">
        <h1 id="mult" style="font-size: 60px; font-weight: 900; color: var(--accent);">1.00x</h1>
    </div>
    <input type="number" id="bet-input" placeholder="Ставка..." style="width:100%; padding:18px; border-radius:15px; border:none; background:var(--card-bg); color:white; text-align:center; margin-bottom:10px;">
    <button class="btn-action" id="crash-btn" onclick="runCrash()">ИГРАТЬ</button>
    <button class="btn-action" style="background:#333; color:#fff;" onclick="nav('home')">НАЗАД</button>
</div>

<div id="tab-roulette" class="section">
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>
    <button class="btn-action" id="spin-btn" onclick="runSpin()">ОТКРЫТЬ (500 ⭐)</button>
    <button class="btn-action" style="background:#333; color:#fff;" onclick="nav('home')">НАЗАД</button>
</div>

<div id="tab-profile" class="section">
    <h2 style="margin-bottom:20px;">Инвентарь</h2>
    <div id="inv-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('home')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Игры
    </div>
    <div class="nav-item" onclick="nav('profile')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Профиль
    </div>
</nav>

<div id="win-modal" class="modal">
    <div class="modal-content">
        <h2 id="win-txt">ВЫИГРЫШ!</h2>
        <div id="win-item-box" style="margin:20px 0;"></div>
        <button class="btn-action" onclick="closeModal()">ОТЛИЧНО</button>
    </div>
</div>

<script>
    const items = [
        {name: 'UFC STRICE', img: 'UFC.png', price: 1450},
        {name: 'Chill Flame', img: 'Chill.png', price: 450},
        {name: 'Low Rider', img: 'Low.png', price: 4000},
        {name: '150 Stars', img: '⭐', val: 150}
    ];

    let bal = parseInt(localStorage.getItem('bal')) || 1000;
    let inv = JSON.parse(localStorage.getItem('inv')) || [];
    let hist = [];
    let isBusy = false;

    function sync() {
        document.getElementById('bal-display').innerText = bal.toLocaleString();
        localStorage.setItem('bal', bal);
        localStorage.setItem('inv', JSON.stringify(inv));
    }

    function nav(id) {
        if(isBusy) return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(id === 'profile') renderInv();
    }

    function openGame(id) {
        nav(id);
    }

    // --- CRASH ---
    let cMult = 1.0; let cTimer;
    function runCrash() {
        if(isBusy) { stopCrash(); return; }
        let bet = parseInt(document.getElementById('bet-input').value);
        if(!bet || bet > bal || bet < 100) return;
        bal -= bet; isBusy = true; sync();
        
        let boom = Math.random() < 0.45 ? 1.0 : (1.1 + Math.random() * 4).toFixed(2);
        const btn = document.getElementById('crash-btn');
        btn.innerText = "ЗАБРАТЬ (0)"; btn.classList.add('btn-stop');
        
        cTimer = setInterval(() => {
            cMult += 0.01;
            document.getElementById('mult').innerText = cMult.toFixed(2) + "x";
            btn.innerText = `ЗАБРАТЬ (${Math.floor(bet * cMult)})`;
            if(cMult >= boom) {
                clearInterval(cTimer);
                document.getElementById('mult').style.color = "#ff3b30";
                document.getElementById('mult').innerText = "BOOM!";
                setTimeout(() => { resetCrash(); }, 1500);
            }
        }, 85);
    }

    function stopCrash() {
        let bet = parseInt(document.getElementById('bet-input').value);
        bal += Math.floor(bet * cMult);
        clearInterval(cTimer);
        resetCrash();
    }

    function resetCrash() {
        isBusy = false; cMult = 1.0;
        const btn = document.getElementById('crash-btn');
        btn.innerText = "ИГРАТЬ"; btn.classList.remove('btn-stop');
        document.getElementById('mult').style.color = "var(--accent)";
        sync();
    }

    // --- ROULETTE ---
    function runSpin() {
        if(bal < 500 || isBusy) return;
        bal -= 500; isBusy = true; sync();
        
        const tape = document.getElementById('tape');
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';

        let prize = items[Math.floor(Math.random() * items.length)];
        for(let i=0; i<50; i++) {
            let it = i === 40 ? prize : items[Math.floor(Math.random() * items.length)];
            tape.innerHTML += `<div class="slot">${it.img === '⭐' ? '⭐' : `<img src="img/${it.img}">`}<span>${it.name}</span></div>`;
        }

        setTimeout(() => {
            tape.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
            let shift = (40 * 140) + 70 - (window.innerWidth / 2);
            tape.style.transform = `translateX(-${shift}px)`;
        }, 50);

        setTimeout(() => {
            if(prize.val) bal += prize.val; else inv.push(prize);
            showWin(prize);
            isBusy = false; sync();
        }, 6500);
    }

    function showWin(it) {
        document.getElementById('win-modal').style.display = 'flex';
        document.getElementById('win-item-box').innerHTML = `<h3>${it.name}</h3>`;
    }

    function closeModal() { document.getElementById('win-modal').style.display = 'none'; }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inv.length ? '' : 'Пусто';
        inv.forEach((it, i) => {
            list.innerHTML += `<div class="slot" style="width:100%; height:140px;"><img src="img/${it.img}"><span>${it.name}</span></div>`;
        });
    }

    sync();
</script>
</body>
</html>
