<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #ffca28;
            --bg: #0b0d10;
            --card: #161920;
            --accent: #232731;
            --red: #ff4757;
            --green: #2ed573;
            --text: #ffffff;
            --text-dim: #a0a8b3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
        }

        /* HEADER */
        .header {
            padding: 20px 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .balance-pill {
            background: #000;
            border: 2px solid var(--gold);
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 900;
            color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 202, 40, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* SECTIONS */
        .section {
            display: none;
            height: calc(100vh - 155px);
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .section.active { display: block; }

        /* ROULETTE STYLES */
        .roulette-container {
            position: relative;
            width: 100%;
            height: 200px;
            background: #050608;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--accent);
            margin-top: 10px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--gold);
            z-index: 20;
            transform: translateX(-50%);
            box-shadow: 0 0 25px var(--gold);
        }

        .tape {
            display: flex;
            align-items: center;
            height: 100%;
            will-change: transform;
            transition: transform 6s cubic-bezier(0.1, 0, 0.05, 1);
        }

        .slot {
            width: 130px;
            min-width: 130px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card);
            margin: 0 5px;
            border-radius: 20px;
            flex-shrink: 0;
            border: 1px solid var(--accent);
        }

        .slot img { width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .slot span { font-size: 12px; font-weight: 800; margin-top: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* CRASH STYLES */
        .crash-card {
            background: radial-gradient(circle at center, #1c212a 0%, #0b0d10 100%);
            border-radius: 28px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid var(--accent);
        }

        #c-mult { font-size: 70px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px rgba(255, 202, 40, 0.3); z-index: 2; }
        #rocket-ship { position: absolute; bottom: 20px; left: 20px; font-size: 45px; transition: all 0.1s linear; z-index: 1; }

        /* BUTTONS & INPUTS */
        .input-field {
            width: 100%;
            padding: 18px;
            margin: 20px 0;
            background: var(--card);
            border: 2px solid var(--accent);
            color: #fff;
            border-radius: 18px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        .input-field:focus { border-color: var(--gold); }

        .btn-main {
            background: linear-gradient(135deg, #ffca28, #ff8f00);
            color: #000;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b36b00;
            transition: all 0.1s;
        }

        .btn-main:active { transform: translateY(4px); box-shadow: 0 4px 0 #b36b00; }
        .btn-main:disabled { background: #2c303a; color: #555; box-shadow: none; transform: none; }
        .btn-stop { background: linear-gradient(135deg, #ff4757, #ff6b81); box-shadow: 0 8px 0 #b32d38; }

        /* INVENTORY */
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .inv-item {
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 18px;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .inv-item img { width: 50px; height: 50px; margin-bottom: 8px; }
        .sell-btn {
            background: var(--green);
            color: #000;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            margin-top: 5px;
            width: 100%;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card);
            padding: 40px 30px;
            border-radius: 35px;
            border: 2px solid var(--gold);
            text-align: center;
            width: 85%;
            animation: pop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* NAVBAR */
        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: #161920;
            display: flex;
            border-top: 1px solid var(--accent);
            padding-bottom: 15px;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #5b626e;
            font-size: 12px;
            font-weight: 800;
            transition: 0.3s;
        }

        .nav-btn.active { color: var(--gold); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="header">
    <div class="balance-pill">⭐ <span id="balance-display">0</span></div>
</div>

<div id="win-modal" class="modal-overlay">
    <div class="modal-content">
        <h1 style="color:var(--gold); margin: 0 0 10px 0;">ПОЗДРАВЛЯЕМ!</h1>
        <div id="win-info" style="margin: 25px 0;"></div>
        <button class="btn-main" onclick="closeWinModal()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="tab-roulette" class="section active">
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>
    <div style="margin-top: 30px;">
        <button class="btn-main" id="spin-button" onclick="startSpin()">ОТКРЫТЬ КЕЙС (500 ⭐)</button>
        <p style="text-align:center; color: var(--text-dim); font-size: 13px; margin-top: 15px;">Вам может выпасть подарок или до 500 ⭐</p>
    </div>
</div>

<div id="tab-crash" class="section">
    <div class="crash-card">
        <div id="c-mult">1.00x</div>
        <div id="rocket-ship">🚀</div>
    </div>
    <input type="number" id="crash-bet-input" class="input-field" placeholder="Сумма ставки...">
    <button class="btn-main" id="crash-action-btn" onclick="handleCrashLogic()">ВЗЛЕТАЕМ</button>
</div>

<div id="tab-inv" class="section">
    <h2 style="margin-top:0; color: var(--gold);">ВАШИ ПОДАРКИ</h2>
    <div id="inventory-grid" class="inv-grid"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="switchTab('roulette')">
        <span class="nav-icon">📦</span><span>КЕЙСЫ</span>
    </div>
    <div class="nav-btn" onclick="switchTab('crash')">
        <span class="nav-icon">🚀</span><span>КРАШ</span>
    </div>
    <div class="nav-btn" onclick="switchTab('inv')">
        <span class="nav-icon">👤</span><span>ПРОФИЛЬ</span>
    </div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ПОЛНЫЙ СПИСОК ПОДАРКОВ
    const ALL_ITEMS = [
        {id: 'chill', name: 'Chill', img: 'Chill.png', basePrice: 300},
        {id: 'mood', name: 'Mood', img: 'Mood.png', basePrice: 450},
        {id: 'snoop', name: 'Snoop', img: 'Snoop.png', basePrice: 600},
        {id: 'ufc', name: 'UFC', img: 'UFC.png', basePrice: 800},
        {id: 'low', name: 'Low', img: 'Low.png', basePrice: 1000},
        {id: 'voodoo', name: 'Voodoo', img: 'Voodoo.png', basePrice: 1500},
        {id: 'stars', name: 'Stars', img: '⭐', basePrice: 0}
    ];

    let userBalance = parseInt(new URLSearchParams(window.location.search).get('balance')) || 0;
    let userInventory = JSON.parse(localStorage.getItem('lydka_storage_inv')) || [];
    let isGameRunning = false;
    let pendingReward = null;

    function updateApp() {
        document.getElementById('balance-display').innerText = userBalance;
        document.getElementById('spin-button').disabled = (userBalance < 500 || isGameRunning);
        localStorage.setItem('lydka_storage_inv', JSON.stringify(userInventory));
        // Отправка боту для сохранения в БД
        tg.sendData(JSON.stringify({new_balance: userBalance}));
    }

    function switchTab(tabId) {
        if(isGameRunning && tabId !== 'roulette' && !confirm('Игра прервется. Уйти?')) return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(tabId === 'inv') renderInventoryList();
    }

    // --- ЛОГИКА КЕЙСА ---
    function startSpin() {
        if(userBalance < 500 || isGameRunning) return;
        
        userBalance -= 500;
        isGameRunning = true;
        updateApp();

        const tape = document.getElementById('tape');
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';

        const slotStep = 140; // 130px width + 10px total margins
        const winningIndex = 45;

        for(let i = 0; i < 55; i++) {
            let randomItem = ALL_ITEMS[Math.floor(Math.random() * ALL_ITEMS.length)];
            if(i === winningIndex) {
                pendingReward = Object.assign({}, randomItem);
                // Рандом звезд 50-500
                if(pendingReward.id === 'stars') {
                    pendingReward.starAmount = Math.floor(Math.random() * (500 - 50 + 1)) + 50;
                }
            }
            const visual = randomItem.img === '⭐' ? '<div style="font-size:45px">⭐</div>' : `<img src="img/${randomItem.img}">`;
            tape.innerHTML += `<div class="slot">${visual}<span>${randomItem.name}</span></div>`;
        }

        setTimeout(() => {
            tape.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
            const stopPosition = (winningIndex * slotStep) - (window.innerWidth / 2) + (slotStep / 2);
            tape.style.transform = `translateX(-${stopPosition}px)`;
        }, 50);

        setTimeout(() => {
            const winInfo = document.getElementById('win-info');
            if(pendingReward.id === 'stars') {
                winInfo.innerHTML = `<div style="font-size:60px">⭐</div><h2 style="margin:10px 0;">${pendingReward.starAmount} ЗВЕЗД</h2>`;
            } else {
                winInfo.innerHTML = `<img src="img/${pendingReward.img}" style="width:120px"><h2 style="margin:10px 0;">${pendingReward.name}</h2>`;
            }
            document.getElementById('win-modal').style.display = 'flex';
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }, 6500);
    }

    function closeWinModal() {
        if(pendingReward.id === 'stars') {
            userBalance += pendingReward.starAmount;
        } else {
            userInventory.push(pendingReward);
        }
        document.getElementById('win-modal').style.display = 'none';
        isGameRunning = false;
        updateApp();
    }

    // --- ЛОГИКА КРАША ---
    let crashMultiplier = 1.0;
    let crashInterval;
    let isCrashLive = false;

    function handleCrashLogic() {
        const bet = parseInt(document.getElementById('crash-bet-input').value);
        if(!bet || bet <= 0 || bet > userBalance || (isGameRunning && !isCrashLive)) return;

        const btn = document.getElementById('crash-action-btn');

        if(isCrashLive) {
            // Игрок нажал "Забрать"
            clearInterval(crashInterval);
            const winSum = Math.floor(bet * crashMultiplier);
            userBalance += winSum;
            alert(`Вы забрали ${winSum} ⭐!`);
            resetCrashGame();
            return;
        }

        // Старт игры
        userBalance -= bet;
        isGameRunning = true;
        isCrashLive = true;
        crashMultiplier = 1.0;
        updateApp();

        btn.innerText = "ЗАБРАТЬ";
        btn.classList.add('btn-stop');

        const explodeAt = (Math.random() * 3.5 + 1.1).toFixed(2);

        crashInterval = setInterval(() => {
            crashMultiplier += 0.01;
            document.getElementById('c-mult').innerText = crashMultiplier.toFixed(2) + "x";
            
            // Анимация ракеты
            const rocket = document.getElementById('rocket-ship');
            rocket.style.bottom = (20 + (crashMultiplier - 1) * 30) + "px";
            rocket.style.left = (20 + (crashMultiplier - 1) * 40) + "px";

            if(crashMultiplier >= explodeAt) {
                clearInterval(crashInterval);
                document.getElementById('c-mult').innerText = "BOOM!";
                document.getElementById('c-mult').style.color = "var(--red)";
                setTimeout(resetCrashGame, 2000);
            }
        }, 70);
    }

    function resetCrashGame() {
        isCrashLive = false;
        isGameRunning = false;
        clearInterval(crashInterval);
        const btn = document.getElementById('crash-action-btn');
        btn.innerText = "ВЗЛЕТАЕМ";
        btn.classList.remove('btn-stop');
        document.getElementById('c-mult').style.color = "var(--gold)";
        document.getElementById('c-mult').innerText = "1.00x";
        const rocket = document.getElementById('rocket-ship');
        rocket.style.bottom = "20px";
        rocket.style.left = "20px";
        updateApp();
    }

    // --- ИНВЕНТАРЬ ---
    function renderInventoryList() {
        const container = document.getElementById('inventory-grid');
        container.innerHTML = userInventory.length ? '' : '<p style="grid-column: 1/4; text-align:center; color:#555; padding:20px;">У вас пока нет подарков</p>';
        
        userInventory.forEach((item, index) => {
            const sellPrice = Math.floor(item.basePrice * 1.5);
            container.innerHTML += `
                <div class="inv-item">
                    <img src="img/${item.img}">
                    <div style="font-size:11px; font-weight:bold;">${item.name}</div>
                    <button class="sell-btn" onclick="sellItem(${index}, ${sellPrice})">${sellPrice} ⭐</button>
                </div>
            `;
        });
    }

    function sellItem(index, price) {
        userInventory.splice(index, 1);
        userBalance += price;
        renderInventoryList();
        updateApp();
    }

    // Инициализация
    updateApp();
</script>
</body>
</html>
