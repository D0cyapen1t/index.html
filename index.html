<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #2ea043; --gold: #f0883e; }
        body { background: var(--bg); color: #c9d1d9; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; padding: 15px 20px; background: #161b22; border-bottom: 1px solid #30363d; }
        .bal { color: var(--gold); font-weight: bold; }

        /* Tabs */
        .tabs { display: flex; background: #0d1117; padding: 10px; gap: 10px; justify-content: center; }
        .tab { padding: 10px 20px; background: var(--card); border-radius: 12px; font-size: 12px; font-weight: bold; border: 1px solid #30363d; }
        .tab.active { border-color: var(--accent); color: white; background: #21262d; }

        /* Roulette */
        .roulette-box { width: 100%; height: 160px; background: #010409; margin-top: 20px; position: relative; overflow: hidden; border-top: 1px solid #30363d; border-bottom: 1px solid #30363d; }
        .line { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--accent); z-index: 5; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent); }
        .tape { display: flex; position: absolute; top: 30px; transition: 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .slot { min-width: 100px; height: 100px; margin: 0 8px; background: var(--card); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #30363d; }
        .slot img { width: 75px; height: 75px; object-fit: contain; }

        /* Action */
        .action-area { padding: 20px; text-align: center; }
        .btn { width: 100%; padding: 20px; border-radius: 16px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-spin { background: var(--accent); color: white; }
        .btn-claim { background: var(--gold); color: white; display: none; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Wallet Page */
        #page-wallet { display: none; padding: 20px; text-align: center; }
        .win-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 20px; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #161b22; display: flex; border-top: 1px solid #30363d; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #8b949e; }
        .nav-item.active { color: var(--accent); }
        .nav-item.locked { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-main">
        <div class="header">
            <div style="font-weight: 900;">SWILL HUB</div>
            <div class="bal">/wallet ⭐</div>
        </div>

        <div id="page-hub">
            <div class="tabs">
                <div class="tab active" onclick="setCase('gifts', 1000, this)">GIFTS</div>
                <div class="tab" onclick="setCase('usernames', 1000, this)">NAMES</div>
                <div class="tab" onclick="setCase('numbers', 10000, this)">NUMBERS</div>
            </div>

            <div class="roulette-box">
                <div class="line"></div>
                <div id="tape" class="tape"></div>
            </div>

            <div class="action-area">
                <h3 id="case-name">Premium Gifts</h3>
                <p id="case-price" style="color: #8b949e; margin-top: -10px;">1000 ⭐</p>
                <button class="btn btn-spin" id="spin-btn" onclick="spin()">ОТКРЫТЬ КЕЙС</button>
                <button class="btn btn-claim" id="claim-btn" onclick="claim()">ЗАБРАТЬ ПРЕДМЕТ</button>
            </div>
        </div>

        <div id="page-wallet">
            <h2>ТВОЙ ИНВЕНТАРЬ</h2>
            <div class="win-card">
                <div id="win-img"></div>
                <h3 id="win-title">Ничего нет</h3>
                <p style="font-size: 12px; color: #8b949e;">Предмет успешно зачислен в базу данных бота.</p>
            </div>
        </div>

        <div class="nav" id="bot-nav">
            <div class="nav-item active" id="n-hub" onclick="showPage('hub')">HUB</div>
            <div class="nav-item" id="n-wallet" onclick="showPage('wallet')">WALLET</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let currentCase = 'gifts';
        let winItem = '';

        const db = {
            gifts: ["CookieHeart", "KissFrog", "LootBag", "CandyCane", "ChristmasTree", "LoveLetter", "StarPendant", "GoldenCup", "DiamondRing", "MagicLamp"],
            usernames: ["news", "vibe", "magic", "duck", "fast", "boss", "king", "tech", "web3", "crypto"],
            numbers: ["88808888888", "88805055050", "88801234567", "88800000001", "88807777777", "88809991111", "88800008888", "88801110000", "88805554444", "88802223333"]
        };

        function setCase(type, price, el) {
            currentCase = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('case-name').innerText = type.toUpperCase();
            document.getElementById('case-price').innerText = price + " ⭐";
            buildTape();
        }

        function buildTape() {
            const t = document.getElementById('tape');
            t.innerHTML = '';
            const list = db[currentCase];
            const typePath = currentCase.slice(0, -1); // gift, username, number
            for(let i=0; i<70; i++) {
                const item = list[Math.floor(Math.random()*list.length)];
                t.innerHTML += `<div class="slot"><img src="https://fragment.com/img/${typePath}/${item}.webp"></div>`;
            }
        }

        function spin() {
            const btn = document.getElementById('spin-btn');
            const tape = document.getElementById('tape');
            btn.disabled = true;
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = '6s cubic-bezier(0.1, 0, 0.1, 1)';
                const stop = 4000 + Math.random()*500;
                tape.style.transform = `translateX(-${stop}px)`;
            }, 50);

            setTimeout(() => {
                const list = db[currentCase];
                winItem = list[Math.floor(Math.random()*list.length)];
                btn.style.display = 'none';
                document.getElementById('claim-btn').style.display = 'block';
            }, 6500);
        }

        function claim() {
            // Блокируем навигацию как во FrogCase
            document.getElementById('n-hub').classList.add('locked');
            
            tg.sendData(JSON.stringify({type: currentCase, item: winItem}));
            
            setTimeout(() => {
                showPage('wallet');
                const typePath = currentCase.slice(0, -1);
                document.getElementById('win-title').innerText = winItem;
                document.getElementById('win-img').innerHTML = `<img src="https://fragment.com/img/${typePath}/${winItem}.webp" style="width:120px">`;
            }, 800);
        }

        function showPage(p) {
            if(p === 'hub') {
                document.getElementById('page-hub').style.display = 'block';
                document.getElementById('page-wallet').style.display = 'none';
                document.getElementById('n-hub').classList.add('active');
                document.getElementById('n-wallet').classList.remove('active');
            } else {
                document.getElementById('page-hub').style.display = 'none';
                document.getElementById('page-wallet').style.display = 'block';
                document.getElementById('n-hub').classList.remove('active');
                document.getElementById('n-wallet').classList.add('active');
            }
        }

        buildTape();
    </script>
</body>
</html>
