<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f1218; --card: #1c212a; --accent: #248bf2; --gold: #f5a623; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #2d343f; text-align: center; }
        .balance-pill { background: #252c38; padding: 8px 15px; border-radius: 20px; color: var(--gold); font-weight: bold; font-size: 14px; display: inline-block; }

        .roulette-container { position: relative; width: 100%; height: 160px; background: #05070a; margin: 30px 0; overflow: hidden; border-top: 2px solid #2d343f; border-bottom: 2px solid #2d343f; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--accent); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent); }
        .tape { display: flex; position: absolute; top: 25px; transition: 6s cubic-bezier(0.1, 0, 0.05, 1); }
        .item { min-width: 110px; height: 110px; margin: 0 10px; background: var(--card); border-radius: 18px; display: flex; align-items: center; justify-content: center; border: 1px solid #334155; }
        .item img { width: 85px; height: 85px; object-fit: contain; }

        .footer { padding: 20px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .btn-spin { width: 100%; padding: 20px; background: var(--accent); border: none; color: white; border-radius: 16px; font-weight: 900; font-size: 18px; box-shadow: 0 4px 20px rgba(36, 139, 242, 0.4); }
        .btn-spin:active { transform: scale(0.96); }
        .btn-spin:disabled { background: #2d343f; box-shadow: none; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; font-size: 20px; margin-bottom: 5px;">FRAGMENT CASE</div>
        <div class="balance-pill">PREMIUM ACCESS</div>
    </div>

    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>

    <div class="footer">
        <button class="btn-spin" id="spin-btn" onclick="start()">КРУТИТЬ (500 ⭐)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const assets = [
            "https://nft.fragment.com/number/88808888888.webp",
            "https://giftsgram.com/assets/images/gifts/frog.png",
            "https://nft.fragment.com/username/bank.webp",
            "https://giftsgram.com/assets/images/gifts/duck.png",
            "https://giftsgram.com/assets/images/gifts/eternal-rose.png",
            "https://nft.fragment.com/number/88801234567.webp"
        ];

        function fill() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            for(let i=0; i<80; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<img src="${assets[Math.floor(Math.random()*assets.length)]}">`;
                tape.appendChild(div);
            }
        }

        function start() {
            const btn = document.getElementById('spin-btn');
            const tape = document.getElementById('tape');
            btn.disabled = true;
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = '6s cubic-bezier(0.1, 0, 0.05, 1)';
                const shift = 4500 + (Math.random() * 300);
                tape.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                tg.sendData(JSON.stringify({action: "open_case"}));
                btn.disabled = false;
            }, 6500);
        }

        fill();
    </script>
</body>
</html>
