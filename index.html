<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #010101; --card-bg: #1c1c1e; --accent: #ffca28;
            --text-main: #ffffff; --text-sub: #8e8e93;
            --red: #ff3b30; --green: #4cd964;
        }
        body { background: var(--bg); color: var(--text-main); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #000; border-bottom: 1px solid #1c1c1e; }
        .balance-box { background: var(--card-bg); padding: 8px 16px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-weight: 800; border: 1px solid #2c2c2e; }
        .balance-box span { color: var(--accent); }
        .section { display: none; height: calc(100vh - 150px); padding: 15px; overflow-y: auto; box-sizing: border-box; }
        .active { display: block; }
        .mode-card { border-radius: 24px; padding: 25px; position: relative; height: 120px; display: flex; flex-direction: column; justify-content: center; margin-bottom: 15px; cursor: pointer; }
        .crash-area { background: #0a0a0a; border-radius: 24px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #1c1c1e; margin-bottom: 15px; }
        #crash-mult { font-size: 60px; font-weight: 900; color: var(--accent); }
        .btn-action { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; text-transform: uppercase; margin-bottom: 10px; cursor: pointer; }
        .navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #121212; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2c2c2e; padding-bottom: 10px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); gap: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .slot { min-width: 140px; width: 140px; height: 150px; margin: 0 5px; border-radius: 18px; background: var(--card-bg); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; border: 1px solid #2c2c2e; flex-shrink: 0; }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .slot span { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 10px; padding: 8px 0; text-align: center; font-weight: 700; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 800; font-size: 20px;">GOLD SHOP</div>
    <div class="balance-box">⭐ <span id="bal-display">0</span></div>
</div>

<div id="tab-home" class="section active">
    <div class="mode-card" style="background: linear-gradient(135deg, #3a1cbb 0%, #5611d6 100%);" onclick="nav('crash')">
        <h2 style="margin:0">КРАШ</h2>
        <div style="position:absolute; right:15px; bottom:10px; font-size:60px; opacity:0.4;">🚀</div>
    </div>
    <div class="mode-card" style="background: linear-gradient(135deg, #b01a1a 0%, #e32c2c 100%);" onclick="nav('roulette')">
        <h2 style="margin:0">РУЛЕТКА</h2>
        <div style="position:absolute; right:15px; bottom:10px; font-size:60px; opacity:0.4;">👜</div>
    </div>
</div>

<div id="tab-crash" class="section">
    <div class="crash-area"><div id="crash-mult">1.00x</div></div>
    <div style="margin-bottom: 8px; font-size: 12px; color: var(--text-sub);">МИН: 25 ⭐</div>
    <input type="number" id="crash-bet" value="25" min="25" style="width:100%; padding:18px; border-radius:16px; border:1px solid #333; background:var(--card-bg); color:white; text-align:center; margin-bottom:15px; font-size:18px; font-weight:800; outline:none;">
    <button class="btn-action" id="crash-btn" onclick="handleCrash()" style="background:var(--accent);">ИГРАТЬ</button>
    <button class="btn-action" style="background:#333; color:#fff;" onclick="nav('home')">МЕНЮ</button>
</div>

<div id="tab-roulette" class="section">
    <div style="position:relative; width:100%; height:180px; background:#000; border-radius:20px; overflow:hidden; margin-bottom:15px; border:1px solid #2c2c2e;">
        <div style="position:absolute; left:50%; top:0; width:4px; height:100%; background:var(--accent); z-index:50; transform:translateX(-50%);"></div>
        <div id="tape" style="display:flex; align-items:center; height:100%; transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1);"></div>
    </div>
    <div style="text-align:center; margin-bottom:15px;">
        <label style="cursor:pointer; font-size:14px;"><input type="checkbox" id="demo-mode"> ДЕМО-РЕЖИМ</label>
    </div>
    <button class="btn-action" onclick="startSpin()" style="background:var(--accent);">ОТКРЫТЬ (500 ⭐)</button>
    <button class="btn-action" style="background:#333; color:#fff;" onclick="nav('home')">НАЗАД</button>
</div>

<div id="tab-profile" class="section">
    <h2 style="margin:0 0 20px 0;">ИНВЕНТАРЬ</h2>
    <div id="inv-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"></div>
</div>

<nav class="navbar">
    <div id="nav-home" class="nav-item active" onclick="nav('home')">🎮 ИГРЫ</div>
    <div id="nav-profile" class="nav-item" onclick="nav('profile')">👤 ИНВЕНТАРЬ</div>
</nav>

<div id="win-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;">
    <div style="background: var(--card-bg); width: 80%; padding: 30px; border-radius: 24px; text-align: center; border: 1px solid #333;">
        <h2 id="win-title" style="color:var(--accent); margin:0;">ВЫИГРЫШ!</h2>
        <div id="win-box" style="margin:20px 0; display:flex; justify-content:center;"></div>
        <button class="btn-action" onclick="document.getElementById('win-modal').style.display='none'">ЗАБРАТЬ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const gifts = [
        {name: 'UFC STRICE', img: 'UFC.png', price: 1450},
        {name: 'Chill Flame', img: 'Chill.png', price: 450},
        {name: 'Low Rider', img: 'Low.png', price: 4000},
        {name: 'Lunar Snake', img: 'Snake.png', price: 300},
        {name: 'Eternal Rose', img: 'Rose.png', price: 2300},
        {name: 'Diamond Ring', img: 'Ring.png', price: 2500},
        {name: 'Toy Bear', img: 'Bear.png', price: 3100},
        {name: 'Westside Sign', img: 'Sign.png', price: 8000},
        {name: '150 Stars', img: '⭐', val: 150}
    ];

    let bal = 0;
    let inv = [];
    let isBusy = false;
    const STORAGE_KEY = 'GOLD_SHOP_STABLE_V1';

    function syncUI() {
        document.getElementById('bal-display').innerText = bal.toLocaleString();
    }

    function save() {
        syncUI();
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ bal, inv }));
    }

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            bal = data.bal || 0;
            inv = data.inv || [];
        } else {
            // Если данных нет, ПЕРВЫЙ РАЗ даем 1000 звезд для теста или просто ставим 0
            bal = 0; 
            inv = [];
        }
        syncUI();
    }

    function nav(id) {
        if(isBusy && id !== 'crash') return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + (id === 'profile' ? 'profile' : 'home')).classList.add('active');
        if(id === 'profile') renderInv();
    }

    // --- CRASH (32% ШАНС ВЗРЫВА) ---
    let crashActive = false, crashMult = 1.0, crashTimer, currentBet = 0;
    function handleCrash() {
        const btn = document.getElementById('crash-btn');
        if (crashActive) { 
            bal += Math.floor(currentBet * crashMult);
            endCrash(crashMult, true); return;
        }
        let bet = parseInt(document.getElementById('crash-bet').value);
        if(!bet || bet < 25 || bet > bal) return;
        bal -= bet; currentBet = bet; isBusy = true; crashActive = true; save();
        btn.innerText = "ЗАБРАТЬ"; btn.style.background = "var(--red)"; btn.style.color = "#fff";
        
        let isInstantLoss = Math.random() < 0.32; 
        let target = isInstantLoss ? 1.00 : (1.05 + Math.random() * 6).toFixed(2);
        
        if(isInstantLoss) {
            setTimeout(() => endCrash(1.00, false), 400);
            return;
        }

        crashTimer = setInterval(() => {
            crashMult += 0.01;
            document.getElementById('crash-mult').innerText = crashMult.toFixed(2) + "x";
            btn.innerText = `ЗАБРАТЬ (${Math.floor(currentBet * crashMult)})`;
            if(crashMult >= target) endCrash(target, false);
        }, 80);
    }

    function endCrash(v, win) {
        clearInterval(crashTimer); crashActive = false; isBusy = false;
        const disp = document.getElementById('crash-mult');
        disp.innerText = win ? v.toFixed(2)+"x" : "BOOM!";
        disp.style.color = win ? "var(--green)" : "var(--red)";
        document.getElementById('crash-btn').innerText = "ИГРАТЬ";
        document.getElementById('crash-btn').style.background = "var(--accent)";
        document.getElementById('crash-btn').style.color = "#000";
        setTimeout(() => {
            disp.innerText = "1.00x"; disp.style.color = "var(--accent)";
            crashMult = 1.0; save();
        }, 2000);
    }

    // --- ROULETTE ---
    function startSpin() {
        const demo = document.getElementById('demo-mode').checked;
        if(!demo && (bal < 500 || isBusy)) return;
        if(!demo) bal -= 500;
        isBusy = true; save();
        
        const tape = document.getElementById('tape'), winIdx = 40;
        const prize = gifts[Math.floor(Math.random() * gifts.length)];
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)'; tape.innerHTML = '';
        
        for(let i = 0; i < 55; i++) {
            let it = (i === winIdx) ? prize : gifts[Math.floor(Math.random() * gifts.length)];
            const icon = it.img === '⭐' ? `<div style="font-size:50px;">⭐</div>` : `<img src="img/${it.img}">`;
            tape.innerHTML += `<div class="slot">${icon}<span>${it.name}</span></div>`;
        }
        setTimeout(() => {
            tape.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.05, 1)';
            tape.style.transform = `translateX(-${(winIdx * 150) + 75 - (window.innerWidth / 2)}px)`;
        }, 50);
        setTimeout(() => {
            if(!demo) { if(prize.val) bal += prize.val; else inv.push(prize); }
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-title').innerText = demo ? "ДЕМО-ВЫИГРЫШ" : "ВЫИГРЫШ!";
            const icon = prize.img === '⭐' ? `<div style="font-size:50px;">⭐</div>` : `<img src="img/${prize.img}">`;
            document.getElementById('win-box').innerHTML = `<div class="slot" style="margin:0;">${icon}<span>${prize.name}</span></div>`;
            isBusy = false; save();
        }, 7200);
    }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inv.length ? '' : '<p style="grid-column:1/3;text-align:center;opacity:0.5;">ПУСТО</p>';
        inv.forEach((it, idx) => {
            const icon = it.img === '⭐' ? `<div style="font-size:40px;">⭐</div>` : `<img src="img/${it.img}">`;
            list.innerHTML += `<div class="slot" style="width:100%;margin:0;" onclick="sell(${idx})">${icon}<span>${it.name} (SELL)</span></div>`;
        });
    }

    function sell(idx) {
        const item = inv[idx];
        if(confirm(`Продать за ${item.price} ⭐?`)) {
            bal += item.price; inv.splice(idx, 1); save(); renderInv();
        }
    }

    init();
</script>
</body>
</html>
