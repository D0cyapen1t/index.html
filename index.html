<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --gold: #ffca28; --bg: #0f1116; --card: #1c1f26; 
            --accent: #2c303a; --red: #ff4d4d; --green: #00e676;
        }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .header { padding: 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid var(--accent); display: flex; justify-content: center; }
        .balance-pill { background: var(--card); border: 1px solid var(--gold); padding: 6px 18px; border-radius: 50px; font-size: 18px; font-weight: 800; color: var(--gold); }

        .section { display: none; height: 82vh; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .active { display: block; }

        /* Roulette */
        .case-container { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--accent); }
        .roulette-viewport { position: relative; width: 100%; height: 160px; background: #090a0d; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--gold); }
        .tape { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); align-items: center; height: 100%; }
        .slot { min-width: 120px; height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--accent); margin: 0 5px; border-radius: 12px; }
        .slot img, .slot-emoji { width: 60px; height: 60px; object-fit: contain; }
        .slot-emoji { font-size: 45px; display: flex; align-items: center; justify-content: center; }

        /* Modal & Buttons */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--gold); text-align: center; width: 80%; }
        .btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn-sell { background: var(--red); color: #fff; }

        /* Inventory */
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .inv-item { background: var(--card); border: 1px solid var(--accent); border-radius: 12px; padding: 10px; text-align: center; position: relative; }
        .inv-item img, .inv-item .emoji { width: 50px; height: 50px; margin-bottom: 5px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #1c1f26; display: flex; border-top: 1px solid var(--accent); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="header"><div class="balance-pill">⭐ <span id="balance">0</span></div></div>

<div id="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<div id="tab-roulette" class="section active">
    <div class="case-container">
        <div class="roulette-viewport"><div class="pointer"></div><div id="tape" class="tape"></div></div>
        <button class="btn" id="spin-btn" onclick="startSpin()">ОТКРЫТЬ КЕЙС (500 ⭐)</button>
    </div>
</div>

<div id="tab-profile" class="section">
    <h3 style="margin-bottom: 15px;">ИНВЕНТАРЬ</h3>
    <div id="inv-grid" class="inv-grid"></div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="tab('roulette')">📦 КЕЙСЫ</div>
    <div class="nav-item" onclick="tab('profile')">👤 ПРОФИЛЬ</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Цены (базовые в звездах)
    const prices = { chill: 300, mood: 450, snoop: 600, ufc: 800, low: 1000, voodoo: 1500, stars: 0 };
    const items = [
        {id: 'chill', name: 'Chill', img: 'Chill.png'},
        {id: 'mood', name: 'Mood', img: 'Mood.png'},
        {id: 'snoop', name: 'Snoop', img: 'Snoop.png'},
        {id: 'ufc', name: 'UFC', img: 'UFC.png'},
        {id: 'low', name: 'Low', img: 'Low.png'},
        {id: 'voodoo', name: 'Voodoo', img: 'Voodoo.png'},
        {id: 'stars', name: '1000 Stars', img: '⭐'}
    ];

    // Фикс баланса: берем из URL или 0, игнорируем старые 2000
    const params = new URLSearchParams(window.location.search);
    let bal = parseInt(params.get('balance'));
    if (isNaN(bal)) bal = parseInt(localStorage.getItem('bal')) || 0;
    
    let inv = JSON.parse(localStorage.getItem('inv')) || [];
    let isSpinning = false;

    function sync() {
        localStorage.setItem('bal', bal);
        localStorage.setItem('inv', JSON.stringify(inv));
        document.getElementById('balance').innerText = bal;
        document.getElementById('spin-btn').disabled = (bal < 500);
    }

    function tab(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        if(name === 'profile') renderInv();
    }

    function startSpin() {
        if(bal < 500 || isSpinning) return;
        bal -= 500; isSpinning = true; sync();

        const tape = document.getElementById('tape');
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)'; tape.innerHTML = '';

        for(let i=0; i<65; i++) {
            const it = items[Math.floor(Math.random()*items.length)];
            tape.innerHTML += `<div class="slot">${it.img === '⭐' ? '<div class="slot-emoji">⭐</div>' : `<img src="img/${it.img}">`}<span>${it.name}</span></div>`;
        }

        const winIdx = 60;
        const winner = items[Math.floor(Math.random()*items.length)];
        tape.querySelectorAll('.slot')[winIdx].innerHTML = `${winner.img === '⭐' ? '<div class="slot-emoji">⭐</div>' : `<img src="img/${winner.img}">`}<span>${winner.name}</span>`;

        setTimeout(() => {
            tape.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
            tape.style.transform = `translateX(-${(winIdx * 130) - (window.innerWidth / 2) + 65}px)`;
        }, 50);

        setTimeout(() => {
            showModal('WIN', winner);
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }, 5500);
    }

    function showModal(type, item, index = null) {
        const m = document.getElementById('modal');
        const b = document.getElementById('modal-body');
        m.style.display = 'flex';

        if(type === 'WIN') {
            b.innerHTML = `
                <h2 style="color:var(--gold)">ВЫИГРЫШ!</h2>
                ${item.img === '⭐' ? '<div style="font-size:80px">⭐</div>' : `<img src="img/${item.img}" style="width:100px">`}
                <p>${item.name}</p>
                <button class="btn" onclick="claim('${item.id}')">ЗАБРАТЬ</button>
            `;
        } else {
            const sellPrice = Math.floor((prices[item.id] || 0) * 1.5);
            b.innerHTML = `
                <h2 style="color:var(--gold)">${item.name}</h2>
                ${item.img === '⭐' ? '<div style="font-size:80px">⭐</div>' : `<img src="img/${item.img}" style="width:100px">`}
                <p>Цена продажи: ${sellPrice} ⭐</p>
                <button class="btn btn-sell" onclick="sell(${index}, ${sellPrice})">ПРОДАТЬ ЗА ${sellPrice}</button>
                <button class="btn" style="background:#444; color:#fff" onclick="closeModal()">ЗАКРЫТЬ</button>
            `;
        }
    }

    function claim(id) {
        const winner = items.find(i => i.id === id);
        if(id === 'stars') bal += 1000; else inv.push(winner);
        closeModal(); isSpinning = false; sync();
    }

    function sell(index, price) {
        inv.splice(index, 1);
        bal += price;
        closeModal(); sync(); renderInv();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function renderInv() {
        const g = document.getElementById('inv-grid');
        g.innerHTML = inv.length ? '' : '<p style="color:#555; grid-column:1/4">Пусто</p>';
        inv.forEach((item, i) => {
            g.innerHTML += `
                <div class="inv-item" onclick='showModal("INV", ${JSON.stringify(item)}, ${i})'>
                    ${item.img === '⭐' ? '<div style="font-size:30px">⭐</div>' : `<img src="img/${item.img}">`}
                    <p style="font-size:9px; margin:0;">${item.name}</p>
                </div>`;
        });
    }

    sync();
</script>
</body>
</html>
