<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #1c212a; --accent: #31d158; --gold: #f5a623; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Error Popup */
        #error-pop { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ff4757; padding: 20px; border-radius: 15px; z-index: 1000; box-shadow: 0 0 30px rgba(255, 71, 87, 0.5); text-align: center; width: 80%; }

        .header { display: flex; justify-content: space-between; padding: 15px; background: #161b22; border-bottom: 1px solid #2d343f; }
        .bal { color: var(--gold); font-weight: bold; }

        .case-list { display: flex; overflow-x: auto; padding: 20px; gap: 15px; }
        .case-card { min-width: 140px; background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 2px solid transparent; }
        .case-card.active { border-color: var(--accent); background: #232a35; }
        .case-card img { width: 80px; height: 80px; margin-bottom: 10px; }

        .roulette { position: relative; width: 90%; height: 120px; background: #05070a; margin: 20px auto; overflow: hidden; border-radius: 15px; border: 1px solid #2d343f; }
        .pointer { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--accent); z-index: 10; }
        .tape { display: flex; position: absolute; top: 10px; transition: 6s cubic-bezier(0.1, 0, 0.05, 1); }
        .slot { min-width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
        .slot img { width: 70px; height: 70px; }

        .btn { width: 90%; display: block; margin: 20px auto; padding: 20px; background: var(--accent); border: none; border-radius: 15px; font-weight: bold; font-size: 16px; color: #000; }
        .btn:disabled { background: #2d343f; color: #8e959b; }
    </style>
</head>
<body>

    <div id="error-pop">❌ НЕДОСТАТОЧНО ЗВЕЗД!<br><small>Пополни баланс у админа</small></div>

    <div class="header">
        <div>FRAGMENT HUB</div>
        <div class="bal">Твой баланс: <span id="val">0</span> ⭐</div>
    </div>

    <div class="case-list">
        <div class="case-card active" onclick="selectCase('gifts', 1000, this)">
            <img src="https://nft.fragment.com/gift/CookieHeart.webp">
            <div>GIFTS</div>
            <small>1000 ⭐</small>
        </div>
        <div class="case-card" onclick="selectCase('usernames', 1000, this)">
            <img src="https://nft.fragment.com/username/news.webp">
            <div>NAMES</div>
            <small>1000 ⭐</small>
        </div>
        <div class="case-card" onclick="selectCase('numbers', 10000, this)">
            <img src="https://nft.fragment.com/number/88808888888.webp">
            <div>NUMBERS</div>
            <small>10000 ⭐</small>
        </div>
    </div>

    <div class="roulette">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>

    <button class="btn" id="spin-btn" onclick="spin()">ОТКРЫТЬ КЕЙС</button>

    <script>
        const tg = window.Telegram.WebApp;
        let currentCase = 'gifts';
        let currentPrice = 1000;
        let userBalance = 0; // Изначально 0

        // Эмуляция получения баланса (в идеале делать через fetch к боту)
        // Но бот сам проверит при клике.
        
        function selectCase(type, price, el) {
            currentCase = type;
            currentPrice = price;
            document.querySelectorAll('.case-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            initTape();
        }

        function initTape() {
            const t = document.getElementById('tape');
            t.innerHTML = '';
            const img = document.querySelector('.case-card.active img').src;
            for(let i=0; i<60; i++) {
                t.innerHTML += `<div class="slot"><img src="${img}"></div>`;
            }
        }

        function showError() {
            const pop = document.getElementById('error-pop');
            pop.style.display = 'block';
            setTimeout(() => pop.style.display = 'none', 2000);
        }

        function spin() {
            // Если баланс 0 (мы не получили его), бот все равно отклонит. 
            // Но мы можем заблокировать кнопку, если знаем, что баланс мал.
            if (userBalance < currentPrice) {
                // showError(); 
                // Мы даем нажать, но бот ответит в чате отказом.
            }

            const btn = document.getElementById('spin-btn');
            const tape = document.getElementById('tape');
            btn.disabled = true;

            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = '6s cubic-bezier(0.1, 0, 0.05, 1)';
                tape.style.transform = `translateX(-${3500 + Math.random()*500}px)`;
            }, 50);

            setTimeout(() => {
                tg.sendData(JSON.stringify({case: currentCase}));
                btn.disabled = false;
            }, 6500);
        }

        initTape();
    </script>
</body>
</html>
