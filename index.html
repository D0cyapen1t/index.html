<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --bg: #0d0d0d; --card: #141414; --accent: #1c1c1c; 
            --red: #8b2e2e; --green: #2e5a32; --text-main: #e0e0e0; --text-dim: #707070;
        }
        body { 
            background: var(--bg); color: var(--text-main); font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; user-select: none;
        }
        .header { padding: 20px 15px; display: flex; justify-content: center; z-index: 10; }
        .balance-pill { 
            background: var(--card); border: 1px solid var(--gold); padding: 10px 30px; 
            border-radius: 12px; font-size: 22px; font-weight: 900; color: var(--gold); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .section { display: none; height: calc(100vh - 160px); padding: 15px; box-sizing: border-box; overflow-y: auto; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .game-card { border-radius: 18px; padding: 25px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; transition: 0.2s; border: 1px solid var(--accent); margin-bottom: 12px; background: var(--card); }
        .game-card:active { transform: scale(0.97); background: var(--accent); }
        .game-card h2 { margin: 0; font-size: 26px; font-weight: 900; text-transform: uppercase; color: var(--gold); }

        /* РУЛЕТКА */
        .roulette-container { position: relative; width: 100%; height: 220px; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid var(--accent); }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--gold); z-index: 20; transform: translateX(-50%); box-shadow: 0 0 10px var(--gold); }
        .tape { display: flex; align-items: center; height: 100%; will-change: transform; }
        .slot { min-width: 140px; width: 140px; height: 180px; display: flex; flex-direction: column; margin: 0 6px; border-radius: 12px; flex-shrink: 0; overflow: hidden; position: relative; background: var(--card); border: 1px solid var(--accent); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px 0; text-align: center; font-size: 10px; font-weight: 900; color: var(--gold); }

        .btn-main { background: var(--gold); color: #000; border: none; width: 100%; padding: 20px; border-radius: 12px; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; }
        .btn-back { background: none; border: none; color: var(--text-dim); width: 100%; font-weight: 700; margin-top: 15px; text-transform: uppercase; cursor: pointer; font-size: 12px; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg); display: flex; border-top: 1px solid var(--accent); z-index: 100; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn span { font-size: 10px; font-weight: 900; margin-top: 4px; text-transform: uppercase; }

        .modal-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-win { background: var(--card); padding: 40px 20px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 85%; }
    </style>
</head>
<body>

<div class="header">
    <div class="balance-pill"><span id="balance-val">0</span> ⭐</div>
</div>

<div id="win-modal" class="modal-overlay">
    <div class="modal-win">
        <h2 style="color:var(--gold); margin:0;">ПОБЕДА!</h2>
        <div id="win-content" style="padding: 25px 0; display: flex; justify-content: center;"></div>
        <button class="btn-main" onclick="claimReward()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="tab-games" class="section active">
    <div class="game-card" onclick="nav('roulette')"><h2>Рулетка</h2><p style="color:var(--text-dim)">NFT Подарки и Звезды</p></div>
</div>

<div id="game-roulette" class="section">
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>
    <div style="text-align:center; margin: 20px 0;">
        <label style="font-weight:700; color: var(--text-dim); font-size: 14px;"><input type="checkbox" id="demo-mode"> ДЕМО-РЕЖИМ</label>
    </div>
    <button class="btn-main" onclick="startRoulette()">КРУТИТЬ (500 ⭐)</button>
    <button class="btn-back" onclick="nav('games')">← НАЗАД</button>
</div>

<div id="tab-inv" class="section">
    <h2 style="color:var(--gold); margin-bottom:20px;">ПРОФИЛЬ</h2>
    <div id="inv-list" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="nav('games')">🎮<span>Игры</span></div>
    <div class="nav-btn" onclick="nav('inv')">👤<span>Профиль</span></div>
</nav>

<script>
    const gifts = [
        {name: 'UFC STRICE', img: 'UFC.png', price: 1450, color: '#1a1a1a'},
        {name: 'Chill Flame', img: 'Chill.png', price: 450, color: '#1a1a1a'},
        {name: 'Low Rider', img: 'Low.png', price: 4000, color: '#1a1a1a'},
        {name: 'Lunar Snake', img: 'Snake.png', price: 300, color: '#1a1a1a'},
        {name: 'Eternal Rose', img: 'Rose.png', price: 2300, color: '#1a1a1a'},
        {name: 'Diamond Ring', img: 'Ring.png', price: 2500, color: '#1a1a1a'},
        {name: 'Toy Bear', img: 'Bear.png', price: 3100, color: '#1a1a1a'},
        {name: 'Westside Sign', img: 'Sign.png', price: 8000, color: '#1a1a1a'},
        {name: '150 Stars', img: '⭐', val: 150, color: '#141414', price: 150}
    ];

    let balance = parseInt(localStorage.getItem('user_bal')) || 10000;
    let inventory = JSON.parse(localStorage.getItem('user_inv')) || [];
    let isBusy = false;
    let currentPrize = null;

    function sync() {
        localStorage.setItem('user_bal', balance);
        localStorage.setItem('user_inv', JSON.stringify(inventory));
        document.getElementById('balance-val').innerText = balance.toLocaleString();
    }

    function nav(id) {
        if(isBusy) return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('tab-' + id) || document.getElementById('game-' + id);
        if(target) target.classList.add('active');
        if(id === 'inv') renderInv();
    }

    function startRoulette() {
        const isDemo = document.getElementById('demo-mode').checked;
        if(!isDemo && (balance < 500 || isBusy)) return;
        if(!isDemo) balance -= 500;
        isBusy = true; sync();

        const tape = document.getElementById('tape');
        const winIdx = 35; // Предмет остановится на этом слоте
        
        // ФИКС БАГА: Выбираем приз ДО генерации ленты
        currentPrize = gifts[Math.floor(Math.random() * gifts.length)];
        
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';

        for(let i = 0; i < 45; i++) {
            // Если индекс 35 — ставим наш приз, иначе рандом
            let it = (i === winIdx) ? currentPrize : gifts[Math.floor(Math.random() * gifts.length)];
            const icon = it.img === '⭐' ? `<div style="font-size:40px;line-height:150px;text-align:center">⭐</div>` : `<img src="img/${it.img}">`;
            tape.innerHTML += `<div class="slot">${icon}<div class="slot-label">${it.name}</div></div>`;
        }

        setTimeout(() => {
            const slotWidth = 152; // 140px + 12px margin
            const centerOffset = window.innerWidth / 2;
            const stopPos = (winIdx * slotWidth) - centerOffset + (slotWidth / 2);
            
            tape.style.transition = 'transform 7s cubic-bezier(0.15, 0, 0.05, 1)';
            tape.style.transform = `translateX(-${stopPos}px)`;
        }, 50);

        setTimeout(() => {
            document.getElementById('win-modal').style.display = 'flex';
            const icon = currentPrize.img === '⭐' ? `<div style="font-size:40px;">⭐</div>` : `<img src="img/${currentPrize.img}">`;
            document.getElementById('win-content').innerHTML = `<div class="slot">${icon}</div>`;
            isBusy = false;
        }, 7500);
    }

    function claimReward() {
        if(!document.getElementById('demo-mode').checked) {
            if(currentPrize.val) balance += currentPrize.val; 
            else inventory.push(currentPrize);
        }
        document.getElementById('win-modal').style.display = 'none'; 
        sync();
    }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inventory.length ? '' : '<p style="grid-column:1/3; opacity:0.3; text-align:center;">Пусто</p>';
        inventory.forEach((it, i) => {
            const div = document.createElement('div');
            div.className = 'slot';
            div.innerHTML = `<img src="img/${it.img}"><div class="slot-label">${it.name}</div>`;
            div.onclick = () => {
                let p = Math.floor(it.price * 0.8);
                if(confirm(`Продать за ${p} ⭐?`)) { balance += p; inventory.splice(i,1); sync(); renderInv(); }
            };
            list.appendChild(div);
        });
    }

    sync();
</script>
</body>
</html>
