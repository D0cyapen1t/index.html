<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lydka Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffca28; --bg: #0b0d10; --card: #161920; --accent: #232731; --red: #ff4757; --green: #2ed573; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        .header { padding: 15px; background: #000; border-bottom: 1px solid var(--accent); display: flex; justify-content: center; }
        .balance-pill { border: 2px solid var(--gold); padding: 8px 25px; border-radius: 50px; font-size: 20px; font-weight: 900; color: var(--gold); }

        .section { display: none; height: calc(100vh - 150px); padding: 15px; overflow-y: auto; }
        .active { display: block; }

        /* РУЛЕТКА */
        .roulette-box { position: relative; width: 100%; height: 180px; background: #050608; border-radius: 20px; overflow: hidden; border: 2px solid var(--accent); margin: 15px 0; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--gold); z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; align-items: center; height: 100%; will-change: transform; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); }
        .slot { width: 120px; min-width: 120px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); margin: 0 5px; border-radius: 15px; border: 1px solid var(--accent); }
        .slot img { width: 60px; height: 60px; object-fit: contain; }
        .slot span { font-size: 10px; font-weight: bold; margin-top: 8px; color: #777; }

        /* КРАШ */
        .crash-wrap { background: #000; height: 180px; border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--accent); position: relative; }
        #c-mult { font-size: 55px; font-weight: 900; color: var(--gold); }
        #rocket { position: absolute; bottom: 15px; left: 15px; font-size: 35px; }

        .btn { background: linear-gradient(135deg, #ffca28, #ff8f00); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; }
        .btn:disabled { opacity: 0.3; }
        .input-s { width: 100%; padding: 15px; margin: 10px 0; background: var(--card); border: 1px solid var(--accent); color: #fff; border-radius: 12px; text-align: center; }

        /* ИНВЕНТАРЬ */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .item-c { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; font-size: 11px; border: 1px solid var(--accent); }
        .sell { background: var(--green); border: none; width: 100%; padding: 5px; border-radius: 5px; margin-top: 5px; font-weight: bold; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        .modal-c { background: var(--card); padding: 30px; border-radius: 25px; border: 2px solid var(--gold); text-align: center; width: 80%; }

        /* НАВИГАЦИЯ */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #161920; display: flex; border-top: 1px solid var(--accent); }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 11px; font-weight: bold; }
        .nav-i.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="header"><div class="balance-pill">⭐ <span id="b-val">0</span></div></div>

<div id="win-m" class="modal">
    <div class="modal-c">
        <h2 style="color:var(--gold)">ПОБЕДА!</h2>
        <div id="win-txt" style="margin: 20px 0; font-size: 20px;"></div>
        <button class="btn" onclick="closeWin()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="s-cases" class="section active">
    <div class="roulette-box"><div class="pointer"></div><div id="tape" class="tape"></div></div>
    <button class="btn" id="spin-btn" onclick="doSpin()">ОТКРЫТЬ (500 ⭐)</button>
</div>

<div id="s-crash" class="section">
    <div class="crash-wrap"><div id="c-mult">1.00x</div><div id="rocket">🚀</div></div>
    <input type="number" id="c-bet" class="input-s" placeholder="Ставка...">
    <button class="btn" id="c-btn" onclick="doCrash()">ВЗЛЕТ</button>
</div>

<div id="s-inv" class="section"><div id="inv-g" class="grid"></div></div>

<nav class="nav">
    <div class="nav-i active" onclick="tab('cases')">КЕЙСЫ</div>
    <div class="nav-i" onclick="tab('crash')">КРАШ</div>
    <div class="nav-i" onclick="tab('inv')">ИНВЕНТАРЬ</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const ITEMS = [
        {id:'chill', n:'Chill', img:'Chill.png', p:300},
        {id:'mood', n:'Mood', img:'Mood.png', p:450},
        {id:'snoop', n:'Snoop', img:'Snoop.png', p:600},
        {id:'ufc', n:'UFC', img:'UFC.png', p:800},
        {id:'low', n:'Low', img:'Low.png', p:1000},
        {id:'voodoo', n:'Voodoo', img:'Voodoo.png', p:1500},
        {id:'stars', n:'Stars', img:'⭐', p:0}
    ];

    let bal = parseInt(new URLSearchParams(window.location.search).get('balance')) || 0;
    let inv = JSON.parse(localStorage.getItem('my_inv_v2')) || [];
    let lock = false, lastWin = null;

    function save() {
        document.getElementById('b-val').innerText = bal;
        localStorage.setItem('my_inv_v2', JSON.stringify(inv));
        // Пытаемся передать боту, но без фатального краша
        try { tg.sendData(JSON.stringify({new_balance: bal})); } catch(e) { console.log("Skip sendData"); }
    }

    function tab(name) {
        if(lock && name !== 'cases') return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('s-'+name).classList.add('active');
        document.querySelectorAll('.nav-i').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(name === 'inv') renderInv();
    }

    // --- SPIN ---
    function doSpin() {
        if(bal < 500 || lock) return;
        bal -= 500; lock = true; save();
        const t = document.getElementById('tape');
        t.style.transition = 'none'; t.style.transform = 'translateX(0)'; t.innerHTML = '';
        const winIdx = 35;
        for(let i=0; i<45; i++) {
            let it = ITEMS[Math.floor(Math.random()*ITEMS.length)];
            if(i === winIdx) {
                lastWin = Object.assign({}, it);
                if(lastWin.id === 'stars') lastWin.v = Math.floor(Math.random()*451)+50;
            }
            t.innerHTML += `<div class="slot">${it.img==='⭐'?'⭐':`<img src="img/${it.img}" onerror="this.src='https://via.placeholder.com/60'">`}<span>${it.n}</span></div>`;
        }
        setTimeout(() => {
            t.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
            t.style.transform = `translateX(-${(winIdx * 130) - window.innerWidth/2 + 65}px)`;
        }, 50);
        setTimeout(() => {
            document.getElementById('win-m').style.display = 'flex';
            document.getElementById('win-txt').innerText = lastWin.id==='stars' ? lastWin.v + ' ⭐' : lastWin.n;
        }, 5500);
    }

    function closeWin() {
        if(lastWin.id==='stars') bal += lastWin.v; else inv.push(lastWin);
        document.getElementById('win-m').style.display = 'none';
        lock = false; save();
    }

    // --- CRASH ---
    let cRun = false, cM = 1.0, cI;
    function doCrash() {
        const bet = parseInt(document.getElementById('c-bet').value);
        if(!bet || bet > bal || lock && !cRun) return;
        if(cRun) { bal += Math.floor(bet * cM); stopC(); return; }
        bal -= bet; lock = true; cRun = true; cM = 1.0; save();
        const b = document.getElementById('c-btn');
        b.innerText = "ЗАБРАТЬ"; b.style.background = "var(--red)";
        let limit = (Math.random()*3 + 1.1).toFixed(2);
        cI = setInterval(() => {
            cM += 0.01; document.getElementById('c-mult').innerText = cM.toFixed(2)+"x";
            if(cM >= limit) { clearInterval(cI); document.getElementById('c-mult').innerText = "BOOM!"; setTimeout(stopC, 1500); }
        }, 70);
    }
    function stopC() {
        cRun = false; lock = false; clearInterval(cI);
        const b = document.getElementById('c-btn');
        b.innerText = "ВЗЛЕТ"; b.style.background = "linear-gradient(135deg, #ffca28, #ff8f00)";
        document.getElementById('c-mult').innerText = "1.00x"; save();
    }

    // --- INV ---
    function renderInv() {
        const g = document.getElementById('inv-g');
        g.innerHTML = inv.length ? '' : 'Пусто';
        inv.forEach((it, i) => {
            g.innerHTML += `<div class="item-c"><b>${it.n}</b><button class="sell" onclick="sell(${i})">${Math.floor(it.p*1.5)} ⭐</button></div>`;
        });
    }
    function sell(i) { bal += Math.floor(inv[i].p*1.5); inv.splice(i, 1); renderInv(); save(); }

    save();
</script>
</body>
</html>
