<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #05070a; --card: #11141b; --accent: #31d158; --gold: #f5a623; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        
        /* Navbar */
        .header { display: flex; justify-content: space-between; padding: 20px; align-items: center; border-bottom: 1px solid #1c212a; }
        .bal-tag { background: #1c212a; padding: 6px 14px; border-radius: 20px; color: var(--gold); font-weight: 800; border: 1px solid #2d343f; }

        /* Content Area */
        .main { height: 75vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        /* Roulette */
        .roulette { position: relative; width: 100%; height: 140px; background: #0a0c10; border-radius: 20px; overflow: hidden; border: 1px solid #1c212a; box-shadow: inset 0 0 20px #000; }
        .pointer { position: absolute; left: 50%; width: 4px; height: 100%; background: var(--accent); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--accent); }
        .tape { display: flex; position: absolute; top: 20px; transition: 6s cubic-bezier(0.1, 0, 0.05, 1); }
        .slot { min-width: 100px; height: 100px; margin: 0 10px; background: var(--card); border-radius: 18px; display: flex; align-items: center; justify-content: center; border: 1px solid #1c212a; }
        .slot img { width: 75px; height: 75px; object-fit: contain; }

        /* Action */
        .footer { position: fixed; bottom: 0; width: 100%; padding: 20px; box-sizing: border-box; background: var(--card); border-top: 1px solid #1c212a; }
        .btn-main { width: 100%; padding: 20px; background: var(--accent); border: none; border-radius: 16px; font-size: 18px; font-weight: 900; color: #000; box-shadow: 0 4px 20px rgba(49, 209, 88, 0.3); }
        .btn-main:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Bottom Menu */
        .menu { display: flex; margin-top: 15px; }
        .m-item { flex: 1; text-align: center; font-size: 11px; color: #4b5563; font-weight: bold; }
        .m-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; font-size: 22px;">SWILL</div>
        <div class="bal-tag">CHECK /wallet ⭐</div>
    </div>

    <div class="main">
        <div style="margin-bottom: 20px; text-align: center;">
            <h2 style="margin: 0;">FRAGMENT BOX</h2>
            <p style="color: #4b5563; font-size: 14px;">Open case to win NFT gifts</p>
        </div>

        <div class="roulette">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
    </div>

    <div class="footer">
        <button class="btn-main" id="spin-btn" onclick="spin()">OPEN CASE (500 ⭐)</button>
        <div class="menu">
            <div class="m-item active">HUB</div>
            <div class="m-item">CASE</div>
            <div class="m-item">INVENTORY</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const assets = [
            "https://nft.fragment.com/number/88808888888.webp",
            "https://nft.fragment.com/gift/CookieHeart.webp",
            "https://nft.fragment.com/gift/KissFrog.webp",
            "https://nft.fragment.com/gift/Doge.webp",
            "https://nft.fragment.com/username/news.webp"
        ];

        function init() {
            const t = document.getElementById('tape');
            t.innerHTML = '';
            for(let i=0; i<80; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                const img = document.createElement('img');
                img.src = assets[Math.floor(Math.random()*assets.length)];
                // Если картинка не грузится (ошибка 403/404), ставим заглушку
                img.onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/679/679720.png'; };
                s.appendChild(img);
                t.appendChild(s);
            }
        }

        function spin() {
            const btn = document.getElementById('spin-btn');
            const tape = document.getElementById('tape');
            btn.disabled = true;
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = '6s cubic-bezier(0.1, 0, 0.05, 1)';
                const stop = 4200 + Math.random()*400;
                tape.style.transform = `translateX(-${stop}px)`;
            }, 50);

            setTimeout(() => {
                // Шлем боту сигнал. Бот САМ проверит баланс в базе.
                tg.sendData(JSON.stringify({action: "open_case"}));
                setTimeout(() => { tg.close(); }, 1500);
            }, 6500);
        }

        init();
    </script>
</body>
</html>
