<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        .header { padding: 20px; text-align: center; background: #111; border-bottom: 2px solid var(--gold); }
        .balance { font-size: 26px; font-weight: 800; color: var(--gold); }

        .section { display: none; height: 80vh; padding: 20px; overflow-y: auto; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .case-card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; text-align: center; border: 1px solid #222; }
        
        /* Roulette */
        .roulette-container { position: relative; width: 100%; height: 130px; background: #000; border-radius: 15px; margin: 20px 0; overflow: hidden; border: 1px solid #333; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 20px var(--gold); }
        .tape { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); align-items: center; }
        .slot { min-width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #111; }
        .slot img { width: 85px; height: 85px; object-fit: contain; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 11px; cursor: pointer; }
        .nav-btn.active-tab { color: var(--gold); font-weight: bold; }

        .btn-open { background: linear-gradient(180deg, #FFD700 0%, #b8860b 100%); color: #000; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 16px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2); }
        .btn-open:disabled { background: #333; color: #666; box-shadow: none; }

        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .inv-item { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #252525; text-align: center; font-size: 10px; }
        .inv-item img { width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance">⭐ <span id="val-balance">0</span></div>
    </div>

    <div id="m-menu" class="section active">
        <div class="case-card">
            <h1 style="margin: 0; color: var(--gold);">LYDKA</h1>
            <p style="color: #666;">Добро пожаловать, игрок.</p>
        </div>
    </div>

    <div id="m-cases" class="section">
        <div class="case-card">
            <h2 style="margin: 0;">КЕЙС: РУЛЕТКА</h2>
            <div class="roulette-container">
                <div class="pointer"></div>
                <div id="tape" class="tape"></div>
            </div>
            <button class="btn-open" id="btn-spin" onclick="spin()">ОТКРЫТЬ — 500 ⭐</button>
        </div>

        <div class="case-card">
            <h2 style="margin: 0;">50 / 50</h2>
            <p style="color: #888;">Voodoo Doll или Пусто</p>
            <button class="btn-open" id="btn-50" onclick="spin50()">ОТКРЫТЬ — 500 ⭐</button>
        </div>
    </div>

    <div id="m-profile" class="section">
        <h3 style="color: var(--gold);">МОЙ ИНВЕНТАРЬ</h3>
        <div class="inv-grid" id="inventory"></div>
    </div>

    <nav class="nav">
        <div class="nav-btn" onclick="nav('menu')">🏠 Меню</div>
        <div class="nav-btn" onclick="nav('cases')">📦 Кейсы</div>
        <div class="nav-btn" onclick="nav('profile')">👤 Профиль</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 1000; // В проде получаем через API
        let spinning = false;

        const pool = [
            {id: 'chill', n: 'Chill Flame', img: 'Chill.png', t: 'nft'},
            {id: 'mood', n: 'Mood Pack', img: 'Mood.png', t: 'nft'},
            {id: 'snoop', n: 'Snoop Dogs', img: 'Snoop.png', t: 'nft'},
            {id: 'ufc', n: 'UFC Strike', img: 'UFC.png', t: 'nft'},
            {id: 'low', n: 'Low Rider', img: 'Low.png', t: 'nft'},
            {id: 'voodoo', n: 'Voodoo Doll', img: 'Voodoo.png', t: 'nft'},
            {id: 'stars', n: 'Stars', img: 'Stars.png', t: 'stars', v: 1000},
            {id: 'empty', n: 'Пусто', img: '', t: 'empty'}
        ];

        function update() {
            document.getElementById('val-balance').innerText = balance;
            document.getElementById('btn-spin').disabled = (balance < 500 || spinning);
            document.getElementById('btn-50').disabled = (balance < 500 || spinning);
        }

        function nav(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('m-' + id).classList.add('active');
        }

        function spin() {
            if (balance < 500 || spinning) return;
            
            spinning = true;
            balance -= 500; // ЖЕСТКОЕ СПИСАНИЕ СРАЗУ
            update();

            const tape = document.getElementById('tape');
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            tape.innerHTML = '';

            // Генерируем 70 случайных слотов
            for(let i=0; i<70; i++) {
                const item = pool[Math.floor(Math.random() * pool.length)];
                tape.innerHTML += `<div class="slot">${item.img ? `<img src="img/${item.img}">` : '❌'}</div>`;
            }

            const winIdx = 65;
            const winner = pool[Math.floor(Math.random() * (pool.length - 1))];
            tape.querySelectorAll('.slot')[winIdx].innerHTML = winner.img ? `<img src="img/${winner.img}">` : '❌';

            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
                const shift = (winIdx * 110) - (tape.parentElement.offsetWidth / 2) + 55;
                tape.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                spinning = false;
                finish(winner);
                update();
            }, 5500);
        }

        function spin50() {
            if (balance < 500 || spinning) return;
            balance -= 500;
            update();
            const win = Math.random() > 0.5;
            const res = win ? pool.find(p => p.id === 'voodoo') : pool.find(p => p.id === 'empty');
            alert(win ? "Выпало: Voodoo Doll!" : "Выпало: Пусто");
            finish(res);
            update();
        }

        function finish(item) {
            if (item.t === 'stars') balance += item.v;
            if (item.t === 'nft') {
                document.getElementById('inventory').innerHTML += `
                    <div class="inv-item"><img src="img/${item.img}"><br>${item.n}</div>
                `;
            }
            tg.sendData(JSON.stringify({win: item.id}));
        }

        update();
    </script>
</body>
</html>
