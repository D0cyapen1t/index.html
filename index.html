<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #f2c94c; 
            --bg: radial-gradient(circle at top, #1a1c20 0%, #000000 100%); 
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --item-w: 130px; /* Фиксированная ширина ячейки */
            --item-m: 5px;   /* Отступ ячейки */
        }

        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh; }

        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; }
        .live-feed { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .live-icon { width: 16px; height: 16px; object-fit: contain; }
        .balance-pill { background: var(--glass); border: 1px solid var(--glass-border); padding: 8px 15px; border-radius: 12px; font-size: 14px; font-weight: 900; color: var(--gold); }

        .section { display: none; height: calc(100vh - 130px); padding: 15px; box-sizing: border-box; overflow-y: auto; padding-bottom: 80px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* ROULETTE WINDOW */
        .roulette-container { 
            height: 160px; 
            background: #0f1115; 
            border-radius: 24px; 
            overflow: hidden; 
            position: relative; 
            border: 1px solid var(--glass-border); 
            margin: 15px 0; 
            display: flex;
            align-items: center;
        }
        .tape { 
            display: flex; 
            will-change: transform; 
            padding-left: 0; 
        }
        .tape-item { 
            min-width: var(--item-w); 
            height: 145px; 
            margin: 0 var(--item-m); 
            border-radius: 18px; 
            position: relative; 
            overflow: hidden; 
            background: #1c1f24;
            background-size: 70% !important; /* Размер картинки внутри */
            background-repeat: no-repeat !important;
            background-position: center 20% !important;
        }
        .tape-item .label-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .tape-item .label-text { 
            font-size: 10px; 
            font-weight: 900; 
            text-align: center; 
            text-transform: uppercase;
            padding: 0 5px;
            letter-spacing: 0.5px;
        }
        .pointer { 
            position: absolute; 
            left: 50%; 
            top: 0; 
            bottom: 0; 
            width: 4px; 
            background: var(--gold); 
            z-index: 10; 
            transform: translateX(-50%); 
            box-shadow: 0 0 20px rgba(242, 201, 76, 0.5); 
        }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-win { background: #16181d; padding: 30px; border-radius: 35px; border: 2px solid var(--gold); text-align: center; width: 75%; }
        
        .btn-main { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: 900; font-size: 16px; cursor: pointer; }
        .btn-back { background: none; border: none; color: #555; width: 100%; padding: 15px; font-weight: 700; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--glass-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <div class="live-feed" id="live-feed">⚡ Загрузка...</div>
    <div class="balance-pill">⭐ <span id="balance-val">0</span></div>
</div>

<div id="win-modal" class="modal-overlay">
    <div class="modal-win">
        <h2 style="color:var(--gold); margin:0;">ПОЗДРАВЛЯЕМ!</h2>
        <div id="win-content" style="padding: 25px 0; font-weight: 900;"></div>
        <button class="btn-main" onclick="claimReward()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="tab-games" class="section active">
    <div style="background: linear-gradient(135deg, #eb5757, #f2994a); padding:25px; border-radius:24px; margin-bottom:15px;" onclick="nav('roulette')">
        <h2>🎡 РУЛЕТКА</h2>
    </div>
    <div style="background: linear-gradient(135deg, #2f80ed, #56ccf2); padding:25px; border-radius:24px;" onclick="nav('crash')">
        <h2>🚀 КРАШ</h2>
    </div>
</div>

<div id="game-roulette" class="section">
    <div class="roulette-container" id="container-roulette">
        <div class="pointer"></div>
        <div id="tape-roulette" class="tape"></div>
    </div>
    <button class="btn-main" onclick="startSpin('tape-roulette', 'container-roulette', 500)">КРУТИТЬ (500 ⭐)</button>
    <button class="btn-back" onclick="nav('games')">НАЗАД</button>
</div>

<div id="tab-earn" class="section">
    <h2 style="text-align:center; color:var(--gold)">DAILY CASE</h2>
    <div class="roulette-container" id="container-case">
        <div class="pointer"></div>
        <div id="tape-case" class="tape"></div>
    </div>
    <button class="btn-main" onclick="startSpin('tape-case', 'container-case', 0)">ОТКРЫТЬ</button>
</div>

<div id="tab-inv" class="section">
    <h2>ИНВЕНТАРЬ</h2>
    <div id="inv-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="nav('games')">🎮<span>Игры</span></div>
    <div class="nav-btn" onclick="nav('earn')">🎁<span>Бонус</span></div>
    <div class="nav-btn" onclick="nav('inv')">👤<span>Профиль</span></div>
</nav>

<script>
    const gifts = [
        {name: 'UFC STRIKE', img: 'UFC.png', price: 1450},
        {name: 'Chill Flame', img: 'Chill.png', price: 450},
        {name: 'Low Rider', img: 'Low.png', price: 4000},
        {name: 'Lunar Snake', img: 'Snake.png', price: 300},
        {name: 'Eternal Rose', img: 'Rose.png', price: 2300},
        {name: 'Diamond Ring', img: 'Ring.png', price: 2500},
        {name: 'Toy Bear', img: 'Bear.png', price: 3100},
        {name: 'Westside Sign', img: 'Sign.png', price: 8000},
        {name: '150 Stars', img: '⭐', val: 150, price: 150}
    ];

    let balance = parseInt(localStorage.getItem('user_bal')) || 5000;
    let inventory = JSON.parse(localStorage.getItem('user_inv')) || [];
    let isBusy = false;
    let currentPrize = null;

    function sync() {
        localStorage.setItem('user_bal', balance);
        localStorage.setItem('user_inv', JSON.stringify(inventory));
        document.getElementById('balance-val').innerText = balance.toLocaleString();
    }

    function nav(id) {
        if(isBusy) return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id.startsWith('game') ? id : 'tab-'+id);
        if(target) target.classList.add('active');
        document.querySelectorAll('.nav-btn').forEach((b, i) => {
            b.classList.toggle('active', ['games','earn','inv'][i] === id);
        });
        if(id === 'inv') renderInv();
    }

    // ТЕХНИЧЕСКИ ТОЧНЫЙ ПРОКРУТ
    function startSpin(tapeId, containerId, cost) {
        if(isBusy || balance < cost) return;
        isBusy = true; balance -= cost; sync();

        const tape = document.getElementById(tapeId);
        const container = document.getElementById(containerId);
        
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';

        const winIdx = 40; 
        const totalItems = 50;
        
        for(let i=0; i<totalItems; i++) {
            const g = gifts[Math.floor(Math.random()*gifts.length)];
            const item = document.createElement('div');
            item.className = 'tape-item';
            
            // Если подарок - Звезды
            if(g.img === '⭐') {
                item.style.background = `rgba(242, 201, 76, 0.1)`;
                item.innerHTML = `<div style="font-size:40px; margin-top:30px; text-align:center;">⭐</div>`;
            } else {
                item.style.background = `url('img/${g.img}')`;
            }
            
            item.innerHTML += `<div class="label-bg"><div class="label-text">${g.name}</div></div>`;
            tape.appendChild(item);
            
            if(i === winIdx) currentPrize = g;
        }

        setTimeout(() => {
            const itemWidth = 130; // --item-w
            const itemMargin = 5;  // --item-m
            const fullStep = itemWidth + (itemMargin * 2);
            
            // Расчет: на сколько пикселей сдвинуть ленту, чтобы winIdx был ровно по центру контейнера
            const containerCenter = container.offsetWidth / 2;
            const targetPos = (winIdx * fullStep) + (fullStep / 2) - containerCenter;

            tape.style.transition = 'transform 6s cubic-bezier(0.15, 0, 0.1, 1)';
            tape.style.transform = `translateX(-${targetPos}px)`;
        }, 50);

        setTimeout(() => {
            const icon = currentPrize.img === '⭐' ? '⭐' : `<img src="img/${currentPrize.img}" style="width:80px">`;
            document.getElementById('win-content').innerHTML = `${icon}<br><br>${currentPrize.name}`;
            document.getElementById('win-modal').style.display = 'flex';
        }, 6500);
    }

    function claimReward() {
        if(currentPrize.val) balance += currentPrize.val; else inventory.push(currentPrize);
        document.getElementById('win-modal').style.display = 'none';
        isBusy = false; sync();
    }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inventory.map((it, i) => `
            <div class="inv-item">
                <img src="img/${it.img}" style="width:50px"><br>
                <small>${it.name}</small>
            </div>
        `).join('');
    }

    // LIVE FEED
    setInterval(() => {
        const g = gifts[Math.floor(Math.random()*gifts.length)];
        const feed = document.getElementById('live-feed');
        feed.innerHTML = `⚡ <span>${g.name}</span>`;
    }, 4000);

    sync();
</script>
</body>
</html>
