<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffca28; --bg: #0b0d10; --card: #161920; --accent: #232731; --red: #ff4757; --green: #2ed573; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .header { padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--accent); display: flex; justify-content: center; }
        .balance-pill { border: 2px solid var(--gold); padding: 8px 25px; border-radius: 50px; font-size: 20px; font-weight: 900; color: var(--gold); }

        .section { display: none; height: calc(100vh - 160px); padding: 20px; overflow-y: auto; }
        .active { display: block; }

        /* РУЛЕТКА */
        .roulette-container { position: relative; width: 100%; height: 180px; background: #050608; border-radius: 24px; overflow: hidden; border: 2px solid var(--accent); }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--gold); z-index: 20; transform: translateX(-50%); box-shadow: 0 0 20px var(--gold); }
        .tape { display: flex; align-items: center; height: 100%; transition: transform 6s cubic-bezier(0.1, 0, 0, 1); }
        .slot { width: 130px; min-width: 130px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card); margin: 0 5px; border-radius: 18px; border: 1px solid var(--accent); }
        .slot img { width: 70px; height: 70px; object-fit: contain; }
        .slot span { font-size: 11px; margin-top: 10px; color: #888; font-weight: bold; }

        /* КРАШ */
        .crash-box { background: #000; height: 200px; border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--accent); margin-bottom: 20px; }
        #c-mult { font-size: 60px; font-weight: 900; color: var(--gold); }

        .btn-main { background: linear-gradient(135deg, #ffca28, #ff8f00); color: #000; border: none; width: 100%; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .btn-main:disabled { opacity: 0.5; }
        .input-f { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--card); border: 1px solid var(--accent); color: #fff; border-radius: 12px; text-align: center; font-size: 18px; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-win { background: var(--card); padding: 30px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; width: 85%; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #161920; display: flex; border-top: 1px solid var(--accent); padding-bottom: 10px; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #5b626e; font-size: 12px; font-weight: bold; }
        .nav-btn.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="header"><div class="balance-pill">⭐ <span id="bal-val">0</span></div></div>

<div id="win-modal" class="modal">
    <div class="modal-win">
        <h2 style="color:var(--gold)">ВЫИГРЫШ!</h2>
        <div id="win-res" style="padding: 20px 0;"></div>
        <button class="btn-main" onclick="claim()">ЗАБРАТЬ</button>
    </div>
</div>

<div id="tab-roulette" class="section active">
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>
    <button class="btn-main" id="spin-btn" style="margin-top:25px;" onclick="spin()">ОТКРЫТЬ КЕЙС (500 ⭐)</button>
</div>

<div id="tab-crash" class="section">
    <div class="crash-box"><h1 id="c-mult">1.00x</h1></div>
    <input type="number" id="c-bet" class="input-f" placeholder="Ставка...">
    <button class="btn-main" id="c-btn" onclick="crash()">ВЗЛЕТАЕМ</button>
</div>

<div id="tab-inv" class="section">
    <div id="inv-list" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;"></div>
</div>

<nav class="navbar">
    <div class="nav-btn active" onclick="nav('roulette')">КЕЙСЫ</div>
    <div class="nav-btn" onclick="nav('crash')">КРАШ</div>
    <div class="nav-btn" onclick="nav('inv')">ИНВЕНТАРЬ</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const items = [
        {id:'chill', name:'Chill', img:'Chill.png', p:300},
        {id:'mood', name:'Mood', img:'Mood.png', p:450},
        {id:'snoop', name:'Snoop', img:'Snoop.png', p:600},
        {id:'ufc', name:'UFC', img:'UFC.png', p:800},
        {id:'low', name:'Low', img:'Low.png', p:1000},
        {id:'voodoo', name:'Voodoo', img:'Voodoo.png', p:1500},
        {id:'stars', name:'Stars', img:'⭐', p:0}
    ];

    let balance = parseInt(new URLSearchParams(window.location.search).get('balance')) || 0;
    let inv = JSON.parse(localStorage.getItem('lyd_inventory')) || [];
    let isBusy = false;
    let winObj = null;

    function sync() {
        document.getElementById('bal-val').innerText = balance;
        localStorage.setItem('lyd_inventory', JSON.stringify(inv));
        // Защита от краша: sendData работает только через Keyboard Button
        try { tg.sendData(JSON.stringify({new_balance: balance})); } catch(e) {}
    }

    function nav(t) {
        if(isBusy && t !== 'roulette') return;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
        if(t==='inv') renderInv();
    }

    // --- КЕЙСЫ ---
    function spin() {
        if(balance < 500 || isBusy) return;
        balance -= 500; isBusy = true; sync();
        
        const tape = document.getElementById('tape');
        tape.style.transition = 'none'; tape.style.transform = 'translateX(0)'; tape.innerHTML = '';
        
        const winIdx = 45;
        for(let i=0; i<55; i++) {
            let it = items[Math.floor(Math.random()*items.length)];
            if(i === winIdx) {
                winObj = Object.assign({}, it);
                if(winObj.id === 'stars') winObj.stars = Math.floor(Math.random()*451)+50;
            }
            const icon = it.img==='⭐'?'<div style="font-size:40px">⭐</div>':`<img src="img/${it.img}">`;
            tape.innerHTML += `<div class="slot">${icon}<span>${it.name}</span></div>`;
        }

        setTimeout(() => {
            tape.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0, 1)';
            tape.style.transform = `translateX(-${(winIdx * 140) - window.innerWidth/2 + 70}px)`;
        }, 50);

        setTimeout(() => {
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-res').innerHTML = `<h3>${winObj.id==='stars'?winObj.stars+' ⭐':winObj.name}</h3>`;
        }, 6500);
    }

    function claim() {
        if(winObj.id==='stars') balance += winObj.stars; else inv.push(winObj);
        document.getElementById('win-modal').style.display = 'none';
        isBusy = false; sync();
    }

    // --- КРАШ ---
    let cActive = false, cMult = 1.0, cTimer;
    function crash() {
        const bet = parseInt(document.getElementById('c-bet').value);
        if(!bet || bet > balance || isBusy && !cActive) return;
        
        if(cActive) { // ЗАБРАТЬ
            balance += Math.floor(bet * cMult);
            clearInterval(cTimer); resetCrash(); return;
        }

        balance -= bet; isBusy = true; cActive = true; cMult = 1.0; sync();
        document.getElementById('c-btn').innerText = "ЗАБРАТЬ";
        let boom = (Math.random()*3 + 1.1).toFixed(2);

        cTimer = setInterval(() => {
            cMult += 0.01;
            document.getElementById('c-mult').innerText = cMult.toFixed(2) + "x";
            if(cMult >= boom) {
                clearInterval(cTimer);
                document.getElementById('c-mult').innerText = "BOOM!";
                setTimeout(resetCrash, 2000);
            }
        }, 80);
    }

    function resetCrash() {
        isBusy = false; cActive = false; clearInterval(cTimer);
        document.getElementById('c-btn').innerText = "ВЗЛЕТАЕМ";
        document.getElementById('c-mult').innerText = "1.00x";
        sync();
    }

    function renderInv() {
        const list = document.getElementById('inv-list');
        list.innerHTML = inv.length ? '' : 'Пусто';
        inv.forEach((it, i) => {
            list.innerHTML += `<div class="slot" style="width:100px; height:100px; min-width:100px;">
                <span>${it.name}</span>
                <button onclick="sell(${i})" style="background:var(--green); border:none; border-radius:5px; margin-top:5px; padding:5px; font-weight:bold;">${Math.floor(it.p*1.5)} ⭐</button>
            </div>`;
        });
    }

    function sell(i) {
        balance += Math.floor(inv[i].p * 1.5);
        inv.splice(i, 1); renderInv(); sync();
    }

    sync();
</script>
</body>
</html>
